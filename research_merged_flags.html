<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky Pilot Research Tree</title>
  <style>
    :root {
      --bg: #0b1118; --text: #e7eef7; --muted: #91a2b6;
      --premium: #d4aa40; --squadron: #58b261;
      --sidebar-w: 360px; --rank-header-h: 44px; --rank-gap: 26px;
      --rank-inner-top: 18px; --rank-inner-bottom: 18px;
      --cell-w: 170px; --cell-h: 108px; --cell-gap-x: 18px; --cell-gap-y: 14px;
      --tree-pad: 28px; --img-h: 62px; --radius: 14px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: linear-gradient(180deg, #0b1118 0%, #0a0f15 100%);
      color: var(--text); font-family: Inter, Segoe UI, Arial, sans-serif; overflow: hidden;
    }
    .app { display: grid; grid-template-columns: 1fr var(--sidebar-w); width: 100%; height: 100%; }
    .main { position: relative; min-width: 0; min-height: 0; border-right: 1px solid rgba(255,255,255,0.05); }
    .toolbar {
      height: 54px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; background: rgba(9, 14, 21, 0.95); border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .toolbar strong { font-size: 14px; letter-spacing: .08em; text-transform: uppercase; }
    .toolbar span { color: var(--muted); font-size: 12px; }
    .legend { display: flex; gap: 10px; align-items: center; }
    .pill {
      display: inline-flex; align-items: center; gap: 8px; border-radius: 999px; padding: 6px 10px;
      font-size: 12px; color: var(--muted); background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    }
    .dot { width: 9px; height: 9px; border-radius: 999px; display: inline-block; }
    .dot.standard { background: rgba(127,179,255,.9); }
    .dot.premium { background: rgba(212,170,64,.95); }
    .dot.squadron { background: rgba(88,178,97,.95); }

    .tree-scroll { position: absolute; left: 0; right: 0; top: 54px; bottom: 0; overflow: auto; padding: 18px; }
    .tree-shell {
      position: relative; min-width: max-content; min-height: 100%; padding: var(--tree-pad);
      border-radius: 22px; background: linear-gradient(180deg, rgba(18,26,37,.92), rgba(10,15,22,.96));
      border: 1px solid rgba(255,255,255,0.05); overflow: hidden;
    }
    .rank-layer, .edge-layer, .node-layer { position: absolute; inset: 0; }
    .rank-band {
      position: absolute; left: 0; right: 0; border-radius: 18px;
      background: linear-gradient(180deg, rgba(24,34,48,.55), rgba(13,20,29,.42));
      border: 1px solid rgba(255,255,255,0.04);
    }
    .rank-band::after {
      content: ""; position: absolute; left: 0; right: 0; top: var(--rank-header-h); height: 1px;
      background: linear-gradient(90deg, transparent, rgba(146,176,215,.26), transparent);
    }
    .rank-label {
      position: absolute; left: 16px; top: 10px; z-index: 1;
      font-size: 13px; letter-spacing: .16em; text-transform: uppercase; color: #c6d4e5; font-weight: 700;
    }
    .edge-layer svg { position: absolute; inset: 0; overflow: visible; }
    .edge-path {
      fill: none; stroke: rgba(132,177,235,0.24); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
    }

    .cell-wrap { position: absolute; width: var(--cell-w); height: var(--cell-h); z-index: 3; }
    .cell-wrap.grouped .cell-shadow-2, .cell-wrap.grouped .cell-shadow-1 {
      position: absolute; inset: 0; border-radius: var(--radius); background: rgba(35,47,64,.60);
      border: 1px solid rgba(144,176,216,.18); pointer-events: none;
    }
    .cell-wrap.grouped .cell-shadow-2 { transform: translate(9px,9px); opacity: .32; }
    .cell-wrap.grouped .cell-shadow-1 { transform: translate(4px,4px); opacity: .50; }

    .tree-cell {
      position: relative; width: 100%; height: 100%; border-radius: var(--radius); overflow: hidden;
      background: linear-gradient(180deg, rgba(36,44,57,.96), rgba(19,24,32,.98));
      border: 1px solid rgba(130,145,170,.22); cursor: pointer;
      box-shadow: 0 8px 22px rgba(0,0,0,.30), inset 0 1px 0 rgba(255,255,255,.04);
    }
    .tree-cell.premium {
      border-color: rgba(212,170,64,.72);
      background: linear-gradient(180deg, rgba(61,50,22,.98), rgba(29,24,14,.98));
      box-shadow: 0 8px 22px rgba(0,0,0,.30), 0 0 0 1px rgba(212,170,64,.16), 0 0 18px rgba(212,170,64,.14);
    }
    .tree-cell.squadron {
      border-color: rgba(88,178,97,.72);
      background: linear-gradient(180deg, rgba(25,52,28,.98), rgba(15,28,17,.98));
      box-shadow: 0 8px 22px rgba(0,0,0,.30), 0 0 0 1px rgba(88,178,97,.16), 0 0 18px rgba(88,178,97,.12);
    }
    .cell-top { position: relative; height: calc(var(--img-h) + 8px); padding: 8px 10px 0 10px; }
    .cell-image-wrap {
      position: relative; height: var(--img-h); border-radius: 10px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at center, rgba(145,175,220,.10), transparent 60%);
    }
    .cell-image { max-width: 100%; max-height: 100%; object-fit: contain; display: block; filter: drop-shadow(0 6px 10px rgba(0,0,0,.22)); }
    .cell-fallback { font-size: 11px; color: #8ea1b8; letter-spacing: .08em; text-transform: uppercase; }
    .cell-body { padding: 6px 10px 10px 10px; display: flex; flex-direction: column; gap: 4px; }
    .cell-title {
      font-size: 12px; line-height: 1.2; font-weight: 700; color: #eef5ff;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 28px;
    }
    .cell-meta {
      display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 10px; color: var(--muted);
      letter-spacing: .08em; text-transform: uppercase;
    }
    .tag {
      display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; padding: 3px 7px;
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.05); white-space: nowrap;
    }
    .tag.premium { color: #f0d48d; border-color: rgba(212,170,64,.25); background: rgba(212,170,64,.10); }
    .tag.squadron { color: #97db9d; border-color: rgba(88,178,97,.22); background: rgba(88,178,97,.10); }

    .sidebar { background: linear-gradient(180deg, rgba(12,18,27,.98), rgba(8,12,18,1)); display: flex; flex-direction: column; min-width: 0; }
    .sidebar-head { padding: 18px 18px 12px 18px; border-bottom: 1px solid rgba(255,255,255,.05); }
    .sidebar-head h2 { margin: 0 0 6px 0; font-size: 18px; }
    .sidebar-head p { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.45; }
    .detail { padding: 18px; overflow: auto; min-height: 0; }
    .empty-state { color: var(--muted); font-size: 14px; line-height: 1.55; padding: 6px 2px; }
    .status {
      position: fixed; left: 18px; bottom: 18px; z-index: 20; border-radius: 12px; padding: 10px 12px;
      font-size: 12px; color: #d8e6f6; background: rgba(12,18,27,.92); border: 1px solid rgba(255,255,255,.06);
      max-width: 760px; white-space: pre-wrap;
    }
    .status.error { border-color: rgba(255,114,114,.28); color: #ffd5d5; }
    @media (max-width: 1100px) { .app { grid-template-columns: 1fr; } .sidebar { display: none; } }
  </style>
</head>
<body>
  <div class="app">
    <section class="main">
      <div class="toolbar">
        <div>
          <strong>Sky Pilot Research Tree</strong><br>
          <span>USA tree viewer merged with v4 flags</span>
        </div>
        <div class="legend">
          <div class="pill"><span class="dot standard"></span> Standard</div>
          <div class="pill"><span class="dot premium"></span> Premium</div>
          <div class="pill"><span class="dot squadron"></span> Squadron</div>
        </div>
      </div>
      <div class="tree-scroll">
        <div class="tree-shell" id="treeShell">
          <div class="rank-layer" id="rankLayer"></div>
          <div class="edge-layer" id="edgeLayer"></div>
          <div class="node-layer" id="nodeLayer"></div>
        </div>
      </div>
    </section>
    <aside class="sidebar">
      <div class="sidebar-head">
        <h2>Aircraft Details</h2>
        <p>Select an aircraft card to inspect placement and merged flags.</p>
      </div>
      <div class="detail" id="detailPanel">
        <div class="empty-state">Pick a card in the tree.</div>
      </div>
    </aside>
  </div>

  <div class="status" id="statusBox">SCRIPT BOOTED</div>

  <script>
    const TREE_JSON_URL = "usa_tree_pass2_with_arrows.json";
    const DECOR_JSON_URL = "usa_tree_v4.json";
    const REGISTRY_CSV_URL = "SP_Registry_CANON_3_31.csv";
    const PIC_BASE = "https://kjumpmaster.github.io/Aircraft-Pics/";

    const treeShellEl = document.getElementById("treeShell");
    const rankLayerEl = document.getElementById("rankLayer");
    const edgeLayerEl = document.getElementById("edgeLayer");
    const nodeLayerEl = document.getElementById("nodeLayer");
    const detailPanelEl = document.getElementById("detailPanel");
    const statusBoxEl = document.getElementById("statusBox");

    let registryByMasterKey = new Map();
    let flagsByUnitId = new Map();

    function setStatus(message, isError = false) {
      statusBoxEl.textContent = message;
      statusBoxEl.classList.toggle("error", !!isError);
    }

    window.addEventListener("error", (e) => setStatus(`JS error: ${e.message} at ${e.filename || "inline"}:${e.lineno || 0}`, true));
    window.addEventListener("unhandledrejection", (e) => setStatus(`Promise error: ${e.reason?.message || e.reason || "Unknown promise failure"}`, true));

    function normalizeKey(value) { return String(value || "").trim(); }
    function normalizeType(value) { return String(value || "").trim().toLowerCase(); }
    function romanize(num) {
      const map = [[1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],[100,'C'],[90,'XC'],[50,'L'],[40,'XL'],[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];
      let out = ""; for (const [v, s] of map) while (num >= v) { out += s; num -= v; } return out || String(num);
    }
    function varNum(name) { return parseFloat(getComputedStyle(document.documentElement).getPropertyValue(name)) || 0; }

    function parseCSV(text) {
      const rows = []; let row = []; let cur = ""; let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i], next = text[i + 1];
        if (ch === '"') { if (inQuotes && next === '"') { cur += '"'; i++; } else { inQuotes = !inQuotes; } }
        else if (ch === "," && !inQuotes) { row.push(cur); cur = ""; }
        else if ((ch === "\n" || ch === "\r") && !inQuotes) {
          if (ch === "\r" && next === "\n") i++;
          row.push(cur); cur = "";
          if (row.some(v => String(v).length > 0)) rows.push(row);
          row = [];
        } else { cur += ch; }
      }
      row.push(cur); if (row.some(v => String(v).length > 0)) rows.push(row);
      if (!rows.length) return [];
      const headers = rows[0].map(h => String(h || "").trim());
      return rows.slice(1).map(r => {
        const obj = {}; headers.forEach((h, idx) => obj[h] = r[idx] ?? ""); return obj;
      });
    }

    function buildRegistryMaps(rows) {
      registryByMasterKey = new Map();
      for (const row of rows) {
        const key = normalizeKey(row.master_key);
        if (key) registryByMasterKey.set(key, row);
      }
    }

    function buildFlagsMap(v4Payload) {
      flagsByUnitId = new Map();
      const cells = Array.isArray(v4Payload.cells) ? v4Payload.cells : [];
      for (const cell of cells) {
        const units = Array.isArray(cell.units) ? cell.units : [];
        for (const unit of units) {
          const id = normalizeKey(unit.id);
          if (!id) continue;
          flagsByUnitId.set(id, {
            is_premium: !!unit.flags?.is_premium,
            is_squadron: !!unit.flags?.is_squadron,
            is_event: !!unit.flags?.is_event,
            is_pack: !!unit.flags?.is_pack,
            is_research: !!unit.flags?.is_research
          });
        }
      }
    }

    function getCellUnitIds(cell) {
      if (Array.isArray(cell.units)) {
        return cell.units.map(u => typeof u === "string" ? normalizeKey(u) : normalizeKey(u?.id)).filter(Boolean);
      }
      return [];
    }

    function getCellMasterKey(cell) {
      return normalizeKey(
        cell.master_key || cell.cell_key || cell.unit_id || cell.id || cell.key ||
        (Array.isArray(cell.units) && cell.units.length
          ? (typeof cell.units[0] === "string" ? cell.units[0] : cell.units[0]?.id)
          : "") || ""
      );
    }

    function getMergedFlags(cell) {
      const ids = getCellUnitIds(cell);
      const out = { is_premium: false, is_squadron: false, is_event: false, is_pack: false, is_research: false };
      for (const id of ids) {
        const f = flagsByUnitId.get(id);
        if (!f) continue;
        out.is_premium ||= !!f.is_premium;
        out.is_squadron ||= !!f.is_squadron;
        out.is_event ||= !!f.is_event;
        out.is_pack ||= !!f.is_pack;
        out.is_research ||= !!f.is_research;
      }
      return out;
    }

    function isPremium(cell) { return !!cell.merged_flags?.is_premium; }
    function isSquadron(cell) { return !!cell.merged_flags?.is_squadron; }
    function isGroup(cell) { return normalizeType(cell.type) === "group" || getCellUnitIds(cell).length > 1; }

    function labelForType(cell) {
      if (isPremium(cell)) return "Premium";
      if (isSquadron(cell)) return "Squadron";
      if (isGroup(cell)) return "Group";
      return "Standard";
    }

    function getDisplayName(cell, registryRow) {
      return (
        cell.display_name || cell.wiki_name || cell.name || cell.title ||
        (getCellUnitIds(cell).length ? getCellUnitIds(cell)[0] : "") ||
        registryRow?.wt_display_name_new || registryRow?.wt_name || registryRow?.rw_name ||
        getCellMasterKey(cell) || "Unknown Aircraft"
      );
    }

    function normalizeCell(raw, idx) {
      const rank = Number(raw.rank);
      const column = Number(raw.column);
      const row = Number(raw.row_in_rank ?? raw.row);
      const masterKey = getCellMasterKey(raw);
      const merged_flags = getMergedFlags(raw);
      return {
        ...raw,
        rank, column, row,
        merged_flags,
        master_key: masterKey,
        cell_id: raw.cell_id || raw.cell_key || raw.id || raw.node_id || raw.key || `${masterKey || "cell"}_${idx}`
      };
    }

    function validateCellPlacement(cell) {
      return Number.isFinite(cell.rank) && Number.isFinite(cell.column) && Number.isFinite(cell.row) &&
             cell.rank >= 1 && cell.column >= 1 && cell.row >= 1;
    }

    function getRowCountsByRank(cells) {
      const result = new Map();
      for (const cell of cells) {
        const rank = Number(cell.rank), existing = result.get(rank) || 0;
        result.set(rank, Math.max(existing, Number(cell.row) || 1));
      }
      return result;
    }

    function getMaxColumn(cells) { return Math.max(...cells.map(c => Number(c.column) || 0), 7); }

    function computeRankLayout(cells) {
      const rowCountsByRank = getRowCountsByRank(cells);
      const ranks = [...rowCountsByRank.keys()].sort((a,b) => a-b);
      const rankLayout = new Map();
      let y = varNum("--tree-pad");
      for (const rank of ranks) {
        const rows = rowCountsByRank.get(rank) || 1;
        const contentH = rows * varNum("--cell-h") + Math.max(0, rows - 1) * varNum("--cell-gap-y");
        const bandH = varNum("--rank-header-h") + varNum("--rank-inner-top") + contentH + varNum("--rank-inner-bottom");
        rankLayout.set(rank, { y, height: bandH, rows });
        y += bandH + varNum("--rank-gap");
      }
      const maxCol = getMaxColumn(cells);
      const width = varNum("--tree-pad") * 2 + maxCol * varNum("--cell-w") + (maxCol - 1) * varNum("--cell-gap-x");
      const height = y + varNum("--tree-pad") - varNum("--rank-gap");
      return { rankLayout, width, height };
    }

    function getCellRect(cell, rankLayout) {
      const layout = rankLayout.get(Number(cell.rank));
      return {
        x: varNum("--tree-pad") + (Number(cell.column) - 1) * (varNum("--cell-w") + varNum("--cell-gap-x")),
        y: layout.y + varNum("--rank-header-h") + varNum("--rank-inner-top") + (Number(cell.row) - 1) * (varNum("--cell-h") + varNum("--cell-gap-y")),
        w: varNum("--cell-w"), h: varNum("--cell-h")
      };
    }

    function renderRankBands(rankLayout, width) {
      rankLayerEl.innerHTML = "";
      for (const [rank, layout] of [...rankLayout.entries()].sort((a,b) => a[0]-b[0])) {
        const band = document.createElement("div");
        band.className = "rank-band";
        band.style.left = "0px"; band.style.top = `${layout.y}px`; band.style.width = `${width}px`; band.style.height = `${layout.height}px`;
        const label = document.createElement("div");
        label.className = "rank-label";
        label.textContent = `Rank ${romanize(rank)}`;
        band.appendChild(label);
        rankLayerEl.appendChild(band);
      }
    }

    function candidateImageUrls(cell, registryRow) {
      const masterKey = getCellMasterKey(cell);
      const wtImage = normalizeKey(registryRow?.wt_image);
      const urls = [];
      if (wtImage) urls.push(`${PIC_BASE}${wtImage}.png`);
      if (masterKey) urls.push(`${PIC_BASE}${masterKey}.png`);
      if (masterKey && !masterKey.endsWith("_group")) urls.push(`${PIC_BASE}${masterKey}_group.png`);
      return [...new Set(urls)];
    }

    function renderDetailPanel(cell, registryRow, imageUrl) {
      const flags = cell.merged_flags || {};
      detailPanelEl.innerHTML = `
        <div class="empty-state">
          <strong>${getDisplayName(cell, registryRow)}</strong><br><br>
          Master key: ${getCellMasterKey(cell) || "—"}<br>
          Rank: ${cell.rank} | Column: ${cell.column} | Row: ${cell.row}<br>
          Type: ${labelForType(cell)}<br>
          Premium: ${flags.is_premium ? "yes" : "no"}<br>
          Squadron: ${flags.is_squadron ? "yes" : "no"}<br>
          Event: ${flags.is_event ? "yes" : "no"}<br>
          Cell key: ${cell.cell_key || cell.cell_id || "—"}<br>
          WT image: ${registryRow?.wt_image || "—"}<br>
          Image loaded: ${imageUrl ? "yes" : "no"}
        </div>
      `;
    }

    function createCellElement(cell, registryRow) {
      const el = document.createElement("div");
      el.className = "tree-cell";
      if (isPremium(cell)) el.classList.add("premium");
      if (isSquadron(cell)) el.classList.add("squadron");

      const title = getDisplayName(cell, registryRow);
      const tagLabel = labelForType(cell);
      const rankLabel = `R${cell.rank} C${cell.column} Y${cell.row}`;

      el.innerHTML = `
        <div class="cell-top"><div class="cell-image-wrap"></div></div>
        <div class="cell-body">
          <div class="cell-title"></div>
          <div class="cell-meta">
            <span class="tag ${isPremium(cell) ? "premium" : isSquadron(cell) ? "squadron" : ""}">${tagLabel}</span>
            <span>${rankLabel}</span>
          </div>
        </div>
      `;

      el.querySelector(".cell-title").textContent = title;
      const imgWrap = el.querySelector(".cell-image-wrap");
      const urls = candidateImageUrls(cell, registryRow);

      if (urls.length) {
        const img = document.createElement("img");
        img.className = "cell-image";
        img.alt = title;
        let index = 0;
        img.onerror = () => {
          index += 1;
          if (index < urls.length) img.src = urls[index];
          else imgWrap.innerHTML = '<div class="cell-fallback">No Image</div>';
        };
        img.onload = () => {};
        img.src = urls[0];
        imgWrap.appendChild(img);
      } else {
        imgWrap.innerHTML = '<div class="cell-fallback">No Image</div>';
      }

      el.addEventListener("click", () => {
        const currentImg = imgWrap.querySelector("img")?.src || null;
        renderDetailPanel(cell, registryRow, currentImg);
      });
      return el;
    }

    function getRectAnchor(rect, side) {
      if (side === "right") return { x: rect.x + rect.w, y: rect.y + rect.h / 2 };
      return { x: rect.x, y: rect.y + rect.h / 2 };
    }

    function makeOrthogonalPath(a, b) {
      const midX = Math.round((a.x + b.x) / 2);
      return `M ${a.x} ${a.y} L ${midX} ${a.y} L ${midX} ${b.y} L ${b.x} ${b.y}`;
    }

    function renderEdges(edges, rectMap, width, height) {
      edgeLayerEl.innerHTML = "";
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("width", width); svg.setAttribute("height", height); svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
      for (const edge of edges || []) {
        const fromId = edge.from || edge.source || edge.parent || edge.from_cell_id || edge.from_id || edge.source_cell_key || edge.src;
        const toId = edge.to || edge.target || edge.child || edge.to_cell_id || edge.to_id || edge.target_cell_key || edge.dst;
        if (!rectMap.has(fromId) || !rectMap.has(toId)) continue;
        const a = getRectAnchor(rectMap.get(fromId), "right");
        const b = getRectAnchor(rectMap.get(toId), "left");
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", makeOrthogonalPath(a, b));
        path.setAttribute("class", "edge-path");
        svg.appendChild(path);
      }
      edgeLayerEl.appendChild(svg);
    }

    async function initiateSystem() {
      setStatus("Loading tree, v4 flags, and registry...");
      const [treeRes, decorRes, regRes] = await Promise.all([
        fetch(TREE_JSON_URL, { cache: "no-store" }),
        fetch(DECOR_JSON_URL, { cache: "no-store" }),
        fetch(REGISTRY_CSV_URL, { cache: "no-store" })
      ]);

      if (!treeRes.ok) throw new Error(`Tree fetch failed: ${treeRes.status}`);
      if (!decorRes.ok) throw new Error(`V4 fetch failed: ${decorRes.status}`);
      if (!regRes.ok) throw new Error(`Registry fetch failed: ${regRes.status}`);

      const treePayload = await treeRes.json();
      const decorPayload = await decorRes.json();
      const regText = await regRes.text();

      buildFlagsMap(decorPayload);
      buildRegistryMaps(parseCSV(regText));

      const rawCells = Array.isArray(treePayload.cells) ? treePayload.cells : [];
      const edges = Array.isArray(treePayload.edges) ? treePayload.edges : (Array.isArray(treePayload.arrows) ? treePayload.arrows : []);
      const cells = rawCells.map(normalizeCell);
      const validCells = cells.filter(validateCellPlacement);

      if (!validCells.length) throw new Error("No valid cells found.");

      const counts = validCells.reduce((acc, cell) => {
        if (isPremium(cell)) acc.premium += 1;
        if (isSquadron(cell)) acc.squadron += 1;
        return acc;
      }, { premium: 0, squadron: 0 });

      const { rankLayout, width, height } = computeRankLayout(validCells);
      treeShellEl.style.width = `${width}px`;
      treeShellEl.style.height = `${height}px`;
      renderRankBands(rankLayout, width);

      nodeLayerEl.innerHTML = "";
      const rectMap = new Map();
      for (const cell of validCells) {
        const rect = getCellRect(cell, rankLayout);
        rectMap.set(cell.cell_id, rect);
        const registryRow = registryByMasterKey.get(getCellMasterKey(cell)) || null;

        const wrap = document.createElement("div");
        wrap.className = "cell-wrap" + (isGroup(cell) ? " grouped" : "");
        wrap.style.left = `${rect.x}px`;
        wrap.style.top = `${rect.y}px`;

        if (isGroup(cell)) {
          const s2 = document.createElement("div"); s2.className = "cell-shadow-2";
          const s1 = document.createElement("div"); s1.className = "cell-shadow-1";
          wrap.appendChild(s2); wrap.appendChild(s1);
        }

        wrap.appendChild(createCellElement(cell, registryRow));
        nodeLayerEl.appendChild(wrap);
      }

      renderEdges(edges, rectMap, width, height);
      setStatus(`Loaded OK
Tree: ${TREE_JSON_URL}
Flags: ${DECOR_JSON_URL}
Registry: ${REGISTRY_CSV_URL}
Valid cells: ${validCells.length}
Edges: ${edges.length}
Premium cells: ${counts.premium}
Squadron cells: ${counts.squadron}`);
    }

    initiateSystem();
  </script>
</body>
</html>
