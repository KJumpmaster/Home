<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CAOC | COMBINED AIR OPERATIONS CENTER</title>
    
    <style>
        /* 1. THE FOUNDATION: Metal skin everywhere */
        body { 
            background: #1a1a1a url('metal_background.png') no-repeat center center fixed; 
            background-size: cover;
            color: #00ff00; 
            font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 2. REMOVED DARK TINT: Letting the raw metal show through */
        body::before {
            display: none; /* Kills the dark overlay entirely */
        }

        /* 3. THE HEADER: Transparent background, only the green line remains */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 40px; 
            border-bottom: 4px solid #00ff00; /* This is your green separator line */
            background: transparent; /* No more dark bar on top */
            flex-shrink: 0;
        }

        .logo-video { 
            width: 300px; height: 300px; 
            border: 4px solid #00ff00; border-radius: 50%; 
            object-fit: cover; box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
            background: #000; /* Keeps the inside of the circle black */
        }

        .center-box { text-align: center; flex-grow: 1; margin: 0 20px; }

        .main-banner {
            width: 100%; max-width: 650px; 
            border: 2px solid #00ff00;
        }

        h1 { 
            margin: 10px 0 0 0; 
            letter-spacing: 15px; 
            font-size: 3.5em; 
            text-transform: uppercase;
            text-shadow: 2px 2px 4px #000; /* Keeps text readable on light metal */
        }

        /* 4. THE NAVIGATION: Completely transparent */
        .nav-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 25px; padding: 40px; 
            max-width: 1200px; 
            margin: auto auto; 
            width: 100%; 
            background: transparent; 
        }

        .nav-btn { 
            background: rgba(0, 0, 0, 0.8); /* Dark buttons so they stand out on light metal */
            border: 3px solid #00ff00; 
            color: #00ff00; padding: 25px; text-align: center; 
            text-decoration: none; font-weight: bold; font-size: 1.5em;
            box-shadow: 8px 8px 0px #004400;
            transition: 0.3s;
        }

        .nav-btn:hover { background: #00ff00; color: #000; }

        .rivet { width: 12px; height: 12px; background: #555; border-radius: 50%; position: absolute; box-shadow: inset 2px 2px 4px #000; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="rivet" style="top: 20px; left: 20px;"></div>
    <div class="rivet" style="top: 20px; right: 20px;"></div>
    <div class="rivet" style="bottom: 20px; left: 20px;"></div>
    <div class="rivet" style="bottom: 20px; right: 20px;"></div>

    <div class="header">
        <video class="logo-video" autoplay muted loop playsinline>
            <source src="Norden%20II%20Logo.mp4" type="video/mp4">
        </video>

        <div class="center-box">
            <video class="main-banner" autoplay muted loop playsinline>
                <source src="caoc_banner.mp4" type="video/mp4">
            </video>
            <h1>The CAOC</h1>
            <p style="margin: 5px 0; color: #00ff00; font-weight: bold; letter-spacing: 6px;">COMBINED AIR OPERATIONS CENTER</p>
        </div>

        <video class="logo-video" autoplay muted loop playsinline>
            <source src="SKY_PILOT_LOGO.mp4" type="video/mp4">
        </video>
    </div>

    <div class="nav-grid">
        <a href="#" class="nav-btn">NORDEN II</a>
        <a href="#" class="nav-btn">RESEARCH TREES</a>
        <a href="#" class="nav-btn">THE ARMORY</a>
    </div>

</body>
</html>
