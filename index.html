<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CAOC | COMBINED AIR OPERATIONS CENTER</title>
    
    <style>
        /* The "Premium" Background Logic */
        body { 
            background-image: url('metal_skin.jpg'); /* Ensure your file is named this */
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            color: #00ff00; 
            font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; 
            overflow: hidden; /* Locks it to one page */
            height: 100vh;
        }

        /* The Subtle Tinted Overlay */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35); /* Slightly darker for better text contrast */
            pointer-events: none;
            z-index: -1;
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 30px 50px; 
            border-bottom: 4px solid #00ff00;
            background: rgba(0, 0, 0, 0.5); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* Logos at 300% (Approx 380px) */
        .logo-video { 
            width: 380px; 
            height: 380px; 
            border: 4px solid #00ff00; 
            border-radius: 50%; 
            object-fit: cover;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.5);
            flex-shrink: 0;
            background: #000;
        }

        .center-box { 
            text-align: center; 
            flex-grow: 1; 
            margin: 0 40px; 
        }

        /* Massive Stretched Banner */
        .main-banner {
            width: 100%; 
            max-width: 1000px; 
            height: auto;
            border: 3px solid #00ff00; 
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.3);
        }

        h1 { 
            margin: 20px 0 0 0; 
            letter-spacing: 20px; 
            font-size: 4.5em; 
            text-transform: uppercase;
            text-shadow: 0 0 20px #00ff00;
        }

        .nav-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 30px; 
            padding: 50px; 
            max-width: 1400px; 
            margin: 0 auto; 
        }

        .nav-btn { 
            background: rgba(10, 10, 10, 0.85); 
            border: 3px solid #00ff00; 
            color: #00ff00; 
            padding: 30px; 
            text-align: center; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.5em;
            transition: 0.3s;
            box-shadow: 8px 8px 0px #004400;
        }

        .nav-btn:hover { 
            background: #00ff00; 
            color: #000; 
            box-shadow: 0 0 30px #00ff00;
            transform: scale(1.05);
        }

        .rivet { width: 12px; height: 12px; background: #777; border-radius: 50%; position: absolute; box-shadow: inset 2px 2px 4px #000; border: 1px solid #444; }
    </style>
</head>
<body>

    <div class="rivet" style="top: 20px; left: 20px;"></div>
    <div class="rivet" style="top: 20px; right: 20px;"></div>
    <div class="rivet" style="bottom: 20px; left: 20px;"></div>
    <div class="rivet" style="bottom: 20px; right: 20px;"></div>

    <div class="header">
        <video class="logo-video" autoplay muted loop playsinline>
            <source src="Norden%20II%20Logo.mp4" type="video/mp4">
        </video>

        <div class="center-box">
            <video class="main-banner" autoplay muted loop playsinline>
                <source src="caoc_banner.mp4" type="video/mp4">
            </video>
            <h1>The CAOC</h1>
            <p style="margin: 10px 0; color: #00ff00; font-weight: bold; letter-spacing: 8px; font-size: 1.2em;">COMBINED AIR OPERATIONS CENTER</p>
        </div>

        <video class="logo-video" autoplay muted loop playsinline>
            <source src="SKY_PILOT_LOGO.mp4" type="video/mp4">
        </video>
    </div>

    <div class="nav-grid">
        <a href="#" class="nav-btn">NORDEN II</a>
        <a href="#" class="nav-btn">RESEARCH TREES</a>
        <a href="#" class="nav-btn">THE ARMORY</a>
    </div>

</body>
</html>
