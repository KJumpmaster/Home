<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CAOC | COMBINED AIR OPERATIONS CENTER</title>
    
    <style>
        body { 
            background: #1a1a1a url('metal_skin.jpg') repeat;
            background-size: cover;
            background-attachment: fixed;
            color: #00ff00; 
            font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; overflow: hidden;
            height: 100vh;
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 30px; 
            border-bottom: 3px solid #333;
            background: rgba(0, 0, 0, 0.7); 
            box-shadow: inset 0 0 30px #000;
        }

        /* Logos increased to 125% (125px) */
        .logo-video { 
            width: 125px; 
            height: 125px; 
            border: 2px solid #00ff00; 
            border-radius: 50%; 
            object-fit: cover;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
            flex-shrink: 0; /* Prevents logos from squishing */
        }

        .center-box { 
            text-align: center; 
            flex-grow: 1; 
            margin: 0 40px; 
        }

        /* Stretched the middle banner */
        .main-banner {
            width: 100%; 
            max-width: 850px; /* Increased width significantly */
            height: auto;
            border: 2px solid #444; 
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.2);
        }

        h1 { 
            margin: 10px 0 0 0; 
            letter-spacing: 15px; 
            font-size: 3.5em; 
            text-transform: uppercase;
            text-shadow: 3px 3px 5px #000;
        }

        .nav-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px; 
            padding: 40px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .nav-btn { 
            background: rgba(30, 30, 30, 0.9); 
            border: 2px solid #00ff00; 
            color: #00ff00; 
            padding: 25px; 
            text-align: center; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 1.2em;
            transition: 0.4s;
            box-shadow: 4px 4px 0px #004400;
        }

        .nav-btn:hover { 
            background: #00ff00; 
            color: #000; 
            box-shadow: 0 0 25px #00ff00;
            transform: translateY(-3px);
        }

        .rivet { width: 10px; height: 10px; background: #555; border-radius: 50%; position: absolute; box-shadow: inset 1px 1px 3px #000; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="rivet" style="top: 15px; left: 15px;"></div>
    <div class="rivet" style="top: 15px; right: 15px;"></div>
    <div class="rivet" style="bottom: 15px; left: 15px;"></div>
    <div class="rivet" style="bottom: 15px; right: 15px;"></div>

    <div class="header">
        <video class="logo-video" autoplay muted loop playsinline>
            <source src="Norden%20II%20Logo.mp4" type="video/mp4">
        </video>

        <div class="center-box">
            <video class="main-banner" autoplay muted loop playsinline>
                <source src="caoc_banner.mp4" type="video/mp4">
            </video>
            <h1>The CAOC</h1>
            <p style="margin: 5px 0; color: #00ff00; font-weight: bold; letter-spacing: 5px;">COMBINED AIR OPERATIONS CENTER</p>
        </div>

        <video class="logo-video" autoplay muted loop playsinline>
            <source src="SKY_PILOT_LOGO.mp4" type="video/mp4">
        </video>
    </div>

    <div class="nav-grid">
        <a href="#" class="nav-btn">NORDEN II</a>
        <a href="#" class="nav-btn">RESEARCH TREES</a>
        <a href="#" class="nav-btn">THE ARMORY</a>
    </div>

</body>
</html>
