<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CAOC | COMBINED AIR OPERATIONS CENTER</title>
    
    <style>
        /* STRIPPED DOWN BACKGROUND: No overlays, no fancy tint */
        body { 
            background-color: #1a1a1a; /* Dark grey fallback */
            background-image: url('metal%20background.png'); 
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            color: #00ff00; 
            font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 40px; 
            border-bottom: 4px solid #00ff00;
            background: rgba(0, 0, 0, 0.8); /* Solid dark bar for contrast */
            flex-shrink: 0;
        }

        .logo-video { 
            width: 300px; height: 300px; 
            border: 4px solid #00ff00; border-radius: 50%; 
            object-fit: cover; box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
        }

        .center-box { text-align: center; flex-grow: 1; margin: 0 20px; }

        .main-banner {
            width: 100%; max-width: 650px; 
            border: 2px solid #00ff00;
        }

        h1 { margin: 10px 0 0 0; letter-spacing: 15px; font-size: 3.5em; text-transform: uppercase; }

        .nav-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 20px; padding: 30px; 
            max-width: 1200px; margin: auto auto; 
            width: 100%; box-sizing: border-box;
        }

        .nav-btn { 
            background: #111; border: 3px solid #00ff00; 
            color: #00ff00; padding: 25px; text-align: center; 
            text-decoration: none; font-weight: bold; font-size: 1.4em;
            box-shadow: 6px 6px 0px #004400;
        }

        .nav-btn:hover { background: #00ff00; color: #000; }

        .rivet { width: 10px; height: 10px; background: #444; border-radius: 50%; position: absolute; box-shadow: inset 1px 1px 2px #000; }
    </style>
</head>
<body>

    <div class="rivet" style="top: 10px; left: 10px;"></div>
    <div class="rivet" style="top: 10px; right: 10px;"></div>
    <div class="rivet" style="bottom: 10px; left: 10px;"></div>
    <div class="rivet" style="bottom: 10px; right: 10px;"></div>

    <div class="header">
        <video class="logo-video" autoplay muted loop playsinline>
            <source src="Norden%20II%20Logo.mp4" type="video/mp4">
        </video>

        <div class="center-box">
            <video class="main-banner" autoplay muted loop playsinline>
                <source src="caoc_banner.mp4" type="video/mp4">
            </video>
            <h1>The CAOC</h1>
            <p style="margin: 0; font-weight: bold; letter-spacing: 5px;">COMBINED AIR OPERATIONS CENTER</p>
        </div>

        <video class="logo-video" autoplay muted loop playsinline>
            <source src="SKY_PILOT_LOGO.mp4" type="video/mp4">
        </video>
    </div>

    <div class="nav-grid">
        <a href="#" class="nav-btn">NORDEN II</a>
        <a href="#" class="nav-btn">RESEARCH TREES</a>
        <a href="#" class="nav-btn">THE ARMORY</a>
    </div>

</body>
</html>
