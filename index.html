<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CAOC | COMBINED AIR OPERATIONS CENTER</title>
    
    <style>
        body { 
            /* This points to the metal texture we'll add to your repo */
            background: #1a1a1a url('metal_skin.jpg') repeat;
            background-attachment: fixed;
            color: #00ff00; 
            font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; overflow: hidden; /* Prevents scrolling */
            height: 100vh; /* Forces it to stay on one page */
        }

        /* The Header: Scaled down for a tighter fit */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 20px; 
            border-bottom: 3px solid #333; /* Industrial divider */
            background: rgba(0, 0, 0, 0.6); 
            box-shadow: inset 0 0 20px #000;
        }

        .logo-video { 
            width: 100px; height: 100px; /* Scaled down */
            border: 2px solid #444; 
            border-radius: 50%; 
            object-fit: cover;
            box-shadow: 0 0 10px #00ff00;
        }

        .center-box { text-align: center; flex-grow: 1; margin: 0 15px; }

        .main-banner {
            width: 100%; max-width: 450px; /* Scaled down significantly */
            border: 3px solid #222; 
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
        }

        h1 { margin: 5px 0; letter-spacing: 8px; font-size: 2.2em; text-shadow: 2px 2px #000; }

        /* The Navigation Grid: Tightened for "One Page" view */
        .nav-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 15px; padding: 20px; max-width: 1000px; margin: 0 auto; 
        }

        .nav-btn { 
            background: rgba(20, 20, 20, 0.9); 
            border: 2px solid #444; 
            color: #00ff00; 
            padding: 15px; 
            text-align: center; text-decoration: none; 
            font-weight: bold; transition: 0.3s;
            border-radius: 5px;
            box-shadow: inset 0 0 5px #000;
        }

        .nav-btn:hover { 
            background: #00ff00; color: #000; 
            border-color: #fff;
        }

        /* Added some "Rivets" for flavor in the corners */
        .rivet { width: 8px; height: 8px; background: #444; border-radius: 50%; position: absolute; box-shadow: inset 1px 1px 2px #000; }
    </style>
</head>
<body>

    <div class="rivet" style="top: 10px; left: 10px;"></div>
    <div class="rivet" style="top: 10px; right: 10px;"></div>
    <div class="rivet" style="bottom: 10px; left: 10px;"></div>
    <div class="rivet" style="bottom: 10px; right: 10px;"></div>

    <div class="header">
        <video class="logo-video" autoplay muted loop playsinline>
            <source src="Norden%20II%20Logo.mp4" type="video/mp4">
        </video>

        <div class="center-box">
            <video class="main-banner" autoplay muted loop playsinline>
                <source src="caoc_banner.mp4" type="video/mp4">
            </video>
            <h1>The CAOC</h1>
            <p style="margin: 0; color: #008800; font-weight: bold; letter-spacing: 3px; font-size: 0.9em;">COMBINED AIR OPERATIONS CENTER</p>
            <p style="font-size: 12px; color: #777; margin-top: 5px;">QUESTION → ANSWER = DONE | BLESSED FOR PRECISION</p>
        </div>

        <video class="logo-video" autoplay muted loop playsinline>
            <source src="SKY_PILOT_LOGO.mp4" type="video/mp4">
        </video>
    </div>

    <div class="nav-grid">
        <a href="#" class="nav-btn">NORDEN II</a>
        <a href="#" class="nav-btn">RESEARCH TREES</a>
        <a href="#" class="nav-btn">THE ARMORY</a>
    </div>

</body>
</html>
