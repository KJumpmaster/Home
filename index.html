<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CAOC | COMBINED AIR OPERATIONS CENTER</title>
    
    <style>
        body { 
            /* Space handled by %20 */
            background: #0a0a0a url('metal%20background.png') no-repeat center center fixed; 
            background-size: cover;
            color: #00ff00; 
            font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column; /* Stacks header over buttons */
        }

        body::before {
            content: ""; position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.4); 
            pointer-events: none; z-index: -1;
        }

        /* HEADER: Adjusted for visibility */
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 40px; 
            border-bottom: 3px solid #00ff00;
            background: rgba(0, 0, 0, 0.7); 
            flex-shrink: 0; /* Won't get squashed */
        }

        /* LOGOS: Set to a strong 300px (125% of the previous 240px) */
        .logo-video { 
            width: 300px; height: 300px; 
            border: 3px solid #00ff00; border-radius: 50%; 
            object-fit: cover; box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
        }

        .center-box { text-align: center; flex-grow: 1; margin: 0 20px; }

        .main-banner {
            width: 100%; max-width: 650px; 
            border: 2px solid #00ff00;
        }

        h1 { margin: 5px 0; letter-spacing: 12px; font-size: 3em; text-transform: uppercase; }

        /* NAVIGATION: Automatically centers in the remaining space */
        .nav-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            padding: 20px 40px; 
            max-width: 1200px; 
            margin: auto auto; /* This is the "Magic" centering fix */
            width: 100%;
            box-sizing: border-box;
        }

        .nav-btn { 
            background: rgba(10, 10, 10, 0.9); border: 2px solid #00ff00; 
            color: #00ff00; padding: 25px; text-align: center; 
            text-decoration: none; font-weight: bold; font-size: 1.4em;
            box-shadow: 5px 5px 0px #004400;
            transition: 0.3s;
        }

        .nav-btn:hover { background: #00ff00; color: #000; box-shadow: 0 0 20px #00ff00; }
        
        .rivet { width: 10px; height: 10px; background: #666; border-radius: 50%; position: absolute; box-shadow: inset 2px 2px 3px #000; }
    </style>
</head>
<body>

    <div class="rivet" style="top: 10px; left: 10px;"></div>
    <div class="rivet" style="top: 10px; right: 10px;"></div>
    <div class="rivet" style="bottom: 10px; left: 10px;"></div>
    <div class="rivet" style="bottom: 10px; right: 10px;"></div>

    <div class="header">
        <video class="logo-video" autoplay muted loop playsinline>
            <source src="Norden%20II%20Logo.mp4" type="video/mp4">
        </video>

        <div class="center-box">
            <video class="main-banner" autoplay muted loop playsinline>
                <source src="caoc_banner.mp4" type="video/mp4">
            </video>
            <h1>The CAOC</h1>
            <p style="margin: 0; letter-spacing: 5px; font-weight: bold; font-size: 1em;">COMBINED AIR OPERATIONS CENTER</p>
        </div>

        <video class="logo-video" autoplay muted loop playsinline>
            <source src="SKY_PILOT_LOGO.mp4" type="video/mp4">
        </video>
    </div>

    <div class="nav-grid">
        <a href="#" class="nav-btn">NORDEN II</a>
        <a href="#" class="nav-btn">RESEARCH TREES</a>
        <a href="#" class="nav-btn">THE ARMORY</a>
    </div>

</body>
</html>
