<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAOC - Combined Air Operations Center</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="caoc-page">

  <main class="hub-shell">
    <section class="hero-row">
      <div class="side-logo-box">
        <img src="sky_pilot_logo.png" alt="Sky Pilot Logo" class="side-logo" />
      </div>

      <div class="center-stage">
        <div class="video-frame">
          <video class="hero-video" autoplay muted loop playsinline>
            <source src="main_movie.mp4" type="video/mp4" />
          </video>
        </div>

        <div class="title-block">
          <h1>COMBINED AIR OPERATIONS CENTER</h1>
          <p>Strategic Systems Hub</p>
        </div>
      </div>

      <div class="side-logo-box">
        <img src="norden_ii_logo.png" alt="Norden II Logo" class="side-logo" />
      </div>
    </section>

    <section class="bottom-options">
      <a href="research.html" class="option-card">
        <div class="option-top">SKY PILOT</div>
        <div class="option-title">Commander's Manifest</div>
        <div class="option-text">Aircraft research tree and operational review interface.</div>
      </a>

      <a href="norden.html" class="option-card">
        <div class="option-top">NORDEN II</div>
        <div class="option-title">Bombing Calculator</div>
        <div class="option-text">Strike planning and drop analysis system.</div>
      </a>

      <a href="intel.html" class="option-card">
        <div class="option-top">CAOC</div>
        <div class="option-title">Command Briefing</div>
        <div class="option-text">Central command tools, briefings, and future systems.</div>
      </a>
    </section>
  </main>

</body>
</html>
