<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.K.Y.P.I.L.O.T. Tactical Dashboard</title>
    
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.104/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <style>
        body {
            background-color: #1a1a1a;
            color: #00ff00; /* Tactical Green */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
        }
        h1 {
            border-bottom: 2px solid #00ff00;
            padding-bottom: 10px;
            text-align: center;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #cesiumContainer {
            width: 90%;
            height: 600px;
            border: 3px solid #333;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }
        .status-bar {
            width: 90%;
            background: #333;
            padding: 10px;
            margin-top: 10px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>S.K.Y.P.I.L.O.T. MISSION CONTROL</h1>
        
        <div class="status-bar">
            <span>CALLSIGN: JUMPINGKJ</span>
            <span>SYSTEM: ONLINE (STANDARD PLAN)</span>
            <span>DATA SOURCE: WAR THUNDER RANK IX</span>
        </div>

        <div id="cesiumContainer"></div>
    </div>

    <script>
        // Your Mission Token Integrated
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIzNDI0ZmM0Ny0wYzM4LTQwOTAtYTBlYi1kOWU1MTVhMjM5NmUiLCJpZCI6NDEyNTQ1LCJpYXQiOjE3NzUwODA5MjZ9.M2ZCrF-qVaLIKI4d8tYMPSPEYMdQBV8sDQN1u9IAAPU';

        // Initialize the 3D Viewer
        const viewer = new Cesium.Viewer('cesiumContainer', {
            terrainProvider: Cesium.createWorldTerrain(),
            sceneModePicker: false,
            baseLayerPicker: false,
            navigationHelpButton: false,
            homeButton: false
        });

        // Set the initial camera to a high-altitude view of Nevada (Great for testing terrain)
        viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(-115.1728, 36.1147, 10000.0),
            orientation: {
                heading: Cesium.Math.toRadians(0),
                pitch: Cesium.Math.toRadians(-45),
                roll: 0.0
            }
        });
    </script>
</body>
</html>
