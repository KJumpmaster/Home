<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE CAOC | USA AIR WING - SKY PILOT</title>
    <style>
        body { 
            background: #050505; color: #00ff00; font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden;
        }
        #loading-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease;
        }
        .decode-header { font-size: 1.4em; letter-spacing: 8px; margin-bottom: 20px; color: #00ff00; font-weight: bold; text-shadow: 0 0 10px #00ff00; }
        .progress-bar { width: 450px; height: 3px; background: #111; border: 1px solid #004400; position: relative; overflow: hidden;}
        .progress-fill { width: 0%; height: 100%; background: #00ff00; box-shadow: 0 0 15px #00ff00; transition: width 2s linear; }
        #status-update { margin-top: 15px; font-size: 0.9em; color: #00ff00; letter-spacing: 2px; height: 1.2em; text-transform: uppercase;}
        .header-block { text-align: center; padding: 30px 0; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .main-title { font-size: 3.8em; letter-spacing: 18px; margin: 0; color: #fff; font-weight: 900; }
        .tree-viewport { padding: 20px 60px 120px 60px; display: flex; flex-direction: column; gap: 90px; max-width: 1800px; margin: 0 auto; }
        .rank-wrapper { display: flex; align-items: stretch; position: relative; }
        .rank-sidebar { font-size: 4em; font-weight: bold; color: rgba(0, 255, 0, 0.05); writing-mode: vertical-rl; text-orientation: upright; padding: 15px; letter-spacing: -8px; user-select: none; }
        .rank-container {
            flex-grow: 1; display: grid; grid-template-columns: repeat(8, 1fr); 
            grid-auto-rows: 150px; gap: 20px; position: relative; padding: 40px;
            background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(0, 255, 0, 0.1);
        }
        .v-card { background: rgba(10, 10, 10, 0.98); border: 1px solid #222; padding: 10px; text-align: center; display: flex; flex-direction: column; justify-content: center; transition: 0.2s; z-index: 10; }
        .v-card:hover { border-color: #00ff00; transform: scale(1.03); z-index: 100; box-shadow: 0 0 20px #00ff00;}
        .premium { border: 1px solid #d4af37; box-shadow: 0 0 10px rgba(212, 175, 55, 0.15);}
        .squadron { border: 1px solid #55efc4; box-shadow: 0 0 10px rgba(85, 239, 196, 0.15);}
        .v-img { width: 100%; height: 80px; object-fit: contain; filter: drop-shadow(0 0 5px rgba(0,255,0,0.1)); }
        .v-name { margin-top: 5px; font-size: 0.7em; font-weight: bold; color: #bbb; text-transform: uppercase; }
        .back-btn { position: fixed; bottom: 25px; left: 25px; background: rgba(0,0,0,0.95); border: 1px solid #00ff00; color: #00ff00; padding: 7px 14px; text-decoration: none; font-weight: bold; font-size: 0.85em; z-index: 2000;}
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="decode-header">USA TERMINAL: VETERAN ACCESS</div>
        <div class="progress-bar"><div class="progress-fill" id="bar-fill"></div></div>
        <div id="status-update">INITIALIZING HANDSHAKE...</div>
    </div>
    <div class="header-block">
        <h1 class="main-title">USA AIR WING</h1>
        <div style="color:#00ff00; letter-spacing:5px;">[ TACTICAL DATA LINK : ACTIVE ]</div>
    </div>
    <div id="research-theater" class="tree-viewport"></div>
    <a href="index.html" class="back-btn">RETURN TO CAOC</a>

        const ROMAN = ["", "I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX"];
        
        // TARGETING YOUR SPECIFIC REPO: WTAircraft_Profile_Pics
        const PIC_BASE = "https://raw.githubusercontent.com/KJumpmaster/WTAircraft_Profile_Pics/main/";

        async function initiateSystem() {
            const statusBox = document.getElementById('status-update');
            const overlay = document.getElementById('loading-overlay');
            setTimeout(() => { document.getElementById('bar-fill').style.width = '100%'; }, 500);

            try {
                const [regRes, treeRes] = await Promise.all([
                    fetch('./SP_Registry_CANON_3_31.csv'),
                    fetch('./usa_tree_v4.json')
                ]);

                const regText = await regRes.text();
                const treeData = await treeRes.json();
                const registry = {};

                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length > 2) {
                        const masterKey = cols[0]?.replace(/"/g, '').trim().toLowerCase();
                        const imageName = cols[2]?.replace(/"/g, '').trim(); 
                        if (masterKey) registry[masterKey] = imageName;
                    }
                });

                const theater = document.getElementById('research-theater');
                [1,2,3,4,5,6,7,8,9].forEach(r => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'rank-wrapper';
                    wrapper.innerHTML = `<div class="rank-sidebar">Rank ${ROMAN[r]}</div>`;
                    const container = document.createElement('div');
                    container.className = 'rank-container';
                    const cells = treeData.cells.filter(c => c.rank === r);
                    cells.forEach(cell => {
                        const id = String(cell.cell_id).toLowerCase();
                        const imageName = registry[id] || 'placeholder.png';
                        const card = document.createElement('div');
                        let special = (cell.flags?.is_premium) ? "premium" : (cell.flags?.is_squadron ? "squadron" : "");
                        card.className = `v-card ${special}`;
                        card.style.gridColumn = cell.column;
                        card.style.gridRow = cell.row;
                        card.innerHTML = `<img src="${PIC_BASE}${imageName}" class="v-img" onerror="this.src='https://placehold.co/200x100/000?text=SCANNING';"><div class="v-name">${(cell.display_name || cell.cell_id).replace(/_/g, ' ')}</div>`;
                        container.appendChild(card);
                    });
                    wrapper.appendChild(container);
                    theater.appendChild(wrapper);
                });

                setTimeout(() => {
                    overlay.style.opacity = '0';
                    setTimeout(() => { overlay.style.display = 'none'; }, 1000);
                }, 2000);
