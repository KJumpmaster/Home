<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SKY PILOT - USA STRATEGIC COMMAND</title>
    <style>
        /* UI BASE */
        body { 
            margin: 0; background: #0a0a0a url('https://raw.githubusercontent.com/KJumpmaster/Home/main/metal_background.png') fixed;
            background-size: cover; color: white; font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* TACTICAL HUD: Progress & Controls */
        #tactical-hud {
            position: sticky; top: 0; width: 100%; background: rgba(0, 20, 0, 0.9);
            border-bottom: 2px solid #00ff00; padding: 10px 20px; z-index: 2000;
            display: flex; align-items: center; justify-content: space-between; box-sizing: border-box;
        }
        .hud-stats { font-family: monospace; color: #00ff00; font-size: 18px; font-weight: bold; }
        
        #progress-container { width: 300px; height: 12px; background: #111; border: 1px solid #00ff00; margin: 0 15px; }
        #progress-fill { width: 0%; height: 100%; background: #00ff00; box-shadow: 0 0 10px #00ff00; transition: width 0.5s; }

        .hud-btns button {
            background: #000; border: 1px solid #00ff00; color: #00ff00; 
            padding: 5px 15px; cursor: pointer; font-family: monospace; text-transform: uppercase;
        }
        .hud-btns button:hover { background: #00ff00; color: #000; }

        /* CARD STATES */
        .v-card { transition: transform 0.2s; filter: grayscale(1); opacity: 0.6; }
        .v-card.obtained { filter: grayscale(0); opacity: 1; border-color: #00ff00; box-shadow: 0 0 15px rgba(0,255,0,0.3); }
        .v-card:hover { transform: scale(1.05); }

        /* SVG LINES */
        .line-solid { stroke: #00ff00; stroke-width: 4; filter: drop-shadow(0 0 5px #00ff00); }
        .line-dashed { stroke: yellow; stroke-width: 2; stroke-dasharray: 5,5; opacity: 0.4; }
        
        /* Rest of your previous CSS for grid and cards goes here... */
    </style>
</head>
<body>

    <div id="tactical-hud">
        <div class="hud-stats">
            OBTAINED: <span id="count-num">0</span> / <span id="total-num">0</span> 
            (<span id="percent-num">0</span>%)
        </div>
        <div id="progress-container"><div id="progress-fill"></div></div>
        <div class="hud-btns">
            <button onclick="exportData()">Export Data Disk</button>
            <button onclick="document.getElementById('import-input').click()">Import Data Disk</button>
            <input type="file" id="import-input" style="display:none" onchange="importData(event)">
        </div>
    </div>

    <header id="strategic-header">
        </header>

    <div id="research-wrapper">
        <svg id="arrow-canvas"></svg>
        <div id="research-theater">
            </div>
    </div>

    <script>
        let ownedAircraft = JSON.parse(localStorage.getItem('skyPilotProgress')) || [];
        let totalAircraft = 0;

        async function initiateSystem() {
            // ... (Your existing Fetch and Grid Injection logic) ...
            
            // Modified Card Injection:
            treeData.cells.forEach(cell => {
                totalAircraft++;
                const card = document.createElement('div');
                card.className = `v-card ${ownedAircraft.includes(cell.cell_key) ? 'obtained' : ''}`;
                card.id = `cell-${cell.cell_key}`;
                
                // Click to toggle "Obtained" status
                card.onclick = () => toggleObtained(cell.cell_key);
                
                // ... (Name and Image logic) ...
                theater.appendChild(card);
            });

            updateHUD();
        }

        function toggleObtained(id) {
            if (ownedAircraft.includes(id)) {
                ownedAircraft = ownedAircraft.filter(item => item !== id);
            } else {
                ownedAircraft.push(id);
            }
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('skyPilotProgress', JSON.stringify(ownedAircraft));
            location.reload(); // Refresh to update arrows and HUD
        }

        function updateHUD() {
            const count = ownedAircraft.length;
            const percent = Math.round((count / totalAircraft) * 100) || 0;
            document.getElementById('count-num').innerText = count;
            document.getElementById('total-num').innerText = totalAircraft;
            document.getElementById('percent-num').innerText = percent;
            document.getElementById('progress-fill').style.width = percent + "%";
        }

        // DATA DISK EXPORT (Download JSON)
        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(ownedAircraft));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "SKY_PILOT_USA_PROGRESS.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        // DATA DISK IMPORT (Upload JSON)
        function importData(event) {
            const reader = new FileReader();
            reader.onload = function(e) {
                ownedAircraft = JSON.parse(e.target.result);
                saveAndRefresh();
            };
            reader.readAsText(event.target.files[0]);
        }

        window.onload = initiateSystem;
    </script>
</body>
</html>
