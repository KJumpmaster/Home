<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CAOC | USA RESEARCH TREE</title>
    <style>
        /* 1. THE HULL: Aircraft Skin Background */
        body { 
            background: #1a1a1a url('metal%20background.png') no-repeat center center fixed; 
            background-size: cover;
            color: #00ff00; 
            font-family: 'Courier New', monospace; 
            margin: 0; padding: 0;
            min-height: 100vh;
        }

        /* 2. USA STRATEGIC BANNER */
        .usa-hero {
            width: 100%; height: 200px;
            overflow: hidden; border-bottom: 4px solid #00ff00;
            position: relative; background: #000;
        }

        .usa-banner-video { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }

        .title-overlay { 
            position: absolute; bottom: 20px; left: 40px; 
            text-shadow: 0 0 20px #000; 
        }

        /* 3. THE RESEARCH THEATER */
        .tree-viewport {
            padding: 60px 80px; display: flex; flex-direction: column; gap: 100px;
            max-width: 1800px; margin: 0 auto;
        }

        .rank-wrapper { display: flex; align-items: stretch; position: relative; }

        /* ROMAN NUMERAL SIDEBARS */
        .rank-sidebar {
            font-size: 6em; font-weight: bold; color: rgba(0, 255, 0, 0.08);
            writing-mode: vertical-rl; text-orientation: upright;
            padding: 20px; letter-spacing: -10px; display: flex; align-items: center;
            user-select: none;
        }

        .rank-container {
            flex-grow: 1; display: grid; 
            grid-template-columns: repeat(7, 1fr); /* 7 Columns to handle Premium/Event wings */
            grid-auto-rows: 150px;
            gap: 25px;
            position: relative;
            padding: 40px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(0, 255, 0, 0.2);
            box-shadow: inset 0 0 60px rgba(0,0,0,0.9);
        }

        /* ARROW SVG LAYER */
        .arrow-svg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        /* 4. VEHICLE CARDS */
        .v-card {
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid #333; padding: 12px;
            text-align: center; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: 0.3s;
            box-shadow: 8px 8px 15px rgba(0,0,0,0.7);
            z-index: 10;
            position: relative;
        }

        .v-card:hover { 
            border-color: #00ff00; box-shadow: 0 0 25px #00ff00; 
            transform: translateY(-5px) scale(1.03); 
            z-index: 50;
        }

        .premium { border: 2px solid #d4af37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }
        .squadron { border: 2px solid #55efc4; box-shadow: 0 0 15px rgba(85, 239, 196, 0.3); }

        .v-img {
            width: 100%; height: 85px;
            object-fit: contain; filter: drop-shadow(0 0 5px rgba(0,255,0,0.3));
        }

        .v-name { 
            margin-top: 8px; font-size: 0.75em; font-weight: bold; 
            color: #fff; text-transform: uppercase; letter-spacing: 1px;
            line-height: 1.1;
        }

        .back-btn {
            position: fixed; bottom: 30px; left: 30px;
            background: #000; border: 3px solid #00ff00;
            color: #00ff00; padding: 15px 30px;
            text-decoration: none; font-weight: bold; font-size: 1.2em;
            box-shadow: 5px 5px 0px #004400; z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="usa-hero">
        <video class="usa-banner-video" autoplay muted loop playsinline>
            <source src="usa_banner.mp4" type="video/mp4">
        </video>
        <div class="title-overlay">
            <h1 style="font-size: 4em; margin: 0; letter-spacing: 15px;">USA AIR BRANCH</h1>
            <p style="letter-spacing: 5px; font-weight: bold; color: #00ff00;">TACTICAL DATA LINK: ONLINE | RANKS I - IX</p>
        </div>
    </div>

    <div id="research-theater" class="tree-viewport"></div>

    <a href="index.html" class="back-btn">RETURN TO COMMAND</a>

    <script>
        const ROMAN = ["", "I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX"];
        const PIC_BASE = "https://raw.githubusercontent.com/KJumpmaster/WTAircraft_Profile_Pics/main/";
        const GHOST_UNITS = ["xf5f", "placeholder", "empty_"];

        // Deep Scan Cleaner: Strips special characters for better matching
        const clean = (str) => str ? str.toLowerCase().replace(/[^a-z0-9]/g, '') : '';

        async function initiateSystem() {
            try {
                // 1. FETCH INTEL
                const [regRes, treeRes, edgeRes] = await Promise.all([
                    fetch('./SP_Registry_CANON_3_31.csv'),
                    fetch('./usa_tree_v4.json'),
                    fetch('./usa_tree_pass2_edges.csv')
                ]);

                const regText = await regRes.text();
                const treeData = await treeRes.json();
                const edgeText = await edgeRes.text();
                const registry = {};

                // 2. BUILD THE DEEP SCAN MAP
                regText.split('\n').slice(1).forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length > 14) {
                        const img = cols[2]?.replace(/"/g, '').trim();
                        // Map Col 1, 4, 7, and 15
                        [cols[0], cols[3], cols[6], cols[14]].forEach(val => {
                            if (val) registry[clean(val)] = img;
                        });
                    }
                });

                const theater = document.getElementById('research-theater');

                // 3. DEPLOY RANKS
                [1,2,3,4,5,6,7,8,9].forEach(r => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'rank-wrapper';
                    wrapper.innerHTML = `<div class="rank-sidebar">${ROMAN[r]}</div>`;

                    const container = document.createElement('div');
                    container.className = 'rank-container';
                    container.id = `rank-box-${r}`;
                    
                    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                    svg.setAttribute("class", "arrow-svg");
                    svg.id = `svg-rank-${r}`;
                    container.appendChild(svg);

                    // Filter cells for this rank and EXORCISE THE GHOSTS
                    const cells = treeData.cells.filter(c => {
                        const isGhost = GHOST_UNITS.
