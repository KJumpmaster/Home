<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SKY PILOT - USA STABLE V4</title>
    <style>
        body { 
            background: #1a1a1a url('https://raw.githubusercontent.com/KJumpmaster/Home/main/metal_background.png'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; margin: 0; font-family: Arial, sans-serif; overflow-x: auto;
        }
        
        #loading-overlay {
            position: fixed; inset: 0; background: #000 url('https://raw.githubusercontent.com/KJumpmaster/Home/main/Comms_Pic.png') no-repeat center;
            background-size: contain; z-index: 9999; display: flex; align-items: center; justify-content: center;
        }

        #research-wrapper { width: max-content; margin: 0 auto; padding: 80px 40px; position: relative; }

        #research-theater {
            display: grid;
            grid-template-columns: repeat(7, 200px); /* 7 Columns (0-6) */
            grid-template-rows: repeat(9, 130px);    /* 9 Ranks (0-8) */
            grid-gap: 30px 20px;
            position: relative;
        }

        .v-card {
            width: 190px; height: 115px;
            background: rgba(15, 15, 15, 0.95); border: 2px solid #555;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10; position: relative;
        }

        .v-img { width: 90%; height: 70%; object-fit: contain; }

        /* FONT UPGRADE: High visibility Arial */
        .v-name { 
            font-size: 13px; padding: 5px; text-transform: uppercase; text-align: center; 
            color: #ffffff; font-weight: bold; background: rgba(0,0,0,0.5); width: 100%;
        }

        /* Group expansion styling */
        .sub-unit-container {
            position: absolute; top: 100%; left: 0; width: 100%;
            display: flex; flex-direction: column; gap: 5px; padding-top: 5px; z-index: 20;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="loading-overlay"></div>
    <div id="research-wrapper">
        <div id="research-theater"></div>
    </div>

    <script>
        const PIC_BASE = "https://raw.githubusercontent.com/KJumpmaster/Aircraft-Pics/main/";

        async function initiateSystem() {
            const overlay = document.getElementById('loading-overlay');
            const theater = document.getElementById('research-theater');

            try {
                const [treeRes] = await Promise.all([
                    fetch('./usa_tree_pass2_with_arrows.json'),
                    new Promise(res => setTimeout(res, 2000))
                ]);

                if (!treeRes.ok) throw new Error("JSON DATA OFFLINE");
                const treeData = await treeRes.json();

                theater.innerHTML = '';
                
                treeData.cells.forEach(cell => {
                    const card = document.createElement('div');
                    card.className = 'v-card';
                    card.style.gridColumn = parseInt(cell.column) + 1;
                    card.style.gridRow = parseInt(cell.rank) + 1;

                    // Image Logic for Groups vs Units
                    const imgName = cell.kind === 'group' ? `${cell.cell_key}.png` : `${cell.cell_key}.png`;
                    
                    card.innerHTML = `
                        <img src="${PIC_BASE}${imgName}" class="v-img" onerror="this.src='https://placehold.co/200x100/1a1a1a/00ff00?text=SCANNING...';">
                        <div class="v-name">${(cell.display_name).replace(/_/g, ' ')}</div>
                    `;

                    // Logic for the Expanding "Group" Stacks
                    if (cell.kind === 'group' && cell.units) {
                        const subContainer = document.createElement('div');
                        subContainer.className = 'sub-unit-container hidden';
                        
                        cell.units.forEach(unitId => {
                            const subCard = document.createElement('div');
                            subCard.className = 'v-card';
                            subCard.innerHTML = `
                                <img src="${PIC_BASE}${unitId}.png" class="v-img">
                                <div class="v-name">${unitId.replace(/-/g, ' ')}</div>
                            `;
                            subContainer.appendChild(subCard);
                        });
                        
                        card.appendChild(subContainer);
                        card.onclick = () => subContainer.classList.toggle('hidden');
                    }

                    theater.appendChild(card);
                });

                overlay.style.display = 'none';
            } catch (err) {
                overlay.innerHTML = `<h1 style="color:red">ERROR: ${err.message}</h1>`;
            }
        }
        window.onload = initiateSystem;
    </script>
</body>
</html>
