<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SKY PILOT - USA STRATEGIC COMMAND</title>
    <style>
        /* UI BASE */
        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #0a0a0a url('https://raw.githubusercontent.com/KJumpmaster/Home/main/metal_background.png') no-repeat center center fixed !important;
            background-size: cover !important;
            color: white; font-family: 'Segoe UI', Arial, sans-serif;
            overflow-x: hidden;
        }

        /* HUD & HEADER */
        #tactical-hud {
            position: sticky; top: 0; width: 100%; background: rgba(0, 20, 0, 0.98);
            border-bottom: 2px solid #00ff00; padding: 12px 30px; z-index: 5000;
            display: flex; align-items: center; justify-content: space-between; box-sizing: border-box;
        }
        .hud-stats { font-family: monospace; color: #00ff00; font-size: 22px; font-weight: bold; }
        #hud-progress-bg { width: 300px; height: 16px; background: #111; border: 1px solid #00ff00; overflow: hidden; }
        #hud-progress-fill { width: 0%; height: 100%; background: #00ff00; box-shadow: 0 0 15px #00ff00; transition: width 0.6s; }

        #strategic-header {
            width: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px 0;
            background: rgba(0, 0, 0, 0.8); border-bottom: 2px solid #00ff00;
        }
        #banner-container { width: 75%; height: 180px; overflow: hidden; border: 1px solid #444; position: relative; }
        #banner-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }
        #main-title { font-size: 32px; font-weight: bold; color: #00ff00; letter-spacing: 10px; text-transform: uppercase; margin-top: 15px; }

        /* RESEARCH THEATER */
        #research-wrapper { display: flex; justify-content: flex-start; padding: 10px 0 150px 15px; position: relative; }
        
        #research-theater {
            display: grid;
            grid-template-columns: 140px repeat(5, 210px) repeat(2, 210px); 
            grid-auto-rows: min-content; grid-gap: 35px 15px;
            position: relative; /* All coords relative to this */
        }

        /* SVG OVERLAY: ARROWS */
        #arrow-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }

        /* HEADER RIBBONS */
        .col-header {
            height: 40px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; text-transform: uppercase; letter-spacing: 3px; font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2); grid-row: 1; margin-bottom: 20px;
        }
        .header-research { grid-column: 2 / span 5; background: rgba(0, 255, 0, 0.25); color: #8cff8c; border-color: #00ff00; }
        .header-premium { grid-column: 7 / span 2; background: rgba(184, 134, 11, 0.4); color: #d4af37; border-color: #b8860b; }

        /* RANK LABELS: 60px */
        .rank-marker {
            grid-column: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 900; color: #00ff00; font-size: 60px; opacity: 0.15; 
            text-transform: uppercase; pointer-events: none; line-height: 1.1;
        }

        /* UNIT CARDS */
        .v-card {
            width: 200px; height: 130px; background: rgba(5, 5, 5, 0.98); border: 2px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; transition: 0.2s; filter: grayscale(1); opacity: 0.6; z-index: 10;
        }
        .v-card.obtained { filter: grayscale(0); opacity: 1; border-color: #00ff00; box-shadow: 0 0 15px rgba(0,255,0,0.4); }
        .v-card.premium { border-color: #b8860b; }
        .v-card.premium .v-name { background: rgba(184, 134, 11, 0.6) !important; color: #fff; }

        .v-img { width: 92%; height: 68%; object-fit: contain; pointer-events: none; }
        .v-name { 
            font-size: 11px; padding: 5px; text-align: center; font-weight: bold; width: 100%; 
            box-sizing: border-box; background: rgba(0,255,0,0.2); text-transform: uppercase;
        }

        /* TACTICAL ARROWS */
        .research-line { stroke: yellow; stroke-width: 3.5; fill: none; transition: 0.3s; }
        .line-solid { stroke: #00ff00; stroke-width: 5; filter: drop-shadow(0 0 8px #00ff00); }
        .line-dashed { stroke: yellow; stroke-width: 2.5; stroke-dasharray: 8,5; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="tactical-hud">
        <div class="hud-stats">OBTAINED: <span id="count-num">0</span> / <span id="total-num">0</span> (<span id="percent-num">0</span>%)</div>
        <div id="hud-progress-bg"><div id="hud-progress-fill"></div></div>
        <div class="hud-btns">
            <button onclick="exportData()" style="background:#000; color:#00ff00; border:1px solid #00ff00; padding:5px 15px; cursor:pointer;">Export Data Disk</button>
            <button onclick="document.getElementById('import-input').click()" style="background:#000; color:#00ff00; border:1px solid #00ff00; padding:5px 15px; cursor:pointer;">Import Data Disk</button>
            <input type="file" id="import-input" style="display:none" onchange="importData(event)">
        </div>
    </div>

    <header id="strategic-header">
        <div id="banner-container">
            <video id="banner-video" autoplay loop muted playsinline><source src="https://raw.githubusercontent.com/KJumpmaster/Home/main/USA Banner.mp4" type="video/mp4"></video>
        </div>
        <div id="main-title">USA AIR GROUP STRATEGIC COMMAND</div>
    </header>

    <div id="research-wrapper">
        <div id="research-theater">
            <svg id="arrow-canvas"><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="yellow" /></marker></defs></svg>
            
            <div class="col-header header-research">Researchable Airframes</div>
            <div class="col-header header-premium">Premium Vehicles</div>
        </div>
    </div>

    <script>
        const PIC_BASE = "https://raw.githubusercontent.com/KJumpmaster/Aircraft-Pics/main/";
        const JSON_URL = "https://raw.githubusercontent.com/KJumpmaster/Home/main/usa_tree_pass2_with_arrows.json";
        
        let ownedAircraft = JSON.parse(localStorage.getItem('skyPilotProgress')) || [];
        let totalCount = 0;

        function normalize(id) { return id ? id.toLowerCase().replace(/[^a-z0-9]/g, '') : ""; }

        async function initiateSystem() {
            const theater = document.getElementById('research-theater');
            const canvas = document.getElementById('arrow-canvas');

            try {
                const treeRes = await fetch(JSON_URL);
                const treeData = await treeRes.json();
                
                const ranks = ["Rank I", "Rank II", "Rank III", "Rank IV", "Rank V", "Rank VI", "Rank VII", "Rank VIII", "Rank IX"];
                ranks.forEach((label, i) => {
                    const rowStart = (i * 8) + 2; 
                    const marker = document.createElement('div');
                    marker.className = 'rank-marker';
                    marker.style.gridRow = `${rowStart} / span 7`;
                    marker.innerHTML = label.split(" ")[0].split("").join("<br>") + "<br><br>" + (label.split(" ")[1] || "");
                    theater.appendChild(marker);
                });

                treeData.cells.forEach(cell => {
                    totalCount++;
                    const card = document.createElement('div');
                    const normID = normalize(cell.cell_key);
                    card.className = 'v-card';
                    card.id = `cell-${normID}`;
                    
                    if (ownedAircraft.includes(normID)) card.classList.add('obtained');
                    
                    // CORRECTED LOGIC: Premium starts at CSV Column 6
                    const col = parseInt(cell.column);
                    if (col >= 6) card.classList.add('premium');

                    card.style.gridColumn = col + 1; // Correct column alignment
                    card.style.gridRow = ((parseInt(cell.rank) - 1) * 8) + (parseInt(cell.row_in_rank || 1)) + 1;

                    card.innerHTML = `
                        <img src="${PIC_BASE}${cell.cell_key}.png" class="v-img" onerror="this.src='https://placehold.co/200x130/1a1a1a/00ff00?text=SCANNING...';">
                        <div class="v-name">${cell.display_name.toUpperCase().replace(/_/g, ' ')}</div>
                    `;
                    card.onclick = () => toggleObtained(normID);
                    theater.appendChild(card);
                });

                updateHUD();

                if (treeData.arrows) {
                    // Slight delay to allow browser to calculate card positions
                    setTimeout(() => {
                        treeData.arrows.forEach(link => {
                            const pID = normalize(link.from);
                            const cID = normalize(link.to);
                            const achieved = ownedAircraft.includes(pID) && ownedAircraft.includes(cID);
                            const potential = ownedAircraft.includes(pID) && !ownedAircraft.includes(cID);
                            drawArrow(pID, cID, canvas, achieved, potential);
                        });
                    }, 1000);
                }

            } catch (err) { console.error("HUD Error:", err); }
        }

        function drawArrow(pID, cID, svg, achieved, potential) {
            const p = document.getElementById(`cell-${pID}`);
            const c = document.getElementById(`cell-${cID}`);
            if (!p || !c) return;
            
            const theater = document.getElementById('research-theater');
            const pRect = p.getBoundingClientRect(); 
            const cRect = c.getBoundingClientRect();
            const theaterRect = theater.getBoundingClientRect();
            
            const x1 = pRect.left + pRect.width / 2 - theaterRect.left;
            const y1 = pRect.bottom - theaterRect.top;
            const x2 = cRect.left + cRect.width / 2 - theaterRect.left;
            const y2 = cRect.top - theaterRect.top;
            
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", x1); line.setAttribute("y1", y1); 
            line.setAttribute("x2", x2); line.setAttribute("y2", y2 - 8);
            line.classList.add("research-line");
            
            if (achieved) line.classList.add("line-solid");
            else if (potential) line.classList.add("line-dashed");
            else line.style.opacity = "0.08";
            
            line.setAttribute("marker-end", "url(#arrowhead)");
            svg.appendChild(line);
        }

        function toggleObtained(id) {
            if (ownedAircraft.includes(id)) ownedAircraft = ownedAircraft.filter(i => i !== id);
            else ownedAircraft.push(id);
            localStorage.setItem('skyPilotProgress', JSON.stringify(ownedAircraft));
            location.reload();
        }

        function updateHUD() {
            document.getElementById('count-num').innerText = ownedAircraft.length;
            document.getElementById('total-num').innerText = totalCount;
            const percent = Math.round((ownedAircraft.length / totalCount) * 100) || 0;
            document.getElementById('percent-num').innerText = percent;
            document.getElementById('hud-progress-fill').style.width = percent + "%";
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(ownedAircraft)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = "SKY_PILOT_PROGRESS.json";
            a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                ownedAircraft = JSON.parse(event.target.result);
                localStorage.setItem('skyPilotProgress', JSON.stringify(ownedAircraft));
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        }
        window.onload = initiateSystem;
    </script>
</body>
</html>
