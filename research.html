<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SKY PILOT - USA STABLE V4</title>
    <style>
        /* UI BASE: Absolute paths for Home repo assets */
        body { 
            background: #1a1a1a url('https://raw.githubusercontent.com/KJumpmaster/Home/main/metal_background.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: white; 
            margin: 0; 
            font-family: sans-serif; 
            overflow-x: auto;
        }
        
        #loading-overlay {
            position: fixed; inset: 0; 
            background: #000 url('https://raw.githubusercontent.com/KJumpmaster/Home/main/Comms_Pic.png') no-repeat center;
            background-size: contain;
            z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }

        #research-wrapper {
            width: max-content;
            margin: 0 auto;
            padding: 80px 40px;
        }

        /* GRID: Ranks 0-4 (Research) + Ranks 5-8 (Special/Premium) */
        #research-theater {
            display: grid;
            grid-template-columns: repeat(12, 190px); 
            /* Expanded to 9 Rows to fit Ranks 0 through 8 */
            grid-template-rows: repeat(9, 125px); 
            grid-gap: 25px 15px;
            position: relative;
        }

        .v-card {
            width: 180px; 
            height: 110px;
            background: rgba(20, 20, 20, 0.9); 
            border: 2px solid #444;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .v-img { 
            width: 95%; 
            height: 70%; 
            object-fit: contain; 
        }

        .v-name { 
            font-size: 10px; 
            padding: 4px; 
            text-transform: uppercase; 
            text-align: center; 
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div id="loading-overlay"></div>

    <div id="research-wrapper">
        <div id="research-theater"></div>
    </div>

    <script>
        const PIC_BASE = "https://raw.githubusercontent.com/KJumpmaster/Aircraft-Pics/main/";

        async function initiateSystem() {
            const overlay = document.getElementById('loading-overlay');
            const theater = document.getElementById('research-theater');
            const handshake = new Promise(res => setTimeout(res, 2000));

            try {
                const [treeRes, regRes] = await Promise.all([
                    fetch('./usa_tree_v4.json'),
                    fetch('./SP_Registry_CANON_3_31.csv'),
                    handshake
                ]);

                if (!treeRes.ok || !regRes.ok) throw new Error("CRITICAL ASSETS OFFLINE");

                const treeData = await treeRes.json();
                const regText = await regRes.text();

                // Registry Parsing from Column 3
                const registry = {};
                const lines = regText.split('\n');
                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length > 2) {
                        const id = cols[0].replace(/"/g, '').trim().toLowerCase();
                        const img = cols[2].replace(/"/g, '').trim(); 
                        if (id) registry[id] = img;
                    }
                }

                theater.innerHTML = '';
                
                treeData.cells.forEach(cell => {
                    const id = String(cell.cell_id).toLowerCase();
                    const card = document.createElement('div');
                    card.className = 'v-card';
                    
                    // Column & Row mapping with +1 offset for CSS Grid (0-8 maps to 1-9)
                    card.style.gridColumn = parseInt(cell.column) + 1;
                    card.style.gridRow = parseInt(cell.row) + 1;

                    const imgFile = registry[id] || 'placeholder.png';
                    
                    card.innerHTML = `
                        <img src="${PIC_BASE}${imgFile}" 
                             class="v-img" 
                             onerror="this.onerror=null; this.src='https://placehold.co/200x100/1a1a1a/00ff00?text=SCANNING...';">
                        <div class="v-name">${(cell.display_name || cell.cell_id).replace(/_/g, ' ')}</div>
                    `;
                    theater.appendChild(card);
                });

                overlay.style.display = 'none';

            } catch (err) {
                overlay.innerHTML = `<h1 style="color:red; background:black; padding:20px;">ERROR: ${err.message}</h1>`;
            }
        }

        window.onload = initiateSystem;
    </script>
</body>
</html>
