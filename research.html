<script>
    async function buildLinkedTree() {
        console.log("Commencing Data Link Sync..."); // Tactical Ping
        try {
            // 1. LOAD THE REGISTRY
            // We use './' to force the browser to look in the current folder
            const regRes = await fetch('./SP_Registry_CANON_3_31.csv');
            if (!regRes.ok) throw new Error("Registry File Not Found (404)");
            
            const regData = await regRes.text();
            const registry = {}; 
            
            regData.split('\n').slice(1).forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if(cols.length > 14) {
                    const img = cols[2]?.replace(/"/g, '').trim();
                    const k1 = cols[0]?.replace(/"/g, '').trim(); 
                    const k4 = cols[3]?.replace(/"/g, '').trim();
                    const k7 = cols[6]?.replace(/"/g, '').trim();
                    const k15 = cols[14]?.replace(/"/g, '').trim();
                    [k1, k4, k7, k15].forEach(k => { if(k) registry[k] = img; });
                }
            });
            console.log("Registry Sync: SUCCESS");

            // 2. LOAD THE TREE JSON
            const treeRes = await fetch('./usa_tree_v4.json');
            if (!treeRes.ok) throw new Error("JSON Tree File Not Found (404)");
            
            const treeData = await treeRes.json();
            const theater = document.getElementById('research-theater');
            const picBase = "https://raw.githubusercontent.com/KJumpmaster/WTAircraft_Profile_Pics/main/";

            // 3. RENDER THE RANKS
            const ranks = [1,2,3,4,5,6,7,8,9];
            ranks.forEach(rankNum => {
                const cells = treeData.cells.filter(c => c.rank === rankNum);
                if(cells.length > 0) {
                    const section = document.createElement('div');
                    section.className = 'rank-container';
                    section.innerHTML = `<div class="rank-label">RANK ${rankNum}</div>`;

                    cells.forEach(cell => {
                        const icon = registry[cell.cell_id] || registry[cell.display_name] || 'placeholder.png';
                        let specialClass = "";
                        if (cell.flags.is_premium || cell.flags.is_pack) specialClass = "premium";
                        else if (cell.flags.is_squadron || cell.flags.is_event) specialClass = "squadron";

                        const card = document.createElement('div');
                        card.className = `v-card ${specialClass}`;
                        card.style.gridColumn = cell.column;
                        card.style.gridRow = cell.row;
                        card.innerHTML = `
                            <img src="${picBase}${icon}" class="v-img" onerror="this.src='https://placehold.co/200x100/000000/00ff00?text=NOT+FOUND';">
                            <div class="v-name">${cell.display_name.replace(/_/g, ' ')}</div>
                        `;
                        section.appendChild(card);
                    });
                    theater.appendChild(section);
                }
            });
            console.log("Tree Render: COMPLETE");

        } catch (err) {
            console.error("CRITICAL FAILURE:", err.message);
            // Show the error on screen so you can see it
            document.getElementById('research-theater').innerHTML = 
                `<div style="color:red; padding:20px; border:2px solid red;">
                    <h3>INTEL LINK BROKEN</h3>
                    <p>${err.message}</p>
                    <p>Check if the file names in GitHub match EXACTLY: SP_Registry_CANON_3_31.csv and usa_tree_v4.json</p>
                </div>`;
        }
    }
    buildLinkedTree();
</script>
