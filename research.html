<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CAOC | USA RESEARCH TREE</title>
    <style>
        /* 1. THE HULL: Aircraft Skin Background */
        body { 
            background: #1a1a1a url('metal%20background.png') no-repeat center center fixed; 
            background-size: cover;
            color: #00ff00; 
            font-family: 'Courier New', monospace; 
            margin: 0; padding: 0;
            min-height: 100vh;
        }

        /* 2. USA STRATEGIC BANNER */
        .usa-hero {
            width: 100%; height: 200px;
            overflow: hidden; border-bottom: 4px solid #00ff00;
            position: relative; background: #000;
        }

        .usa-banner-video { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }

        .title-overlay { 
            position: absolute; bottom: 20px; left: 40px; 
            text-shadow: 0 0 20px #000; 
        }

        /* 3. THE RESEARCH THEATER: 5-Column Tactical Grid */
        .tree-viewport {
            padding: 40px; display: flex; flex-direction: column; gap: 80px;
            max-width: 1600px; margin: 0 auto;
        }

        .rank-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* Standard 5-column WT Layout */
            grid-auto-rows: 140px;
            gap: 25px;
            position: relative;
            padding: 30px;
            background: rgba(0, 0, 0, 0.4);
            border-left: 12px solid #00ff00;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        .rank-label { 
            font-size: 4em; font-weight: bold; color: rgba(0, 255, 0, 0.15);
            position: absolute; left: -80px; top: 50%; 
            transform: translateY(-50%) rotate(-90deg);
            white-space: nowrap;
            letter-spacing: 15px;
        }

        /* 4. VEHICLE CARDS */
        .v-card {
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid #333; padding: 12px;
            text-align: center; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: 0.3s;
            box-shadow: 8px 8px 15px rgba(0,0,0,0.7);
        }

        .v-card:hover { 
            border-color: #00ff00; box-shadow: 0 0 30px #00ff00; 
            transform: translateY(-5px) scale(1.03); 
            z-index: 10;
        }

        .v-img {
            width: 100%; height: 80px;
            object-fit: contain; filter: drop-shadow(0 0 5px rgba(0,255,0,0.4));
        }

        .v-name { 
            margin-top: 10px; font-size: 0.75em; font-weight: bold; 
            color: #fff; text-transform: uppercase; letter-spacing: 1px;
            line-height: 1.2;
        }

        .back-btn {
            position: fixed; bottom: 30px; left: 30px;
            background: #000; border: 3px solid #00ff00;
            color: #00ff00; padding: 15px 30px;
            text-decoration: none; font-weight: bold; font-size: 1.2em;
            box-shadow: 5px 5px 0px #004400; z-index: 1000;
        }
    </style>
</head>

    <div class="usa-hero
