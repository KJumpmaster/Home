<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKY PILOT - USA Research Tree</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow-x: auto;
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-family: monospace;
            font-size: 24px;
            color: #00ff00;
        }

        #research-wrapper {
            position: relative;
            width: max-content;
            margin: 40px auto;
            padding: 50px;
        }

        #edge-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: visible;
            z-index: 1;
        }

        #research-theater {
            position: relative;
            display: grid;
            grid-gap: 40px 30px; 
            z-index: 2;
        }

        .v-card {
            position: relative;
            z-index: 3;
            width: 180px;
            height: 100px;
            background: rgba(30, 30, 30, 0.9);
            border: 2px solid #444;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .v-img {
            width: 100%;
            height: 70%;
            object-fit: contain;
        }

        .v-name {
            font-size: 11px;
            text-align: center;
            padding: 4px;
            text-transform: uppercase;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            width: 100%;
        }

        .tree-edge {
            stroke: rgba(120, 255, 120, 0.65);
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">INITIALIZING...</div>

    <div id="research-wrapper">
        <svg id="edge-layer"></svg>
        <div id="research-theater"></div>
    </div>

    <script>
        const PIC_BASE = "https://raw.githubusercontent.com/JumpingKJ/KJ_Project_NORDEN/main/Graphics/Planes/Icons/";

        async function initiateSystem() {
            const overlay = document.getElementById('loading-overlay');
            const theater = document.getElementById('research-theater');
            const edgeLayer = document.getElementById('edge-layer');

            try {
                const [treeRes, regRes] = await Promise.all([
                    fetch('./usa_tree_v4.json'),
                    fetch('./SP_Registry_CANON_3_31.csv')
                ]);

                if (!treeRes.ok || !regRes.ok) throw new Error("CORE FILES MISSING");

                const treeData = await treeRes.json();
                const regText = await regRes.text();

                // 1. Map Registry
                const registry = {};
                const lines = regText.split('\n');
                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length > 2) {
                        const id = cols[0].replace(/"/g, '').trim().toLowerCase();
                        const img = cols[2].replace(/"/g, '').trim();
                        if (id) registry[id] = img;
                    }
                }

                // 2. Render Grid
                theater.innerHTML = '';
                treeData.cells.forEach(cell => {
                    const id = String(cell.cell_id).toLowerCase();
                    const card = document.createElement('div');
                    card.className = 'v-card';
                    card.dataset.cellId = id;
                    card.style.gridColumn = cell.column;
                    card.style.gridRow = cell.row;

                    card.innerHTML = `
                        <img src="${PIC_BASE}${registry[id] || 'placeholder.png'}" class="v-img" onerror="this.src='https://placehold.co/200x100/000?text=SCANNING';">
                        <div class="v-name">${(cell.display_name || cell.cell_id).replace(/_/g, ' ')}</div>
                    `;
                    theater.appendChild(card);
                });

                // 3. Draw Lines
                requestAnimationFrame(() => drawEdges(treeData.edges || [], theater, edgeLayer));

                overlay.style.display = 'none';
            } catch (err) {
                overlay.innerHTML = `<h1 style="color:red;">OFFLINE: ${err.message}</h1>`;
            }
        }

        function drawEdges(edges, theater, edgeLayer) {
            const tRect = theater.getBoundingClientRect();
            edgeLayer.setAttribute('viewBox', `0 0 ${theater.scrollWidth} ${theater.scrollHeight}`);
            edgeLayer.setAttribute('width', theater.scrollWidth);
            edgeLayer.setAttribute('height', theater.scrollHeight);

            const cardMap = new Map();
            theater.querySelectorAll('.v-card').forEach(c => cardMap.set(c.dataset.cellId, c));

            edges.forEach(e => {
                const from = cardMap.get(String(e.from || e.source).toLowerCase());
                const to = cardMap.get(String(e.to || e.target).toLowerCase());
                if (!from || !to) return;

                const fR = from.getBoundingClientRect();
                const tR = to.getBoundingClientRect();

                const x1 = (fR.left - tRect.left) + (fR.width / 2);
                const y1 = (fR.top - tRect.top) + fR.height;
                const x2 = (tR.left - tRect.left) + (tR.width / 2);
                const y2 = (tR.top - tRect.top);

                const midY = y1 + ((y2 - y1) / 2);
                const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                p.setAttribute("d", `M ${x1} ${y1} L ${x1} ${midY} L ${x2} ${midY} L ${x2} ${y2}`);
                p.setAttribute("class", "tree-edge");
                edgeLayer.appendChild(p);
            });
        }

        window.onload = initiateSystem;
    </script>
</body>
</html>
