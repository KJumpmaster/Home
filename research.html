<!DOCTYPE html>
<html>
<head>
    <title>SKY PILOT - GROUND ZERO</title>
    <style>
        body { background: #111; color: #0f0; font-family: monospace; margin: 0; padding: 20px; }
        
        /* The Grid: 10 columns for the USA Tree */
        #research-theater {
            display: grid;
            grid-template-columns: repeat(10, 180px);
            grid-gap: 20px;
            margin-top: 50px;
        }

        /* The Card: Simple and Bold */
        .v-card {
            width: 180px;
            height: 100px;
            background: #222;
            border: 2px solid #444;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .v-img { width: 100%; height: 70%; object-fit: contain; }
        .v-name { font-size: 10px; color: white; padding: 5px; text-transform: uppercase; }
        
        #status { font-size: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="status">SYSTEM RESET: INITIALIZING V4...</div>
    <div id="research-theater"></div>

    <script>
        // MASTER LINK TO YOUR GITHUB ICONS
        const PIC_BASE = "https://raw.githubusercontent.com/JumpingKJ/KJ_Project_NORDEN/main/Graphics/Planes/Icons/";

        async function startOver() {
            const theater = document.getElementById('research-theater');
            const status = document.getElementById('status');

            try {
                // 1. GET THE DATA
                const [treeRes, regRes] = await Promise.all([
                    fetch('./usa_tree_v4.json'),
                    fetch('./SP_Registry_CANON_3_31.csv')
                ]);

                if (!treeRes.ok || !regRes.ok) throw new Error("FILES MISSING IN FOLDER");

                const treeData = await treeRes.json();
                const regText = await regRes.text();

                // 2. BUILD THE IMAGE MAP (Column 3)
                const registry = {};
                const lines = regText.split('\n');
                lines.forEach(line => {
                    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length > 2) {
                        const id = cols[0].replace(/"/g, '').trim().toLowerCase();
                        const img = cols[2].replace(/"/g, '').trim(); 
                        registry[id] = img;
                    }
                });

                // 3. DRAW THE CARDS
                theater.innerHTML = '';
                treeData.cells.forEach(cell => {
                    const id = String(cell.cell_id).toLowerCase();
                    const card = document.createElement('div');
                    card.className = 'v-card';
                    
                    // Placement from V4 JSON
                    card.style.gridColumn = cell.column;
                    card.style.gridRow = cell.row;

                    card.innerHTML = `
                        <img src="${PIC_BASE}${registry[id] || 'placeholder.png'}" class="v-img" 
                             onerror="this.src='https://placehold.co/200x100/000?text=MISSING';">
                        <div class="v-name">${(cell.display_name || cell.cell_id).replace(/_/g, ' ')}</div>
                    `;
                    theater.appendChild(card);
                });

                status.innerText = "SYSTEM ONLINE - V4 GRID ACTIVE";

            } catch (err) {
                status.style.color = "red";
                status.innerText = "CRITICAL ERROR: " + err.message;
            }
        }

        window.onload = startOver;
    </script>
</body>
</html>
