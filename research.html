<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky Pilot Research Tree</title>

  <style>
    :root{
      --bg: #0b1220;
      --panel: #111a2b;
      --panel-2: #152033;
      --panel-3: #1b2940;
      --line: rgba(120, 170, 255, 0.22);
      --line-strong: rgba(255, 219, 92, 0.85);
      --line-glow: rgba(255, 219, 92, 0.28);
      --text: #e6eefc;
      --muted: #8da0bf;
      --accent: #6ea8ff;
      --group: #2f4f78;
      --owned: #21452d;
      --researchable: #4e4321;
      --locked: #1a2233;
      --premium: #3a2a55;
      --squadron: #234357;

      --tree-left-pad: 110px;
      --tree-top-pad: 24px;
      --tree-right-pad: 32px;
      --tree-bottom-pad: 40px;

      --col-width: 220px;
      --cell-width: 168px;
      --cell-height: 102px;

      --rank-height: 300px;
      --row-gap: 18px;

      --rank-label-width: 78px;
      --grid-line: rgba(255,255,255,0.035);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #08101d 0%, #0d1524 100%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      overflow: hidden;
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(10, 16, 28, 0.96);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 8px 24px rgba(0,0,0,0.22);
      z-index: 20;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: #f3f7ff;
      margin-right: 14px;
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .toolbar-spacer {
      flex: 1 1 auto;
    }

    button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, #182338 0%, #111a2c 100%);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      border-color: rgba(255,255,255,0.18);
      background: linear-gradient(180deg, #1b2942 0%, #162136 100%);
    }

    #viewport {
      position: relative;
      flex: 1 1 auto;
      overflow: auto;
      background:
        radial-gradient(circle at top left, rgba(65, 110, 180, 0.10), transparent 30%),
        radial-gradient(circle at top right, rgba(90, 140, 210, 0.08), transparent 22%),
        linear-gradient(180deg, #091120 0%, #0b1322 100%);
    }

    #treeRoot {
      position: relative;
      min-width: 1200px;
      min-height: 900px;
      margin: 0;
    }

    .rank-band {
      position: absolute;
      left: 0;
      right: 0;
      border-top: 1px solid rgba(255,255,255,0.055);
      border-bottom: 1px solid rgba(255,255,255,0.04);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.008));
      pointer-events: none;
    }

    .rank-band.alt {
      background:
        linear-gradient(180deg, rgba(140,180,255,0.05), rgba(255,255,255,0.01));
    }

    .rank-label {
      position: absolute;
      left: 14px;
      width: var(--rank-label-width);
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(26,39,61,0.92), rgba(17,26,43,0.96));
      border: 1px solid rgba(255,255,255,0.07);
      color: #dfe9ff;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 1px;
      pointer-events: none;
      z-index: 2;
      box-shadow: 0 8px 18px rgba(0,0,0,0.2);
    }

    .column-guide {
      position: absolute;
      top: 0;
      bottom: 0;
      width: var(--col-width);
      pointer-events: none;
      z-index: 0;
    }

    .column-guide::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 1px;
      transform: translateX(-50%);
      background: var(--grid-line);
    }

    .column-guide.side {
      background: linear-gradient(180deg, rgba(150,170,255,0.03), rgba(100,120,180,0.02));
    }

    .column-label {
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(220,230,255,0.48);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .side-divider {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.10), rgba(255,255,255,0.03));
      pointer-events: none;
      z-index: 1;
    }

    #edgeLayer {
      position: absolute;
      inset: 0;
      overflow: visible;
      z-index: 1;
      pointer-events: none;
    }

    .edge-base {
      fill: none;
      stroke: var(--line);
      stroke-width: 2.2;
      stroke-linejoin: round;
      stroke-linecap: round;
    }

    .edge-active {
      fill: none;
      stroke: var(--line-strong);
      stroke-width: 3;
      stroke-linejoin: round;
      stroke-linecap: round;
      filter: drop-shadow(0 0 6px var(--line-glow));
      opacity: 0;
    }

    .edge-hover {
      opacity: 1 !important;
    }

    #nodeLayer {
      position: absolute;
      inset: 0;
      z-index: 3;
    }

    .cell {
      position: absolute;
      width: var(--cell-width);
      height: var(--cell-height);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(28,42,66,0.98), rgba(17,27,44,0.98));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 10px 20px rgba(0,0,0,0.24),
        inset 0 1px 0 rgba(255,255,255,0.04);
      overflow: hidden;
      cursor: default;
      user-select: none;
      transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
    }

    .cell:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.18);
      box-shadow:
        0 14px 26px rgba(0,0,0,0.30),
        0 0 0 1px rgba(130,180,255,0.14),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .cell.locked    { background: linear-gradient(180deg, #1a2437, #121a2b); }
    .cell.premium   { background: linear-gradient(180deg, #3a2954, #261b3a); }
    .cell.squadron  { background: linear-gradient(180deg, #1f3c52, #162b39); }
    .cell.grouped   { background: linear-gradient(180deg, #243858, #18263c); }

    .cell-back,
    .cell-back-2 {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.05);
      background: linear-gradient(180deg, rgba(120,150,210,0.12), rgba(70,100,150,0.08));
      pointer-events: none;
    }

    .cell-back {
      transform: translate(8px, -6px);
      opacity: 0.45;
      z-index: -1;
    }

    .cell-back-2 {
      transform: translate(14px, -11px);
      opacity: 0.22;
      z-index: -2;
    }

    .cell-header {
      height: 24px;
      padding: 0 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.00));
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .cell-body {
      position: absolute;
      left: 0;
      right: 0;
      top: 24px;
      bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 10px;
    }

    .cell-visual {
      width: 100%;
      height: 100%;
      border-radius: 10px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015)),
        radial-gradient(circle at center, rgba(130,170,255,0.18), transparent 58%);
      border: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(230,238,252,0.82);
      font-size: 12px;
      text-align: center;
      padding: 6px;
    }

    .cell-footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 9px;
      background: linear-gradient(180deg, rgba(0,0,0,0.05), rgba(0,0,0,0.16));
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .cell-name {
      flex: 1 1 auto;
      min-width: 0;
      font-size: 12px;
      font-weight: 700;
      color: #edf4ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cell-meta {
      flex: 0 0 auto;
      font-size: 11px;
      color: #9ab0d0;
      opacity: 0.95;
    }

    .group-badge,
    .type-badge {
      flex: 0 0 auto;
      min-width: 18px;
      height: 18px;
      padding: 0 6px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.3px;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.06);
      color: #edf3ff;
    }

    .group-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: 100%;
      align-items: stretch;
      justify-content: center;
    }

    .group-item {
      height: 20px;
      border-radius: 6px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025));
      border: 1px solid rgba(255,255,255,0.06);
      color: #dce7fb;
      font-size: 11px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .legend {
      position: absolute;
      right: 16px;
      top: 16px;
      z-index: 10;
      background: rgba(13, 20, 34, 0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: auto auto;
      gap: 8px 12px;
      box-shadow: 0 12px 24px rgba(0,0,0,0.22);
      font-size: 12px;
      color: var(--muted);
    }

    .legend-chip {
      width: 18px;
      height: 18px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.09);
      background: linear-gradient(180deg, rgba(28,42,66,0.98), rgba(17,27,44,0.98));
    }

    .legend-chip.grouped { background: linear-gradient(180deg, #243858, #18263c); }
    .legend-chip.premium { background: linear-gradient(180deg, #3a2954, #261b3a); }
    .legend-chip.squadron { background: linear-gradient(180deg, #1f3c52, #162b39); }

    .error-box {
      margin: 20px;
      padding: 16px 18px;
      border-radius: 12px;
      background: rgba(72, 20, 20, 0.65);
      border: 1px solid rgba(255, 120, 120, 0.20);
      color: #ffd6d6;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="title">Sky Pilot — Research Tree</div>
      <div id="status" class="status">Loading…</div>
      <div class="toolbar-spacer"></div>
      <button id="fitBtn" type="button">Fit to Top</button>
      <button id="reloadBtn" type="button">Reload</button>
    </div>

    <div id="viewport">
      <div class="legend">
        <div class="legend-chip"></div><div>Unit cell</div>
        <div class="legend-chip grouped"></div><div>Grouped / folder cell</div>
        <div class="legend-chip premium"></div><div>Side lane / premium style</div>
        <div class="legend-chip squadron"></div><div>Side lane / special style</div>
      </div>

      <div id="treeRoot">
        <svg id="edgeLayer"></svg>
        <div id="nodeLayer"></div>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // CONFIG
    // ============================================================
    const DATA_CANDIDATES = [
      "usa_tree_v4.json",
      "tree_cells.json",
      "usa_tree.json",
      "tree.json"
    ];

    const LAYOUT = {
      leftPad: 110,
      topPad: 24,
      rightPad: 32,
      bottomPad: 40,

      colWidth: 220,
      cellWidth: 168,
      cellHeight: 102,

      rankHeight: 300,
      rowGap: 18,

      totalColumns: 7,
      mainColumns: 5
    };

    // ============================================================
    // DOM
    // ============================================================
    const statusEl = document.getElementById("status");
    const viewportEl = document.getElementById("viewport");
    const treeRootEl = document.getElementById("treeRoot");
    const edgeLayerEl = document.getElementById("edgeLayer");
    const nodeLayerEl = document.getElementById("nodeLayer");
    const fitBtn = document.getElementById("fitBtn");
    const reloadBtn = document.getElementById("reloadBtn");

    fitBtn.addEventListener("click", () => {
      viewportEl.scrollTo({ left: 0, top: 0, behavior: "smooth" });
    });

    reloadBtn.addEventListener("click", () => {
      location.reload();
    });

    // ============================================================
    // LOAD
    // ============================================================
    init();

    async function init() {
      try {
        setStatus("Loading tree data…");

        const payload = await loadFirstAvailableJson(DATA_CANDIDATES);
        const normalized = normalizePayload(payload.data);

        if (!normalized.cells.length) {
          throw new Error(
            "No cells found in JSON.\n\n" +
            "Expected something like:\n" +
            "- top-level array of cells\n" +
            "- { cells: [...] }\n" +
            "- { tree_cells: [...] }\n" +
            "- { nodes / units plus edges converted into cells }\n"
          );
        }

        renderTree(normalized, payload.name);
      } catch (err) {
        console.error(err);
        showError(
          "Could not load/render research tree.\n\n" +
          String(err.message || err) + "\n\n" +
          "If you are opening this as file:// directly, fetch may be blocked by the browser.\n" +
          "Use a small local server if needed."
        );
        setStatus("Load failed");
      }
    }

    async function loadFirstAvailableJson(names) {
      const errors = [];

      for (const name of names) {
        try {
          const res = await fetch(name, { cache: "no-store" });
          if (!res.ok) {
            errors.push(`${name}: HTTP ${res.status}`);
            continue;
          }
          const data = await res.json();
          return { name, data };
        } catch (err) {
          errors.push(`${name}: ${err.message}`);
        }
      }

      throw new Error(
        "None of the candidate JSON files could be loaded.\n\nTried:\n- " +
        names.join("\n- ") +
        "\n\nDetails:\n" + errors.join("\n")
      );
    }

    // ============================================================
    // NORMALIZE
    // ============================================================
    function normalizePayload(raw) {
      const cells = extractCells(raw).map(normalizeCell);
      const edges = extractEdges(raw).map(normalizeEdge).filter(Boolean);

      return { cells, edges };
    }

    function extractCells(raw) {
      if (Array.isArray(raw)) {
        return raw;
      }

      if (Array.isArray(raw.cells)) return raw.cells;
      if (Array.isArray(raw.tree_cells)) return raw.tree_cells;
      if (Array.isArray(raw.cell_data)) return raw.cell_data;
      if (Array.isArray(raw.nodes)) return raw.nodes;
      if (Array.isArray(raw.units)) return raw.units;

      return [];
    }

    function extractEdges(raw) {
      if (!raw || Array.isArray(raw)) return [];
      if (Array.isArray(raw.edges)) return raw.edges;
      if (Array.isArray(raw.connections)) return raw.connections;
      if (Array.isArray(raw.links)) return raw.links;
      if (Array.isArray(raw.progression_edges)) return raw.progression_edges;
      return [];
    }

    function normalizeCell(cell) {
      const type = String(
        cell.type ||
        cell.cell_type ||
        (Array.isArray(cell.units) && cell.units.length > 1 ? "group" : "unit")
      ).toLowerCase();

      const units = Array.isArray(cell.units) ? cell.units : [];
      const unitIds = Array.isArray(cell.unit_ids)
        ? cell.unit_ids
        : units.map(u => u.id).filter(Boolean);

      return {
        raw: cell,
        cell_id: String(cell.cell_id || cell.id || cell.key || ""),
        nation: String(cell.nation || "unknown"),
        rank: num(cell.rank, 1),
        column: num(cell.column || cell.col, 1),
        row: num(cell.row, 1),
        type,
        display_name: String(
          cell.display_name ||
          cell.name ||
          cell.unit_name ||
          cell.cell_id ||
          "unknown"
        ),
        units,
        unit_ids: unitIds
      };
    }

    function normalizeEdge(edge) {
      const fromId = edge.from_cell || edge.from || edge.source || edge.parent || edge.from_id;
      const toId = edge.to_cell || edge.to || edge.target || edge.child || edge.to_id;

      if (!fromId || !toId) return null;

      return {
        raw: edge,
        from_cell: String(fromId),
        to_cell: String(toId),
        from_rank: num(edge.from_rank, null),
        to_rank: num(edge.to_rank, null),
        from_col: num(edge.from_col, null),
        to_col: num(edge.to_col, null),
        from_row_in_rank: num(edge.from_row_in_rank, null),
        to_row_in_rank: num(edge.to_row_in_rank, null),
        direction: String(edge.direction || "down")
      };
    }

    function num(v, fallback) {
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }

    // ============================================================
    // RENDER
    // ============================================================
    function renderTree(data, sourceName) {
      const cells = [...data.cells].sort(sortCells);
      const edges = data.edges;

      nodeLayerEl.innerHTML = "";
      edgeLayerEl.innerHTML = "";

      const rankCount = Math.max(1, ...cells.map(c => c.rank));
      const rowCountsByRank = getRowCountsByRank(cells);
      const columnCount = Math.max(LAYOUT.totalColumns, ...cells.map(c => c.column));

      const treeWidth = LAYOUT.leftPad + (columnCount * LAYOUT.colWidth) + LAYOUT.rightPad;
      const treeHeight = LAYOUT.topPad + (rankCount * LAYOUT.rankHeight) + LAYOUT.bottomPad;

      treeRootEl.style.width = treeWidth + "px";
      treeRootEl.style.height = treeHeight + "px";
      edgeLayerEl.setAttribute("width", treeWidth);
      edgeLayerEl.setAttribute("height", treeHeight);
      edgeLayerEl.setAttribute("viewBox", `0 0 ${treeWidth} ${treeHeight}`);

      renderScaffold(rankCount, columnCount, treeWidth);
      const rectMap = renderCells(cells, rowCountsByRank);
      renderEdges(edges, rectMap);

      setStatus(
        `Loaded ${sourceName} · Cells: ${cells.length} · Edges: ${edges.length} · Ranks: ${rankCount}`
      );
    }

    function renderScaffold(rankCount, columnCount, treeWidth) {
      removeScaffold();

      for (let rank = 1; rank <= rankCount; rank++) {
        const band = document.createElement("div");
        band.className = "rank-band" + (rank % 2 === 0 ? " alt" : "");
        band.style.top = rankTop(rank) + "px";
        band.style.height = LAYOUT.rankHeight + "px";
        treeRootEl.appendChild(band);

        const label = document.createElement("div");
        label.className = "rank-label";
        label.style.top = (rankTop(rank) + 12) + "px";
        label.textContent = `RANK ${roman(rank)}`;
        treeRootEl.appendChild(label);
      }

      for (let col = 1; col <= columnCount; col++) {
        const guide = document.createElement("div");
        guide.className = "column-guide" + (col > LAYOUT.mainColumns ? " side" : "");
        guide.style.left = columnLeft(col) + "px";

        const label = document.createElement("div");
        label.className = "column-label";
        label.textContent = col <= LAYOUT.mainColumns ? `Col ${col}` : `Side ${col - LAYOUT.mainColumns}`;
        guide.appendChild(label);

        treeRootEl.appendChild(guide);
      }

      const divider = document.createElement("div");
      divider.className = "side-divider";
      divider.style.left = (columnLeft(LAYOUT.mainColumns + 1) - 16) + "px";
      treeRootEl.appendChild(divider);
    }

    function removeScaffold() {
      [...treeRootEl.querySelectorAll(".rank-band, .rank-label, .column-guide, .side-divider")].forEach(el => el.remove());
    }

    function renderCells(cells, rowCountsByRank) {
      const rectMap = new Map();

      for (const cell of cells) {
        const rect = getCellRect(cell, rowCountsByRank);
        rectMap.set(cell.cell_id, rect);

        const cellEl = createCellElement(cell);
        cellEl.style.left = rect.x + "px";
        cellEl.style.top = rect.y + "px";

        nodeLayerEl.appendChild(cellEl);
      }

      return rectMap;
    }

    function createCellElement(cell) {
      const el = document.createElement("div");
      el.className = "cell";

      if (cell.type === "group") el.classList.add("grouped");
      if (cell.column > LAYOUT.mainColumns) {
        if (cell.column === 6) el.classList.add("premium");
        if (cell.column >= 7) el.classList.add("squadron");
      }

      const rankMeta = `R${cell.rank} · C${cell.column} · Row ${cell.row}`;
      const typeText = cell.type === "group" ? "GROUP" : "UNIT";

      if (cell.type === "group") {
        const back1 = document.createElement("div");
        back1.className = "cell-back";
        const back2 = document.createElement("div");
        back2.className = "cell-back-2";
        el.appendChild(back2);
        el.appendChild(back1);
      }

      const header = document.createElement("div");
      header.className = "cell-header";
      header.innerHTML = `
        <span>${rankMeta}</span>
        <span class="type-badge">${typeText}</span>
      `;
      el.appendChild(header);

      const body = document.createElement("div");
      body.className = "cell-body";

      if (cell.type === "group") {
        const list = document.createElement("div");
        list.className = "group-list";

        const ids = cell.unit_ids && cell.unit_ids.length
          ? cell.unit_ids
          : cell.units.map(u => u.id).filter(Boolean);

        ids.slice(0, 3).forEach(id => {
          const item = document.createElement("div");
          item.className = "group-item";
          item.textContent = id;
          list.appendChild(item);
        });

        if (ids.length === 0) {
          const item = document.createElement("div");
          item.className = "group-item";
          item.textContent = "Grouped slot";
          list.appendChild(item);
        }

        body.appendChild(list);
      } else {
        const visual = document.createElement("div");
        visual.className = "cell-visual";
        visual.textContent = shortLabel(cell.display_name || cell.cell_id);
        body.appendChild(visual);
      }

      el.appendChild(body);

      const footer = document.createElement("div");
      footer.className = "cell-footer";

      const name = document.createElement("div");
      name.className = "cell-name";
      name.textContent = shortLabel(cell.display_name || cell.cell_id);

      const metaWrap = document.createElement("div");
      metaWrap.style.display = "flex";
      metaWrap.style.alignItems = "center";
      metaWrap.style.gap = "6px";

      if (cell.type === "group") {
        const badge = document.createElement("div");
        badge.className = "group-badge";
        badge.textContent = String((cell.unit_ids || []).length || (cell.units || []).length || 0);
        metaWrap.appendChild(badge);
      }

      const meta = document.createElement("div");
      meta.className = "cell-meta";
      meta.textContent = cell.nation.toUpperCase();
      metaWrap.appendChild(meta);

      footer.appendChild(name);
      footer.appendChild(metaWrap);

      el.appendChild(footer);

      return el;
    }

    function renderEdges(edges, rectMap) {
      const groupedByFrom = new Map();

      for (const edge of edges) {
        if (!groupedByFrom.has(edge.from_cell)) {
          groupedByFrom.set(edge.from_cell, []);
        }
        groupedByFrom.get(edge.from_cell).push(edge);
      }

      for (const edge of edges) {
        const fromRect = rectMap.get(edge.from_cell);
        const toRect = rectMap.get(edge.to_cell);
        if (!fromRect || !toRect) continue;

        const siblings = groupedByFrom.get(edge.from_cell) || [];
        const index = siblings.findIndex(e => e === edge);
        const offset = getRouteOffset(index, siblings.length);

        const d = buildEdgePath(fromRect, toRect, offset);

        const base = svgEl("path", {
          d,
          class: "edge-base"
        });

        const active = svgEl("path", {
          d,
          class: "edge-active"
        });

        edgeLayerEl.appendChild(base);
        edgeLayerEl.appendChild(active);
      }
    }

    // ============================================================
    // GEOMETRY
    // ============================================================
    function getRowCountsByRank(cells) {
      const map = new Map();

      for (const c of cells) {
        const current = map.get(c.rank) || 0;
        map.set(c.rank, Math.max(current, c.row));
      }
      return map;
    }

    function getCellRect(cell, rowCountsByRank) {
      const x = columnLeft(cell.column) + Math.round((LAYOUT.colWidth - LAYOUT.cellWidth) / 2);

      const rowsInRank = Math.max(1, rowCountsByRank.get(cell.rank) || 1);
      const usableHeight = LAYOUT.rankHeight - 56;
      const slotStep = rowsInRank <= 1
        ? 0
        : Math.max(LAYOUT.cellHeight + LAYOUT.rowGap, Math.floor((usableHeight - LAYOUT.cellHeight) / (rowsInRank - 1)));

      const y = rankTop(cell.rank) + 52 + ((cell.row - 1) * slotStep);

      return {
        x,
        y,
        w: LAYOUT.cellWidth,
        h: LAYOUT.cellHeight
      };
    }

    function columnLeft(col) {
      return LAYOUT.leftPad + ((col - 1) * LAYOUT.colWidth);
    }

    function rankTop(rank) {
      return LAYOUT.topPad + ((rank - 1) * LAYOUT.rankHeight);
    }

    function anchors(rect) {
      return {
        top: {
          x: rect.x + rect.w / 2,
          y: rect.y
        },
        bottom: {
          x: rect.x + rect.w / 2,
          y: rect.y + rect.h
        }
      };
    }

    function buildEdgePath(fromRect, toRect, offset = 0) {
      const a = anchors(fromRect);
      const b = anchors(toRect);

      const x1 = a.bottom.x + offset;
      const y1 = a.bottom.y;

      const x2 = b.top.x + offset;
      const y2 = b.top.y;

      let midY;
      if (y2 >= y1) {
        midY = y1 + Math.max(24, (y2 - y1) / 2);
      } else {
        midY = y1 + 28;
      }

      return [
        `M ${round1(x1)} ${round1(y1)}`,
        `L ${round1(x1)} ${round1(midY)}`,
        `L ${round1(x2)} ${round1(midY)}`,
        `L ${round1(x2)} ${round1(y2)}`
      ].join(" ");
    }

    function getRouteOffset(index, total) {
      if (total <= 1) return 0;

      const spacing = 8;
      const centered = index - ((total - 1) / 2);
      return centered * spacing;
    }

    function round1(n) {
      return Math.round(n * 10) / 10;
    }

    // ============================================================
    // HELPERS
    // ============================================================
    function sortCells(a, b) {
      return (
        a.rank - b.rank ||
        a.column - b.column ||
        a.row - b.row ||
        String(a.cell_id).localeCompare(String(b.cell_id))
      );
    }

    function shortLabel(v) {
      const s = String(v || "");
      return s.length > 24 ? s.slice(0, 24) + "…" : s;
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function showError(text) {
      treeRootEl.innerHTML = "";
      const box = document.createElement("div");
      box.className = "error-box";
      box.textContent = text;
      treeRootEl.appendChild(box);
    }

    function svgEl(tag, attrs = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      for (const [k, v] of Object.entries(attrs)) {
        el.setAttribute(k, v);
      }
      return el;
    }

    function roman(num) {
      const map = [
        [10, "X"],
        [9, "IX"],
        [5, "V"],
        [4, "IV"],
        [1, "I"]
      ];
      let n = num;
      let out = "";
      for (const [value, sym] of map) {
        while (n >= value) {
          out += sym;
          n -= value;
        }
      }
      return out || String(num);
    }
  </script>
</body>
