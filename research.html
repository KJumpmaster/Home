<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SKY PILOT - USA STABLE V4</title>
    <style>
        /* UI BASE: Sourcing metal background from local Home directory */
        body { 
            background: #1a1a1a url('metal_background.png'); 
            background-size: cover;
            background-attachment: fixed;
            color: white; 
            margin: 0; 
            font-family: sans-serif; 
            overflow-x: auto; 
        }
        
        /* LOADING GRID: Sourcing Comms_Pic from local Home directory */
        #loading-overlay {
            position: fixed; inset: 0; 
            background: black url('Comms_Pic.png') no-repeat center;
            background-size: contain;
            z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end; 
            font-size: 24px; color: #00ff00;
            padding-bottom: 50px;
            text-shadow: 2px 2px 4px black;
        }

        #research-wrapper {
            position: relative;
            width: max-content;
            margin: 50px auto;
            padding: 20px;
        }

        #research-theater {
            position: relative;
            display: grid;
            grid-gap: 40px 20px;
            z-index: 2;
        }

        .v-card {
            width: 180px; height: 100px;
            background: rgba(42, 42, 42, 0.9); border: 2px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .v-img { width: 100%; height: 70%; object-fit: contain; }
        .v-name { font-size: 11px; padding: 5px; text-transform: uppercase; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div id="status-text">INITIALIZING VETERAN HANDSHAKE...</div>
    </div>

    <div id="research-wrapper">
        <div id="research-theater"></div>
    </div>

    <script>
        /* ASSET TETHER: Aircraft icons sourced from external Aircraft-Pics repo */
        const PIC_BASE = "https://raw.githubusercontent.com/KJumpmaster/Aircraft-Pics/main/";

        async function initiateSystem() {
            const overlay = document.getElementById('loading-overlay');
            const theater = document.getElementById('research-theater');
            
            // Locked 2-second Veteran Handshake delay
            const minLoadTime = new Promise(resolve => setTimeout(resolve, 2000));

            try {
                // Fetching local registry and tree data from Home repo
                const [treeRes, regRes] = await Promise.all([
                    fetch('./usa_tree_v4.json'),
                    fetch('./SP_Registry_CANON_3_31.csv'),
                    minLoadTime
                ]);

                if (!treeRes.ok || !regRes.ok) throw new Error("CORE FILES MISSING");

                const treeData = await treeRes.json();
                const regText = await regRes.text();

                const registry = {};
                const lines = regText.split('\n');
                for (let i = 1; i < lines.length; i++) {
                    // Optimized CSV parsing for Column C (Index 2)
                    const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length > 2) {
                        const id = cols[0].replace(/"/g, '').trim().toLowerCase();
                        const img = cols[2].replace(/"/g, '').trim(); 
                        if (id) registry[id] = img;
                    }
                }

                theater.innerHTML = '';
                treeData.cells.forEach(cell => {
                    const id = String(cell.cell_id).toLowerCase();
                    const card = document.createElement('div');
                    card.className = 'v-card';
                    card.style.gridColumn = cell.column;
                    card.style.gridRow = cell.row;

                    // Image source matches filenames in Column C of SP_Registry_CANON_3_31.csv
                    card.innerHTML = `
                        <img src="${PIC_BASE}${registry[id] || 'placeholder.png'}" 
                             class="v-img" 
                             onerror="this.src='https://placehold.co/200x100/1a1a1a/00ff00?text=SCANNING...';">
                        <div class="v-name">${(cell.display_name || cell.cell_id).replace(/_/g, ' ')}</div>
                    `;
                    theater.appendChild(card);
                });

                overlay.style.display = 'none';

            } catch (err) {
                overlay.innerHTML = `<h1 style="color:red; background: black; padding: 20px;">OFFLINE: ${err.message.toUpperCase()}</h1>`;
            }
        }

        window.onload = initiateSystem;
    </script>
</body>
</html>
