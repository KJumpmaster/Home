<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky Pilot — Research Tree</title>

  <style>
    :root{
      --bg-0:#06101c;
      --bg-1:#0a1524;
      --bg-2:#0e1b2d;

      --text:#eef5ff;
      --muted:#9cb0cf;
      --muted-2:#7f93b2;

      --line:rgba(120,170,255,0.18);
      --line-strong:rgba(255,213,92,0.82);
      --line-glow:rgba(255,213,92,0.24);

      --rank-band:rgba(255,255,255,0.02);
      --rank-band-alt:rgba(110,170,255,0.045);

      --tile-border:rgba(255,255,255,0.08);
      --tile-highlight:rgba(255,255,255,0.06);
      --tile-shadow:rgba(0,0,0,0.34);

      --unit-top-1:#284a78;
      --unit-top-2:#1f3758;

      --group-top-1:#456a9f;
      --group-top-2:#28476f;

      --side1-top-1:#6a4d9c;
      --side1-top-2:#3d2c5f;

      --side2-top-1:#3f6c86;
      --side2-top-2:#234355;

      --tree-left-pad:110px;
      --tree-top-pad:24px;
      --tree-right-pad:32px;
      --tree-bottom-pad:40px;

      --col-width:220px;
      --cell-width:176px;
      --cell-height:124px;

      --rank-height:312px;
      --row-gap:18px;
      --main-columns:5;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background:
        radial-gradient(circle at 12% 10%, rgba(85,130,220,0.12), transparent 24%),
        radial-gradient(circle at 85% 12%, rgba(90,160,220,0.08), transparent 24%),
        linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 45%, #08111d 100%);
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      flex: 0 0 auto;
      height: 38px;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 14px;
      background: linear-gradient(180deg, rgba(8,14,25,0.96), rgba(8,14,25,0.88));
      border-bottom: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 10px 24px rgba(0,0,0,0.25);
      z-index: 50;
    }

    .title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.25px;
      color: #f4f8ff;
      white-space: nowrap;
    }

    .status {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .toolbar-spacer { flex: 1 1 auto; }

    button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text);
      background: linear-gradient(180deg, rgba(32,49,76,0.95), rgba(18,28,45,0.95));
      border-radius: 9px;
      padding: 7px 11px;
      font-size: 12px;
      cursor: pointer;
    }

    button:hover {
      border-color: rgba(255,255,255,0.15);
      background: linear-gradient(180deg, rgba(39,59,92,0.95), rgba(22,34,56,0.95));
    }

    #viewport {
      position: relative;
      flex: 1 1 auto;
      overflow: auto;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0)),
        radial-gradient(circle at 50% 0%, rgba(65, 120, 200, 0.08), transparent 40%);
    }

    #treeRoot {
      position: relative;
      min-width: 1200px;
      min-height: 900px;
    }

    .rank-band {
      position: absolute;
      left: 0;
      right: 0;
      border-top: 1px solid rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.035);
      background: linear-gradient(180deg, var(--rank-band), rgba(255,255,255,0.008));
      pointer-events: none;
    }

    .rank-band.alt {
      background: linear-gradient(180deg, var(--rank-band-alt), rgba(255,255,255,0.008));
    }

    .rank-label {
      position: absolute;
      left: 12px;
      width: 72px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 11px;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 1.1px;
      color: #eef5ff;
      background: linear-gradient(180deg, rgba(36,55,85,0.95), rgba(17,27,43,0.96));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 10px 20px rgba(0,0,0,0.24),
        inset 0 1px 0 rgba(255,255,255,0.05);
      pointer-events: none;
      z-index: 3;
    }

    .column-guide {
      position: absolute;
      top: 0;
      bottom: 0;
      width: var(--col-width);
      pointer-events: none;
      z-index: 0;
    }

    .column-guide::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 1px;
      background: rgba(255,255,255,0.03);
    }

    .column-guide.side {
      background: linear-gradient(180deg, rgba(160,180,255,0.03), rgba(130,160,220,0.015));
    }

    .column-label {
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 1px;
      color: rgba(235,242,255,0.45);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .side-divider {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.10), rgba(255,255,255,0.02));
      z-index: 1;
      pointer-events: none;
    }

    #edgeLayer {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: visible;
    }

    .edge-base {
      fill: none;
      stroke: var(--line);
      stroke-width: 2.2;
      stroke-linejoin: round;
      stroke-linecap: round;
    }

    .edge-active {
      fill: none;
      stroke: var(--line-strong);
      stroke-width: 3;
      stroke-linejoin: round;
      stroke-linecap: round;
      filter: drop-shadow(0 0 6px var(--line-glow));
      opacity: 0;
    }

    #nodeLayer {
      position: absolute;
      inset: 0;
      z-index: 4;
    }

    .cell-wrap {
      position: absolute;
      width: var(--cell-width);
      height: var(--cell-height);
    }

    .cell-wrap.grouped .cell-shadow-1,
    .cell-wrap.grouped .cell-shadow-2 {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.05);
      pointer-events: none;
    }

    .cell-wrap.grouped .cell-shadow-1 {
      transform: translate(7px, -6px);
      opacity: 0.35;
      background: linear-gradient(180deg, rgba(88,127,182,0.22), rgba(29,52,84,0.16));
      z-index: 0;
    }

    .cell-wrap.grouped .cell-shadow-2 {
      transform: translate(13px, -11px);
      opacity: 0.18;
      background: linear-gradient(180deg, rgba(88,127,182,0.18), rgba(29,52,84,0.12));
      z-index: -1;
    }

    .cell {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(24,38,61,0.96), rgba(13,22,36,0.98));
      border: 1px solid var(--tile-border);
      box-shadow:
        0 16px 28px var(--tile-shadow),
        inset 0 1px 0 rgba(255,255,255,0.045);
      transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
    }

    .cell:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.16);
      box-shadow:
        0 18px 34px rgba(0,0,0,0.40),
        0 0 0 1px rgba(120,180,255,0.12),
        inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .cell-top-accent {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      height: 22px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      opacity: 0.96;
    }

    .cell-top-gloss {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 42px;
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0));
      pointer-events: none;
    }

    .cell-inner-frame {
      position: absolute;
      inset: 6px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.045);
      pointer-events: none;
    }

    .cell-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
      z-index: 3;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.4px;
      color: rgba(242,247,255,0.92);
      text-transform: uppercase;
    }

    .cell-header-left {
      opacity: 0.94;
    }

    .cell-header-right {
      padding: 2px 6px;
      border-radius: 999px;
      background: rgba(5,10,18,0.22);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(2px);
    }

    .cell-body {
      position: absolute;
      left: 8px;
      right: 8px;
      top: 28px;
      bottom: 30px;
      border-radius: 12px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 35%, rgba(146,187,255,0.18), rgba(146,187,255,0.02) 55%, transparent 68%),
        linear-gradient(180deg, rgba(17,28,45,0.96), rgba(12,20,33,0.98));
      border: 1px solid rgba(255,255,255,0.05);
    }

    .cell-body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.03), transparent 40%),
        linear-gradient(315deg, rgba(255,255,255,0.018), transparent 36%);
      pointer-events: none;
      z-index: 2;
    }

    .visual-subtle-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 14px 14px;
      mask-image: linear-gradient(180deg, rgba(255,255,255,0.45), rgba(255,255,255,0.04));
      pointer-events: none;
      z-index: 0;
    }

    .image-wrap {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .unit-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center 58%;
      filter:
        drop-shadow(0 10px 12px rgba(0,0,0,0.35))
        saturate(1.08)
        contrast(1.03);
      opacity: 0.96;
    }

    .image-fade {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(8,13,22,0.12), rgba(8,13,22,0.02) 30%, rgba(8,13,22,0.36) 100%);
      z-index: 2;
      pointer-events: none;
    }

    .image-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      text-align: center;
      color: rgba(232,239,251,0.86);
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.3px;
      text-shadow: 0 1px 0 rgba(0,0,0,0.35);
      z-index: 1;
    }

    .group-stack {
      position: absolute;
      inset: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      justify-content: center;
      z-index: 3;
    }

    .group-mini {
      height: 18px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      color: #e4edff;
      font-size: 11px;
      font-weight: 600;
      background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.035));
      border: 1px solid rgba(255,255,255,0.07);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      backdrop-filter: blur(1px);
    }

    .group-hero {
      position: absolute;
      right: 4px;
      bottom: 0;
      width: 72%;
      height: 90%;
      object-fit: contain;
      object-position: right bottom;
      opacity: 0.28;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.25));
      z-index: 1;
      pointer-events: none;
    }

    .cell-footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 10px;
      background: linear-gradient(180deg, rgba(0,0,0,0.06), rgba(0,0,0,0.22));
      border-top: 1px solid rgba(255,255,255,0.05);
      z-index: 4;
    }

    .cell-name {
      flex: 1 1 auto;
      min-width: 0;
      font-size: 12px;
      font-weight: 800;
      color: #f0f6ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.15px;
    }

    .cell-meta {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .count-badge {
      min-width: 18px;
      height: 18px;
      padding: 0 6px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      color: #edf4ff;
      font-size: 10px;
      font-weight: 800;
    }

    .error-box {
      margin: 20px;
      padding: 16px 18px;
      border-radius: 12px;
      background: rgba(72,20,20,0.65);
      border: 1px solid rgba(255,120,120,0.20);
      color: #ffd6d6;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="topbar">
      <div class="title">Sky Pilot — Research Tree</div>
      <div id="status" class="status">Loading…</div>
      <div class="toolbar-spacer"></div>
      <button id="fitBtn" type="button">Fit to Top</button>
      <button id="reloadBtn" type="button">Reload</button>
    </div>

    <div id="viewport">
      <div id="treeRoot">
        <svg id="edgeLayer"></svg>
        <div id="nodeLayer"></div>
      </div>
    </div>
  </div>

  <script>
    const DATA_CANDIDATES = [
      "usa_tree_v4.json",
      "tree_cells.json",
      "usa_tree.json",
      "tree.json"
    ];

    const REGISTRY_CSV_URL =
      "https://raw.githubusercontent.com/KJumpmaster/Home/main/SP_Registry_CANON_3_31.csv";

    const IMAGE_RAW_BASE =
      "https://raw.githubusercontent.com/KJumpmaster/Aircraft-Pics/main/";

    const LAYOUT = {
      leftPad: 110,
      topPad: 24,
      rightPad: 32,
      bottomPad: 40,
      colWidth: 220,
      cellWidth: 176,
      cellHeight: 124,
      rankHeight: 312,
      rowGap: 18,
      totalColumns: 7,
      mainColumns: 5
    };

    let registryImageMap = new Map();

    const statusEl = document.getElementById("status");
    const viewportEl = document.getElementById("viewport");
    const treeRootEl = document.getElementById("treeRoot");
    const edgeLayerEl = document.getElementById("edgeLayer");
    const nodeLayerEl = document.getElementById("nodeLayer");
    const fitBtn = document.getElementById("fitBtn");
    const reloadBtn = document.getElementById("reloadBtn");

    fitBtn.addEventListener("click", () => {
      viewportEl.scrollTo({ left: 0, top: 0, behavior: "smooth" });
    });

    reloadBtn.addEventListener("click", () => location.reload());

    init();

    async function init() {
      try {
        setStatus("Loading registry…");
        registryImageMap = await loadRegistryImageMap(REGISTRY_CSV_URL);

        setStatus("Loading tree data…");
        const payload = await loadFirstAvailableJson(DATA_CANDIDATES);
        const normalized = normalizePayload(payload.data);

        if (!normalized.cells.length) {
          throw new Error(
            "No cells found in JSON.\n\nExpected:\n- top-level array\n- { cells:[...] }\n- { tree_cells:[...] }"
          );
        }

        renderTree(normalized, payload.name);
      } catch (err) {
        console.error(err);
        showError(
          "Could not load/render research tree.\n\n" +
          String(err.message || err) +
          "\n\nIf needed, run from a simple local server instead of file://"
        );
        setStatus("Load failed");
      }
    }

    async function loadFirstAvailableJson(names) {
      const errors = [];
      for (const name of names) {
        try {
          const res = await fetch(name, { cache: "no-store" });
          if (!res.ok) {
            errors.push(`${name}: HTTP ${res.status}`);
            continue;
          }
          const data = await res.json();
          return { name, data };
        } catch (err) {
          errors.push(`${name}: ${err.message}`);
        }
      }
      throw new Error(
        "None of the candidate JSON files could be loaded.\n\nTried:\n- " +
        names.join("\n- ") +
        "\n\nDetails:\n" + errors.join("\n")
      );
    }

    async function loadRegistryImageMap(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`Registry CSV failed to load: HTTP ${res.status}`);
      }

      const csvText = await res.text();
      const rows = parseCSV(csvText);
      if (!rows.length) {
        throw new Error("Registry CSV parsed to zero rows.");
      }

      const header = rows[0].map(v => String(v || "").trim());
      const masterKeyIndex = header.findIndex(h => h === "master_key");
      const wtImageIndex = header.findIndex(h => h === "wt_image");

      if (masterKeyIndex === -1 || wtImageIndex === -1) {
        throw new Error(
          "Registry CSV is missing required columns master_key and/or wt_image."
        );
      }

      const map = new Map();

      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        const masterKey = String(row[masterKeyIndex] || "").trim();
        const wtImage = String(row[wtImageIndex] || "").trim();

        if (!masterKey || !wtImage) continue;

        map.set(masterKey, wtImage);
      }

      return map;
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];

        if (ch === '"') {
          if (inQuotes && next === '"') {
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
          continue;
        }

        if (ch === ',' && !inQuotes) {
          row.push(cell);
          cell = "";
          continue;
        }

        if ((ch === '\n' || ch === '\r') && !inQuotes) {
          if (ch === '\r' && next === '\n') i++;
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
          continue;
        }

        cell += ch;
      }

      if (cell.length || row.length) {
        row.push(cell);
        rows.push(row);
      }

      return rows;
    }

    function normalizePayload(raw) {
      const cells = extractCells(raw).map(normalizeCell);
      const edges = extractEdges(raw).map(normalizeEdge).filter(Boolean);
      return { cells, edges };
    }

    function extractCells(raw) {
      if (Array.isArray(raw)) return raw;
      if (Array.isArray(raw.cells)) return raw.cells;
      if (Array.isArray(raw.tree_cells)) return raw.tree_cells;
      if (Array.isArray(raw.cell_data)) return raw.cell_data;
      if (Array.isArray(raw.nodes)) return raw.nodes;
      return [];
    }

    function extractEdges(raw) {
      if (!raw || Array.isArray(raw)) return [];
      if (Array.isArray(raw.edges)) return raw.edges;
      if (Array.isArray(raw.connections)) return raw.connections;
      if (Array.isArray(raw.links)) return raw.links;
      if (Array.isArray(raw.progression_edges)) return raw.progression_edges;
      return [];
    }

    function normalizeCell(cell) {
      const type = String(
        cell.type ||
        cell.cell_type ||
        (Array.isArray(cell.units) && cell.units.length > 1 ? "group" : "unit")
      ).toLowerCase();

      const units = Array.isArray(cell.units) ? cell.units : [];
      const unitIds = Array.isArray(cell.unit_ids)
        ? cell.unit_ids
        : units.map(u => u.id).filter(Boolean);

      return {
        raw: cell,
        cell_id: String(cell.cell_id || cell.id || cell.key || ""),
        nation: String(cell.nation || "unknown"),
        rank: num(cell.rank, 1),
        column: num(cell.column || cell.col, 1),
        row: num(cell.row, 1),
        type,
        display_name: String(
          cell.display_name || cell.name || cell.unit_name || cell.cell_id || "unknown"
        ),
        units,
        unit_ids: unitIds
      };
    }

    function normalizeEdge(edge) {
      const fromId = edge.from_cell || edge.from || edge.source || edge.parent || edge.from_id;
      const toId = edge.to_cell || edge.to || edge.target || edge.child || edge.to_id;
      if (!fromId || !toId) return null;

      return {
        from_cell: String(fromId),
        to_cell: String(toId),
        from_rank: num(edge.from_rank, null),
        to_rank: num(edge.to_rank, null),
        from_col: num(edge.from_col, null),
        to_col: num(edge.to_col, null),
        from_row_in_rank: num(edge.from_row_in_rank, null),
        to_row_in_rank: num(edge.to_row_in_rank, null),
        direction: String(edge.direction || "down")
      };
    }

    function num(v, fallback) {
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }

    function renderTree(data, sourceName) {
      const cells = [...data.cells].sort(sortCells);
      const edges = data.edges;

      nodeLayerEl.innerHTML = "";
      edgeLayerEl.innerHTML = "";
      removeScaffold();

      const rankCount = Math.max(1, ...cells.map(c => c.rank));
      const rowCountsByRank = getRowCountsByRank(cells);
      const columnCount = Math.max(LAYOUT.totalColumns, ...cells.map(c => c.column));

      const treeWidth = LAYOUT.leftPad + (columnCount * LAYOUT.colWidth) + LAYOUT.rightPad;
      const treeHeight = LAYOUT.topPad + (rankCount * LAYOUT.rankHeight) + LAYOUT.bottomPad;

      treeRootEl.style.width = treeWidth + "px";
      treeRootEl.style.height = treeHeight + "px";
      edgeLayerEl.setAttribute("width", treeWidth);
      edgeLayerEl.setAttribute("height", treeHeight);
      edgeLayerEl.setAttribute("viewBox", `0 0 ${treeWidth} ${treeHeight}`);

      renderScaffold(rankCount, columnCount);
      const rectMap = renderCells(cells, rowCountsByRank);
      renderEdges(edges, rectMap);

      setStatus(
        `Loaded ${sourceName} · Registry image map: ${registryImageMap.size} · Cells: ${cells.length} · Edges: ${edges.length} · Ranks: ${rankCount}`
      );
    }

    function renderScaffold(rankCount, columnCount) {
      for (let rank = 1; rank <= rankCount; rank++) {
        const band = document.createElement("div");
        band.className = "rank-band" + (rank % 2 === 0 ? " alt" : "");
        band.style.top = rankTop(rank) + "px";
        band.style.height = LAYOUT.rankHeight + "px";
        treeRootEl.appendChild(band);

        const label = document.createElement("div");
        label.className = "rank-label";
        label.style.top = (rankTop(rank) + 12) + "px";
        label.textContent = `RANK ${roman(rank)}`;
        treeRootEl.appendChild(label);
      }

      for (let col = 1; col <= columnCount; col++) {
        const guide = document.createElement("div");
        guide.className = "column-guide" + (col > LAYOUT.mainColumns ? " side" : "");
        guide.style.left = columnLeft(col) + "px";

        const label = document.createElement("div");
        label.className = "column-label";
        label.textContent = col <= LAYOUT.mainColumns ? `COL ${col}` : `SIDE ${col - LAYOUT.mainColumns}`;
        guide.appendChild(label);

        treeRootEl.appendChild(guide);
      }

      const divider = document.createElement("div");
      divider.className = "side-divider";
      divider.style.left = (columnLeft(LAYOUT.mainColumns + 1) - 16) + "px";
      treeRootEl.appendChild(divider);
    }

    function removeScaffold() {
      [...treeRootEl.querySelectorAll(".rank-band, .rank-label, .column-guide, .side-divider")]
        .forEach(el => el.remove());
    }

    function renderCells(cells, rowCountsByRank) {
      const rectMap = new Map();

      for (const cell of cells) {
        const rect = getCellRect(cell, rowCountsByRank);
        rectMap.set(cell.cell_id, rect);

        const wrap = document.createElement("div");
        wrap.className = "cell-wrap" + (cell.type === "group" ? " grouped" : "");
        wrap.style.left = rect.x + "px";
        wrap.style.top = rect.y + "px";

        if (cell.type === "group") {
          const s2 = document.createElement("div");
          s2.className = "cell-shadow-2";
          const s1 = document.createElement("div");
          s1.className = "cell-shadow-1";
          wrap.appendChild(s2);
          wrap.appendChild(s1);
        }

        wrap.appendChild(createCellElement(cell));
        nodeLayerEl.appendChild(wrap);
      }

      return rectMap;
    }

    function createCellElement(cell) {
      const el = document.createElement("div");
      el.className = "cell";

      const accents = getAccentColors(cell);
      el.style.setProperty("--accent1", accents[0]);
      el.style.setProperty("--accent2", accents[1]);

      const headerLeft = `R${cell.rank} · C${cell.column} · Row ${cell.row}`;
      const headerRight = cell.type === "group" ? "GROUP" : "UNIT";

      el.innerHTML = `
        <div class="cell-top-accent"></div>
        <div class="cell-top-gloss"></div>
        <div class="cell-inner-frame"></div>

        <div class="cell-header">
          <div class="cell-header-left">${headerLeft}</div>
          <div class="cell-header-right">${headerRight}</div>
        </div>

        <div class="cell-body"></div>

        <div class="cell-footer">
          <div class="cell-name">${escapeHtml(prettyLabel(cell.display_name || cell.cell_id))}</div>
          <div class="cell-meta"></div>
        </div>
      `;

      const body = el.querySelector(".cell-body");
      const meta = el.querySelector(".cell-meta");

      const grid = document.createElement("div");
      grid.className = "visual-subtle-grid";
      body.appendChild(grid);

      if (cell.type === "group") {
        const heroFilename = resolveCellImageFilename(cell);
        if (heroFilename) {
          const hero = document.createElement("img");
          hero.className = "group-hero";
          hero.src = IMAGE_RAW_BASE + heroFilename;
          hero.onerror = () => hero.remove();
          body.appendChild(hero);
        }

        const stack = document.createElement("div");
        stack.className = "group-stack";

        const ids = cell.unit_ids && cell.unit_ids.length
          ? cell.unit_ids
          : (cell.units || []).map(u => u.id).filter(Boolean);

        ids.slice(0, 3).forEach(id => {
          const mini = document.createElement("div");
          mini.className = "group-mini";
          mini.textContent = prettyLabel(id);
          stack.appendChild(mini);
        });

        if (ids.length === 0) {
          const mini = document.createElement("div");
          mini.className = "group-mini";
          mini.textContent = "Grouped slot";
          stack.appendChild(mini);
        }

        body.appendChild(stack);

        const badge = document.createElement("div");
        badge.className = "count-badge";
        badge.textContent = String(ids.length || 0);
        meta.appendChild(badge);
      } else {
        const imageWrap = document.createElement("div");
        imageWrap.className = "image-wrap";

        const img = document.createElement("img");
        img.className = "unit-image";

        const fallback = document.createElement("div");
        fallback.className = "image-fallback";
        fallback.textContent = shortLabel(prettyLabel(cell.display_name || cell.cell_id), 16);

        const fade = document.createElement("div");
        fade.className = "image-fade";

        imageWrap.appendChild(img);
        imageWrap.appendChild(fallback);
        imageWrap.appendChild(fade);
        body.appendChild(imageWrap);

        const imageFilename = resolveCellImageFilename(cell);
        if (imageFilename) {
          img.src = IMAGE_RAW_BASE + imageFilename;
          img.onload = () => {
            fallback.style.display = "none";
          };
          img.onerror = () => {
            img.remove();
          };
        } else {
          img.remove();
        }
      }

      const nation = document.createElement("div");
      nation.textContent = String(cell.nation || "").toUpperCase();
      meta.appendChild(nation);

      return el;
    }

    function resolveCellImageFilename(cell) {
      const candidates = [];

      if (cell.cell_id) candidates.push(cell.cell_id);
      if (Array.isArray(cell.unit_ids)) candidates.push(...cell.unit_ids);
      if (Array.isArray(cell.units)) {
        for (const u of cell.units) {
          if (u && u.id) candidates.push(u.id);
        }
      }

      for (const key of candidates) {
        const cleaned = String(key || "").trim();
        if (!cleaned) continue;

        const filename = registryImageMap.get(cleaned);
        if (filename) return filename;
      }

      return null;
    }

    function getAccentColors(cell) {
      if (cell.type === "group") return ["var(--group-top-1)", "var(--group-top-2)"];
      if (cell.column === 6) return ["var(--side1-top-1)", "var(--side1-top-2)"];
      if (cell.column >= 7) return ["var(--side2-top-1)", "var(--side2-top-2)"];
      return ["var(--unit-top-1)", "var(--unit-top-2)"];
    }

    function renderEdges(edges, rectMap) {
      const groupedByFrom = new Map();

      for (const edge of edges) {
        if (!groupedByFrom.has(edge.from_cell)) groupedByFrom.set(edge.from_cell, []);
        groupedByFrom.get(edge.from_cell).push(edge);
      }

      for (const edge of edges) {
        const fromRect = rectMap.get(edge.from_cell);
        const toRect = rectMap.get(edge.to_cell);
        if (!fromRect || !toRect) continue;

        const siblings = groupedByFrom.get(edge.from_cell) || [];
        const index = siblings.findIndex(e => e === edge);
        const offset = getRouteOffset(index, siblings.length);
        const d = buildEdgePath(fromRect, toRect, offset);

        edgeLayerEl.appendChild(svgEl("path", { d, class: "edge-base" }));
        edgeLayerEl.appendChild(svgEl("path", { d, class: "edge-active" }));
      }
    }

    function getRowCountsByRank(cells) {
      const map = new Map();
      for (const c of cells) {
        map.set(c.rank, Math.max(map.get(c.rank) || 0, c.row));
      }
      return map;
    }

    function getCellRect(cell, rowCountsByRank) {
      const x = columnLeft(cell.column) + Math.round((LAYOUT.colWidth - LAYOUT.cellWidth) / 2);

      const rowsInRank = Math.max(1, rowCountsByRank.get(cell.rank) || 1);
      const usableHeight = LAYOUT.rankHeight - 56;
      const slotStep = rowsInRank <= 1
        ? 0
        : Math.max(
            LAYOUT.cellHeight + LAYOUT.rowGap,
            Math.floor((usableHeight - LAYOUT.cellHeight) / (rowsInRank - 1))
          );

      const y = rankTop(cell.rank) + 52 + ((cell.row - 1) * slotStep);

      return { x, y, w: LAYOUT.cellWidth, h: LAYOUT.cellHeight };
    }

    function columnLeft(col) {
      return LAYOUT.leftPad + ((col - 1) * LAYOUT.colWidth);
    }

    function rankTop(rank) {
      return LAYOUT.topPad + ((rank - 1) * LAYOUT.rankHeight);
    }

    function anchors(rect) {
      return {
        top: { x: rect.x + rect.w / 2, y: rect.y },
        bottom: { x: rect.x + rect.w / 2, y: rect.y + rect.h }
      };
    }

    function buildEdgePath(fromRect, toRect, offset = 0) {
      const a = anchors(fromRect);
      const b = anchors(toRect);

      const x1 = a.bottom.x + offset;
      const y1 = a.bottom.y;
      const x2 = b.top.x + offset;
      const y2 = b.top.y;

      let midY;
      if (y2 >= y1) {
        midY = y1 + Math.max(24, (y2 - y1) / 2);
      } else {
        midY = y1 + 28;
      }

      return [
        `M ${round1(x1)} ${round1(y1)}`,
        `L ${round1(x1)} ${round1(midY)}`,
        `L ${round1(x2)} ${round1(midY)}`,
        `L ${round1(x2)} ${round1(y2)}`
      ].join(" ");
    }

    function getRouteOffset(index, total) {
      if (total <= 1) return 0;
      const spacing = 8;
      const centered = index - ((total - 1) / 2);
      return centered * spacing;
    }

    function showError(text) {
      treeRootEl.innerHTML = "";
      const box = document.createElement("div");
      box.className = "error-box";
      box.textContent = text;
      treeRootEl.appendChild(box);
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function svgEl(tag, attrs = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      for (const [k, v] of Object.entries(attrs)) {
        el.setAttribute(k, v);
      }
      return el;
    }

    function round1(n) {
      return Math.round(n * 10) / 10;
    }

    function sortCells(a, b) {
      return (
        a.rank - b.rank ||
        a.column - b.column ||
        a.row - b.row ||
        String(a.cell_id).localeCompare(String(b.cell_id))
      );
    }

    function shortLabel(v, maxLen = 24) {
      const s = String(v || "");
      return s.length > maxLen ? s.slice(0, maxLen) + "…" : s;
    }

    function prettyLabel(v) {
      let s = String(v || "").trim();
      if (!s) return "";
      s = s.replace(/_group\b/gi, "");
      s = s.replace(/_/g, " ");
      s = s.replace(/\s+/g, " ").trim();
      return s;
    }

    function escapeHtml(s) {
      return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function roman(num) {
      const map = [[10, "X"], [9, "IX"], [5, "V"], [4, "IV"], [1, "I"]];
      let n = num;
      let out = "";
      for (const [value, sym] of map) {
        while (n >= value) {
          out += sym;
          n -= value;
        }
      }
      return out || String(num);
    }
  </script>
</body>
</html>
