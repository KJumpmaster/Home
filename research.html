<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SKY PILOT - USA STABLE V4</title>
    <style>
        /* UI BASE: Absolute paths for Home repo assets */
        body { 
            background: #1a1a1a url('https://raw.githubusercontent.com/KJumpmaster/Home/main/metal_background.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: white; 
            margin: 0; 
            font-family: sans-serif; 
            overflow-x: auto; 
        }
        
        #loading-overlay {
            position: fixed; inset: 0; 
            background: #000 url('https://raw.githubusercontent.com/KJumpmaster/Home/main/Comms_Pic.png') no-repeat center;
            background-size: contain;
            z-index: 9999;
            display: flex; align-items: center; justify-content: flex-end; 
            font-size: 24px; color: #00ff00;
            padding-bottom: 50px;
        }

        #research-wrapper {
            position: relative;
            width: max-content;
            margin: 80px auto; /* Increased top margin for the 'Holy Grail' header space */
            padding: 40px;
        }

        /* REINFORCED GRID STRUCTURE */
        #research-theater {
            display: grid;
            /* Creates a flexible grid; columns and rows are defined by the JSON data */
            grid-gap: 30px 15px; 
            z-index: 2;
        }

        .v-card {
            width: 170px; 
            height: 90px;
            background: rgba(20, 20, 20, 0.85); 
            border: 1px solid #555;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            backdrop-filter: blur(4px);
            transition: transform 0.2s;
        }

        .v-card:hover {
            border-color: #00ff00;
            transform: scale(1.05);
            z-index: 10;
        }

        .v-img { width: 90%; height: 65%; object-fit: contain; pointer-events: none; }
        .v-name { 
            font-size: 10px; 
            padding: 4px; 
            text-transform: uppercase; 
            text-align: center; 
            color: #ccc;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">INITIALIZING VETERAN HANDSHAKE...</div>

    <div id="research-wrapper">
        <div id="research-theater"></div>
    </div>

    <script>
        const PIC_BASE = "https://raw.githubusercontent.com/KJumpmaster/Aircraft-Pics/main/";

        async function initiateSystem() {
            const overlay = document.getElementById('loading-overlay');
            const theater = document.getElementById('research-theater');
            const handshake = new Promise(res => setTimeout(res, 2000));

            try {
                const [treeRes, regRes] = await Promise.all([
                    fetch('./usa_tree_v4.json'),
                    fetch('./SP_Registry_CANON_3_31.csv'),
                    handshake
                ]);

                if (!treeRes.ok || !regRes.ok) throw new Error("CRITICAL DATA OFFLINE");

                const treeData = await treeRes.json();
                const regText = await regRes.text();

                // Registry Parsing (Column C / Index 2)
                const registry = {};
                const lines = regText.split('\n');
                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length > 2) {
                        const id = cols[0].replace(/"/g, '').trim().toLowerCase();
                        const img = cols[2].replace(/"/g, '').trim(); 
                        if (id) registry[id] = img;
                    }
                }

                theater.innerHTML = '';
                
                // RESTORING GRID PLACEMENT
                treeData.cells.forEach(cell => {
                    const id = String(cell.cell_id).toLowerCase();
                    const card = document.createElement('div');
                    card.className = 'v-card';
                    
                    /* CRITICAL: Applying row/column coordinates from usa_tree_v4.json */
                    card.style.gridColumn = cell.column;
                    card.style.gridRow = cell.row;

                    const imgFile = registry[id] || 'placeholder.png';
                    
                    card.innerHTML = `
                        <img src="${PIC_BASE}${imgFile}" 
                             class="v-img" 
                             onerror="this.onerror=null; this.src='https://placehold.co/200x100/1a1a1a/00ff00?text=SCANNING...';">
                        <div class="v-name">${(cell.display_name || cell.cell_id).replace(/_/g, ' ')}</div>
                    `;
                    theater.appendChild(card);
                });

                overlay.style.display = 'none';

            } catch (err) {
                overlay.innerHTML = `<div style="color:red; background:black; padding:20px;">SYSTEM ERROR: ${err.message}</div>`;
            }
        }

        window.onload = initiateSystem;
    </script>
</body>
</html>
