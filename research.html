<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky Pilot</title>

<style>
body {
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:#0b1422;
  color:white;
}

#nodeLayer { position:absolute; inset:0; }

.cell {
  position:absolute;
  width:176px;
  height:124px;
  border-radius:14px;
  overflow:hidden;
  background:#15263f;
  border:1px solid rgba(255,255,255,0.08);
}

.cell img {
  width:100%;
  height:100%;
  object-fit:contain;
}

.cell-name {
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  background:rgba(0,0,0,0.6);
  font-size:12px;
  padding:4px;
  text-align:center;
}
</style>
</head>

<body>

<div id="nodeLayer"></div>

<script>

// ===============================
// CONFIG
// ===============================

const REGISTRY_URL =
"https://raw.githubusercontent.com/KJumpmaster/Home/main/SP_Registry_CANON_3_31.csv";

const IMAGE_BASE =
"https://raw.githubusercontent.com/KJumpmaster/Aircraft-Pics/main/";

const DATA_FILE = "usa_tree_v4.json";

// ===============================
// GLOBALS
// ===============================

let registryMap = new Map();

// ===============================
// INIT
// ===============================

init();

async function init() {

  console.log("Loading registry...");
  registryMap = await loadRegistry();

  console.log("Loading tree...");
  const data = await fetch(DATA_FILE).then(r=>r.json());

  render(data);
}

// ===============================
// REGISTRY
// ===============================

async function loadRegistry() {

  const text = await fetch(REGISTRY_URL).then(r=>r.text());
  const rows = parseCSV(text);

  const header = rows[0];

  const mkIndex = header.indexOf("master_key");
  const imgIndex = header.indexOf("wt_image");

  const map = new Map();

  for(let i=1;i<rows.length;i++){
    const r = rows[i];
    const key = r[mkIndex];
    const img = r[imgIndex];
    if(key && img){
      map.set(key.trim(), img.trim());
    }
  }

  console.log("Registry loaded:", map.size);
  return map;
}

// ===============================
// CSV PARSER
// ===============================

function parseCSV(text) {
  const rows = [];
  let row=[], cell="", inQuotes=false;

  for(let i=0;i<text.length;i++){
    const c=text[i];

    if(c==='"'){
      inQuotes=!inQuotes;
      continue;
    }

    if(c===',' && !inQuotes){
      row.push(cell); cell="";
      continue;
    }

    if((c==='\n'||c==='\r') && !inQuotes){
      row.push(cell);
      rows.push(row);
      row=[]; cell="";
      continue;
    }

    cell+=c;
  }

  row.push(cell);
  rows.push(row);

  return rows;
}

// ===============================
// IMAGE RESOLUTION
// ===============================

function resolveImage(cell){

  const candidates = [];

  if(cell.cell_id) candidates.push(cell.cell_id);

  if(cell.unit_ids){
    candidates.push(...cell.unit_ids);
  }

  if(cell.units){
    for(const u of cell.units){
      if(u.id) candidates.push(u.id);
    }
  }

  // remove dupes
  const clean = [...new Set(candidates.map(x=>x?.trim()).filter(Boolean))];

  // -------------------
  // PASS 1 registry exact
  // -------------------
  for(const c of clean){
    if(registryMap.has(c)){
      return registryMap.get(c);
    }
  }

  // -------------------
  // PASS 2 normalized registry
  // -------------------
  for(const c of clean){
    const norm = normalize(c);

    for(const [k,v] of registryMap.entries()){
      if(normalize(k)===norm){
        return v;
      }
    }
  }

  // -------------------
  // PASS 3 direct filename (groups FIX)
  // -------------------
  for(const c of clean){
    return c + ".png";
  }

  return null;
}

// ===============================
// NORMALIZATION
// ===============================

function normalize(s){
  return String(s)
    .toLowerCase()
    .replace(/\.(png|jpg)/,"")
    .replace(/[-\s]+/g,"_")
    .replace(/_+/g,"_")
    .trim();
}

// ===============================
// RENDER
// ===============================

function render(data){

  const layer = document.getElementById("nodeLayer");
  layer.innerHTML="";

  const cells = data.cells || data;

  let xOffset = 200;
  let yOffset = 100;

  for(const c of cells){

    const el = document.createElement("div");
    el.className = "cell";

    const x = (c.column-1)*220 + xOffset;
    const y = (c.rank-1)*300 + (c.row-1)*140 + yOffset;

    el.style.left = x+"px";
    el.style.top = y+"px";

    const imgFile = resolveImage(c);

    if(imgFile){
      const img = document.createElement("img");
      img.src = IMAGE_BASE + imgFile;

      img.onerror = ()=> {
        img.remove();
      };

      el.appendChild(img);
    }

    const name = document.createElement("div");
    name.className="cell-name";
    name.innerText = c.display_name || c.cell_id;

    el.appendChild(name);

    layer.appendChild(el);
  }

}

</script>

</body>
</html>
