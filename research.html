<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SKY PILOT - USA TREE V4</title>
    <style>
        body { background: #1a1a1a; color: white; margin: 0; font-family: sans-serif; overflow-x: auto; }
        
        /* THE CRITICAL STRUCTURE CSS */
        #loading-overlay {
            position: fixed; inset: 0; background: black; z-index: 9999;
            display: flex; align-items: center; justify-content: center; font-size: 24px; color: #00ff00;
        }

        #research-wrapper {
            position: relative;
            width: max-content;
            margin: 50px auto;
            padding: 20px;
        }

        #edge-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: visible;
            z-index: 1; /* Behind cards */
        }

        #research-theater {
            position: relative;
            display: grid;
            grid-gap: 40px 20px; /* Space for the lines to turn */
            z-index: 2; /* In front of lines */
        }

        /* CARD STYLING */
        .v-card {
            width: 180px; height: 100px;
            background: #2a2a2a; border: 2px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .v-img { width: 100%; height: 70%; object-fit: contain; }
        .v-name { font-size: 11px; padding: 5px; text-transform: uppercase; text-align: center; }

        /* THE LINE STYLING */
        .tree-edge {
            stroke: rgba(0, 255, 0, 0.5);
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">LOADING SYSTEM...</div>

    <div id="research-wrapper">
        <svg id="edge-layer"></svg>
        <div id="research-theater"></div>
    </div>

    <script>
        const PIC_BASE = "https://raw.githubusercontent.com/JumpingKJ/KJ_Project_NORDEN/main/Graphics/Planes/Icons/";

        async function initiateSystem() {
            const overlay = document.getElementById('loading-overlay');
            const wrapper = document.getElementById('research-wrapper');
            const theater = document.getElementById('research-theater');
            const edgeLayer = document.getElementById('edge-layer');

            try {
                console.log("GEM: Initiating Ironclad Stable Build...");

                // 1. FETCH DATA
                const [treeRes, regRes] = await Promise.all([
                    fetch('./usa_tree_v4.json'),
                    fetch('./SP_Registry_CANON_3_31.csv')
                ]);

                if (!treeRes.ok) throw new Error("usa_tree_v4.json missing");
                if (!regRes.ok) throw new Error("Registry CSV missing");

                const treeData = await treeRes.json();
                const regText = await regRes.text();

                // 2. PARSE REGISTRY
                const registry = {};
                const lines = regText.split('\n');
                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length > 2) {
                        const id = cols[0].replace(/"/g, '').trim().toLowerCase();
                        const img = cols[2].replace(/"/g, '').trim();
                        if (id) registry[id] = img;
                    }
                }

                // 3. RENDER CARDS
                theater.innerHTML = '';
                treeData.cells.forEach(cell => {
                    const id = String(cell.cell_id).toLowerCase();
                    const card = document.createElement('div');
                    card.className = 'v-card';
                    card.dataset.cellId = id;
                    card.style.gridColumn = cell.column;
                    card.style.gridRow = cell.row;

                    card.innerHTML = `
                        <img src="${PIC_BASE}${registry[id] || 'placeholder.png'}" class="v-img" onerror="this.src='https://placehold.co/200x100/000?text=SCANNING';">
                        <div class="v-name">${(cell.display_name || cell.cell_id).replace(/_/g, ' ')}</div>
                    `;
                    theater.appendChild(card);
                });

                // 4. DRAW EDGES
                // Need to wait for browser to paint the grid before drawing lines
                setTimeout(() => {
                    drawEdges(treeData.edges || [], theater, edgeLayer, wrapper);
                }, 100);

                overlay.style.display = 'none';
                console.log("GEM: System 100% Stable.");

            } catch (err) {
                console.error("DATA LINK FAILURE:", err);
                overlay.innerHTML = `<h1 style="color:red">OFFLINE: ${err.message.toUpperCase()}</h1>`;
            }
        }

        function drawEdges(edges, theater, edgeLayer, wrapper) {
            const theaterRect = theater.getBoundingClientRect();
            
            // Set SVG canvas size to match the scrollable area
            const width = theater.scrollWidth;
            const height = theater.scrollHeight;
            edgeLayer.setAttribute('viewBox', `0 0 ${width} ${height}`);
            edgeLayer.setAttribute('width', width);
            edgeLayer.setAttribute('height', height);

            const cardMap = new Map();
            theater.querySelectorAll('.v-card').forEach(card => {
                cardMap.set(card.dataset.cellId, card);
            });

            edgeLayer.innerHTML = ''; // Clear old lines

            edges.forEach(edge => {
                const fromCard = cardMap.get(String(edge.from || edge.source).toLowerCase());
                const toCard = cardMap.get(String(edge.to || edge.target).toLowerCase());

                if (!fromCard || !toCard) return;

                const fromRect = fromCard.getBoundingClientRect();
                const toRect = toCard.getBoundingClientRect();

                // Calculate center points relative to the theater container
                const x1 = (fromRect.left - theaterRect.left) + (fromRect.width / 2);
                const y1 = (fromRect.top - theaterRect.top) + fromRect.height;
                const x2 = (toRect.left - theaterRect.left) + (toRect.width / 2);
                const y2 = (toRect.top - theaterRect.top);

                const midY = y1 + ((y2 - y1) / 2);
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", `M ${x1} ${y1} L ${x1} ${midY} L ${x2} ${midY} L ${x2} ${y2}`);
                path.setAttribute("class", "tree-edge");
                edgeLayer.appendChild(path);
            });
        }

        window.onload = initiateSystem;
        window.addEventListener('resize', () => {
            // Re-fetch or use local cache to redraw lines on resize
            location.reload(); 
        });
    </script>
</body>
</html>
