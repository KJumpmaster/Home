<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL BREAKOUT</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        .rank-box { border: 1px solid #0f0; margin: 10px; padding: 10px; display: flex; flex-wrap: wrap; }
        .unit-card { border: 1px solid #333; margin: 5px; padding: 5px; width: 120px; text-align: center; font-size: 10px; }
        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 999; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

    <div id="loading-screen">SYSTEM BOOTING...</div>

    <h1>USA AIR WING - COMMAND TERMINAL</h1>
    <div id="theater"></div>

    <script>
        // EMERGENCY UNLOCK: This runs NO MATTER WHAT after 1 second
        setTimeout(() => {
            const loader = document.getElementById('loading-screen');
            if(loader) loader.style.display = 'none';
            console.log("Manual Unlock Triggered.");
        }, 1000);

        async function start() {
            try {
                const res = await fetch('./usa_tree_v4.json');
                if (!res.ok) throw new Error("JSON NOT FOUND");
                const data = await res.json();
                const theater = document.getElementById('theater');

                [1,2,3,4,5,6,7,8,9].forEach(r => {
                    const box = document.createElement('div');
                    box.className = 'rank-box';
                    box.innerHTML = `<strong>RANK ${r}</strong>`;
                    
                    const cells = data.cells.filter(c => c.rank === r);
                    cells.forEach(cell => {
                        const card = document.createElement('div');
                        card.className = 'unit-card';
                        card.innerHTML = cell.display_name || cell.cell_id;
                        box.appendChild(card);
                    });
                    theater.appendChild(box);
                });
            } catch (err) {
                document.body.innerHTML += `<h2 style="color:red">BOOT ERROR: ${err.message}</h2>`;
            }
        }

        start();
    </script>
</body>
</html>
