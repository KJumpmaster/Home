<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SKY PILOT - USA STRATEGIC COMMAND</title>
    <style>
        /* UI BASE: Translucent and Metal Focus */
        body { 
            background-color: #0a0a0a;
            background-image: url('https://raw.githubusercontent.com/KJumpmaster/Home/main/metal_background.png');
            background-attachment: fixed;
            background-size: auto;
            color: white; margin: 0; font-family: Arial, sans-serif;
        }
        
        #strategic-header {
            width: 100%; display: flex; flex-direction: column; align-items: center; padding: 40px 0;
            background: rgba(0, 0, 0, 0.7); /* Translucent to show metal behind title */
            border-bottom: 2px solid #00ff00;
        }
        #main-title {
            font-size: 48px; font-weight: bold; color: #00ff00; letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(0,255,0,0.6); margin-bottom: 20px;
        }
        #banner-video {
            max-width: 85%; height: auto; border: 1px solid #00ff00; box-shadow: 0 0 30px #000;
        }

        #research-wrapper { display: flex; justify-content: center; padding: 60px 0 150px 0; }

        /* GRID: Added wider gutters (100px) for the Rank Text */
        #research-theater {
            display: grid;
            grid-template-columns: 100px repeat(7, 210px) 100px; 
            grid-auto-rows: min-content; 
            grid-gap: 45px 15px;
            position: relative;
        }

        /* RANK MARKERS: Bigger, Vertical, Translucent */
        .rank-marker {
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #00ff00; font-size: 32px; /* Bigger */
            writing-mode: vertical-rl; text-orientation: mixed;
            transform: rotate(180deg); 
            opacity: 0.25; /* Translucent */
            letter-spacing: 10px;
            pointer-events: none;
        }

        .v-card {
            width: 200px; height: 130px;
            background: rgba(10, 10, 10, 0.9); border: 2px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; z-index: 10;
        }
        .active-group { z-index: 999 !important; border-color: #00ff00 !important; box-shadow: 0 0 20px #00ff00; }

        .v-img { width: 90%; height: 65%; object-fit: contain; }
        .v-name { 
            font-size: 13px; padding: 6px; text-align: center; 
            color: #fff; font-weight: bold; width: 100%; box-sizing: border-box;
            background: rgba(0,255,0,0.2);
        }

        .sub-unit-container {
            position: absolute; top: 100%; left: -2px; width: 200px;
            display: flex; flex-direction: column; gap: 8px; padding-top: 10px;
        }
        .sub-card {
            width: 200px; height: 130px; background: #050505; border: 2px solid #00ff00;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header id="strategic-header">
        <div id="main-title">USA AIR GROUP STRATEGIC COMMAND</div>
        <video id="banner-video" autoplay loop muted playsinline>
            <source src="https://raw.githubusercontent.com/KJumpmaster/Home/main/USA Banner.mp4" type="video/mp4">
        </video>
    </header>

    <div id="research-wrapper">
        <div id="research-theater"></div>
    </div>

    <script>
        const PIC_BASE = "https://raw.githubusercontent.com/KJumpmaster/Aircraft-Pics/main/";
        const JSON_URL = "https://raw.githubusercontent.com/KJumpmaster/Home/main/usa_tree_pass2_with_arrows.json";

        // NAUGHTY LIST + Missing Rank IV Premiums added to visible logic
        const NAUGHTY_LIST = ['o3u_1', 'ucav_mq_1_predator', 'uav_quadcopter'];

        async function initiateSystem() {
            const theater = document.getElementById('research-theater');

            try {
                const treeRes = await fetch(JSON_URL);
                const treeData = await treeRes.json();
                
                theater.innerHTML = '';

                // Deployment of the Side Rank Markers
                const ranks = ["Rank I", "Rank II", "Rank III", "Rank IV", "Rank V", "Rank VI", "Rank VII", "Rank VIII", "Rank IX"];
                ranks.forEach((label, i) => {
                    const row = (i + 1) * 8;
                    const l = document.createElement('div'); l.className='rank-marker'; l.style.gridColumn=1; l.style.gridRow=row; l.innerText=label;
                    const r = document.createElement('div'); r.className='rank-marker'; r.style.gridColumn=9; r.style.gridRow=row; r.innerText=label;
                    theater.appendChild(l); theater.appendChild(r);
                });

                treeData.cells.forEach(cell => {
                    if (NAUGHTY_LIST.includes(cell.cell_key)) return;

                    const card = document.createElement('div');
                    card.className = 'v-card';
                    card.style.gridColumn = parseInt(cell.column) + 2;
                    card.style.gridRow = (parseInt(cell.rank) * 8) + parseInt(cell.row_in_rank || 1);

                    const imgName = `${cell.cell_key}.png`;
                    card.innerHTML = `
                        <img src="${PIC_BASE}${imgName}" class="v-img" onerror="this.src='https://placehold.co/200x130/1a1a1a/00ff00?text=SCANNING...';">
                        <div class="v-name">${(cell.display_name).replace(/_/g, ' ')}</div>
                    `;

                    // Logic for Groups
                    if (cell.kind === 'group' && cell.units) {
                        const sub = document.createElement('div');
                        sub.className = 'sub-unit-container hidden';
                        cell.units.forEach(id => {
                            const sc = document.createElement('div'); sc.className='sub-card';
                            sc.innerHTML = `<img src="${PIC_BASE}${id}.png" class="v-img"><div class="v-name">${id.replace(/_/g, ' ')}</div>`;
                            sub.appendChild(sc);
                        });
                        card.appendChild(sub);
                        card.onclick = (e) => { 
                            e.stopPropagation();
                            const isOpen = sub.classList.toggle('hidden');
                            if (!isOpen) card.classList.add('active-group');
                            else card.classList.remove('active-group');
                        };
                    }
                    theater.appendChild(card);
                });

            } catch (err) { console.error("COMMS ERROR:", err); }
        }
        window.onload = initiateSystem;
    </script>
</body>
</html>
