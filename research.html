<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE CAOC | USA RESEARCH TREE</title>
    <style>
        body { 
            background: #1a1a1a url('metal%20background.png') no-repeat center center fixed; 
            background-size: cover; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; padding: 0;
        }

        .usa-hero { width: 100%; height: 180px; overflow: hidden; border-bottom: 3px solid #00ff00; position: relative; background: #000; }
        .usa-banner-video { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .title-overlay { position: absolute; bottom: 15px; left: 30px; }

        .tree-viewport { padding: 40px; display: flex; flex-direction: column; gap: 80px; max-width: 1600px; margin: 0 auto; }

        .rank-container {
            display: grid; grid-template-columns: repeat(5, 1fr); grid-auto-rows: 150px; gap: 25px;
            position: relative; padding: 40px; background: rgba(0, 0, 0, 0.5); border-left: 12px solid #00ff00;
        }

        .rank-label { 
            font-size: 4em; font-weight: bold; color: rgba(0, 255, 0, 0.1);
            position: absolute; left: -90px; top: 50%; transform: translateY(-50%) rotate(-90deg);
            white-space: nowrap; letter-spacing: 15px;
        }

        /* CARD STYLING */
        .v-card {
            background: rgba(15, 15, 15, 0.95); border: 2px solid #444; padding: 10px;
            text-align: center; cursor: pointer; transition: 0.2s; position: relative;
        }
        .v-card:hover { border-color: #00ff00; box-shadow: 0 0 20px #00ff00; transform: scale(1.03); }
        
        /* FOLDER INDICATOR: The "Stacked" look */
        .v-card.is-folder::after {
            content: "⧉ FOLDERED"; position: absolute; bottom: 5px; right: 5px;
            font-size: 0.6em; color: #aaa; letter-spacing: 1px;
        }

        .premium { border-color: #d4af37 !important; color: #d4af37; }
        .squadron { border-color: #55efc4 !important; color: #55efc4; }

        .v-img { width: 100%; height: 80px; object-fit: contain; }
        .v-name { font-size: 0.75em; font-weight: bold; margin-top: 5px; text-transform: uppercase; }

        /* MODAL INTERFACE: The Folder Expansion */
        #folder-modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 2000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #111; border: 4px solid #00ff00; padding: 40px;
            max-width: 80%; display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
        }
        .close-modal { position: absolute; top: 20px; right: 30px; font-size: 2em; cursor: pointer; color: #00ff00; }
    </style>
</head>
<body>

    <div class="usa-hero">
        <video class="usa-banner-video" autoplay muted loop playsinline><source src="usa_banner.mp4" type="video/mp4"></video>
        <div class="title-overlay">
            <h1 style="font-size: 3.5em; margin: 0; letter-spacing: 15px;">USA AIR BRANCH</h1>
            <p>RANK I - IX | OPERATIONAL DATA LINK</p>
        </div>
    </div>

    <div id="research-theater" class="tree-viewport"></div>

    <div id="folder-modal">
        <span class="close-modal" onclick="closeFolder()">&times; CLOSE</span>
        <div class="modal-content" id="modal-grid"></div>
    </div>

    <script>
        let globalRegistry = {};
        const picBase = "https://raw.githubusercontent.com/KJumpmaster/WTAircraft_Profile_Pics/main/";

        async function init() {
            const regRes = await fetch('SP_Registry_CANON_3_31.csv');
            const regText = await regRes.text();
            
            regText.split('\n').slice(1).forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if(cols.length > 14) {
                    const img = cols[2]?.replace(/"/g, '').trim();
                    [cols[0], cols[3], cols[6], cols[14]].forEach(k => { if(k) globalRegistry[k.trim()] = img; });
                }
            });

            const treeRes = await fetch('usa_tree_v4.json');
            const treeData = await treeRes.json();
            renderTree(treeData);
        }

        function renderTree(data) {
            const theater = document.getElementById('research-theater');
            [1,2,3,4,5,6,7,8,9].forEach(r => {
                const container = document.createElement('div');
                container.className = 'rank-container';
                container.innerHTML = `<div class="rank-label">RANK ${r}</div>`;
                
                const cells = data.cells.filter(c => c.rank === r);
                cells.forEach(cell => {
                    const isFolder = cell.type === "group";
                    const mainUnit = cell.units[0].id;
                    const icon = globalRegistry[mainUnit] || 'placeholder.png';
                    
                    const card = document.createElement('div');
                    card.className = `v-card ${isFolder ? 'is-folder' : ''}`;
                    card.style.gridColumn = cell.column;
                    card.style.gridRow = cell.row;
                    
                    card.onclick = () => isFolder ? openFolder(cell) : console.log("Selecting:", mainUnit);
                    
                    card.innerHTML = `
                        <img src="${picBase}${icon}" class="v-img">
                        <div class="v-name">${cell.display_name.replace(/_/g, ' ')}</div>
                    `;
                    container.appendChild(card);
                });
                if(cells.length > 0) theater.appendChild(container);
            });
        }

        function openFolder(cell) {
            const modal = document.getElementById('folder-modal');
            const grid = document.getElementById('modal-grid');
            grid.innerHTML = ''; 
            
            cell.units.forEach(u => {
                const icon = globalRegistry[u.id] || 'placeholder.png';
                const item = document.createElement('div');
                item.className = 'v-card';
                item.style.width = '200px';
                item.innerHTML = `
                    <img src="${picBase}${icon}" class="v-img">
                    <div class="v-name">${u.id.replace(/_/g, ' ')}</div>
                `;
                grid.appendChild(item);
            });
            modal.style.display = 'flex';
        }

        function closeFolder() { document.getElementById('folder-modal').style.display = 'none'; }

        init();
    </script>
</body>
</html>
