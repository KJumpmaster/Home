<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SKY PILOT - USA V4 STABLE</title>
    <style>
        /* THE 2PM VISUALS: DARK, CLEAN, AND GRID-LOCKED */
        body { 
            background: #1a1a1a; 
            color: white; 
            margin: 0; 
            font-family: sans-serif; 
            overflow-x: auto; 
        }
        
        #loading-overlay {
            position: fixed; inset: 0; background: black; z-index: 9999;
            display: flex; align-items: center; justify-content: center; 
            font-size: 24px; color: #00ff00; font-family: monospace;
        }

        #research-wrapper {
            position: relative;
            width: max-content;
            margin: 50px auto;
            padding: 20px;
        }

        #research-theater {
            position: relative;
            display: grid;
            /* The exact spacing that looked like the tree */
            grid-gap: 35px 20px; 
            z-index: 2;
        }

        .v-card {
            width: 170px; 
            height: 90px;
            background: #2a2a2a; 
            border: 1px solid #444;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        .v-img { 
            width: 100%; 
            height: 70%; 
            object-fit: contain; 
        }

        .v-name { 
            font-size: 11px; 
            padding: 4px; 
            text-transform: uppercase; 
            text-align: center; 
            background: rgba(0,0,0,0.6);
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">EXECUTING COMMIT #100...</div>

    <div id="research-wrapper">
        <div id="research-theater"></div>
    </div>

    <script>
        // MASTER IMAGE PATH - Pulling from your GitHub
        const PIC_BASE = "https://raw.githubusercontent.com/JumpingKJ/KJ_Project_NORDEN/main/Graphics/Planes/Icons/";

        async function initiateSystem() {
            const overlay = document.getElementById('loading-overlay');
            const theater = document.getElementById('research-theater');

            try {
                // 1. DATA ACQUISITION
                const [treeRes, regRes] = await Promise.all([
                    fetch('./usa_tree_v4.json'),
                    fetch('./SP_Registry_CANON_3_31.csv')
                ]);

                if (!treeRes.ok || !regRes.ok) throw new Error("CORE DATA FILES MISSING");

                const treeData = await treeRes.json();
                const regText = await regRes.text();

                // 2. PARSE REGISTRY (Targeting Column 3 for Images)
                const registry = {};
                const lines = regText.split('\n');
                for (let i = 1; i < lines.length; i++) {
                    const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length > 2) {
                        const id = cols[0].replace(/"/g, '').trim().toLowerCase();
                        const img = cols[2].replace(/"/g, '').trim(); // Column 3
                        if (id) registry[id] = img;
                    }
                }

                // 3. RENDER THE GRID
                theater.innerHTML = '';
                treeData.cells.forEach(cell => {
                    const id = String(cell.cell_id).toLowerCase();
                    const card = document.createElement('div');
                    card.className = 'v-card';
                    card.style.gridColumn = cell.column;
                    card.style.gridRow = cell.row;

                    card.innerHTML = `
                        <img src="${PIC_BASE}${registry[id] || 'placeholder.png'}" class="v-img" 
                             onerror="this.src='https://placehold.co/200x100/000?text=SCANNING';">
                        <div class="v-name">${(cell.display_name || cell.cell_id).replace(/_/g, ' ')}</div>
                    `;
                    theater.appendChild(card);
                });

                // 4. MISSION SUCCESS
                overlay.style.display = 'none';

            } catch (err) {
                overlay.innerHTML = `<h1 style="color:red">OFFLINE: ${err.message.toUpperCase()}</h1>`;
            }
        }

        window.onload = initiateSystem;
    </script>
</body>
</html>
