<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SKY PILOT - USA STRATEGIC COMMAND</title>
    <style>
        /* 1. UI BASE */
        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #0a0a0a url('https://raw.githubusercontent.com/KJumpmaster/Home/main/metal_background.png') no-repeat center center fixed !important;
            background-size: cover !important;
            color: white; font-family: 'Segoe UI', Arial, sans-serif;
            overflow-x: hidden;
        }

        /* 2. HUD & HEADERS */
        #tactical-hud {
            position: sticky; top: 0; width: 100%; background: rgba(0, 20, 0, 0.95);
            border-bottom: 2px solid #00ff00; padding: 10px 30px; z-index: 5000;
            display: flex; align-items: center; justify-content: space-between; box-sizing: border-box;
        }
        .hud-stats { font-family: monospace; color: #00ff00; font-size: 20px; font-weight: bold; }
        #hud-progress-bg { width: 250px; height: 14px; background: #111; border: 1px solid #00ff00; margin: 0 20px; overflow: hidden; }
        #hud-progress-fill { width: 0%; height: 100%; background: #00ff00; box-shadow: 0 0 10px #00ff00; transition: width 0.5s; }

        #strategic-header {
            width: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px 0;
            background: rgba(0, 0, 0, 0.8); border-bottom: 2px solid #00ff00;
        }
        #banner-container { width: 75%; height: 180px; overflow: hidden; border: 1px solid #444; position: relative; }
        #banner-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }
        #main-title {
            font-size: 32px; font-weight: bold; color: #00ff00; letter-spacing: 10px;
            text-shadow: 0 0 15px #00ff00; text-transform: uppercase; margin-top: 15px;
        }

        /* 3. GRID & ARROWS */
        #research-wrapper { display: flex; justify-content: flex-start; padding: 20px 0 150px 15px; position: relative; }
        #arrow-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        
        #research-theater {
            display: grid;
            grid-template-columns: 100px repeat(5, 210px) repeat(2, 210px); 
            grid-auto-rows: min-content; grid-gap: 30px 15px;
            position: relative; z-index: 10;
        }

        .col-header {
            height: 35px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; text-transform: uppercase; letter-spacing: 3px; font-size: 13px;
            border: 1px solid rgba(255,255,255,0.2); grid-row: 1; margin-bottom: 10px;
        }
        .header-research { grid-column: 2 / span 5; background: rgba(0, 255, 0, 0.25); color: #8cff8c; border-color: #00ff00; }
        .header-premium { grid-column: 7 / span 2; background: rgba(184, 134, 11, 0.4); color: #d4af37; border-color: #b8860b; }

        /* RANK MARKERS: BIGGER FONT (48px) */
        .rank-marker {
            grid-column: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 900; color: #00ff00; font-size: 48px; opacity: 0.2; 
            text-transform: uppercase; pointer-events: none; line-height: 1.1;
        }

        .v-card {
            width: 200px; height: 130px; background: rgba(5, 5, 5, 0.98); border: 2px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; transition: 0.2s; filter: grayscale(1); opacity: 0.6;
        }
        .v-card.obtained { filter: grayscale(0); opacity: 1; border-color: #00ff00; box-shadow: 0 0 15px rgba(0,255,0,0.4); }
        
        /* PREMIUM HIGHLIGHT (Columns 5 and 6) */
        .v-card.premium { border-color: #b8860b; }
        .v-card.premium .v-name { background: rgba(184, 134, 11, 0.6) !important; color: #fff; }

        .v-img { width: 92%; height: 68%; object-fit: contain; pointer-events: none; }
        .v-name { 
            font-size: 11px; padding: 5px; text-align: center; font-weight: bold; width: 100%; 
            box-sizing: border-box; background: rgba(0,255,0,0.2); text-transform: uppercase;
        }

        /* ARROW STYLES: YELLOW TACTICAL */
        .research-line { stroke: yellow; stroke-width: 3.5; fill: none; transition: 0.3s; }
        .line-solid { stroke: #00ff00; stroke-width: 5; filter: drop-shadow(0 0 8px #00ff00); }
        .line-dashed { stroke: yellow; stroke-width: 2.5; stroke-dasharray: 8,5; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="tactical-hud">
        <div class="hud-stats">OBTAINED: <span id="count-num">0</span> / <span id="total-num">0</span> (<span id="percent-num">0</span>%)</div>
        <div id="hud-progress-bg"><div id="hud-progress-fill"></div></div>
        <div class="hud-btns">
            <button onclick="exportData()" style="background:#000; color:#00ff00; border:1px solid #00ff00; padding:5px 15px; cursor:pointer;">Export Data Disk</button>
            <button onclick="document.getElementById('import-input').click()" style="background:#000; color:#00ff00; border:1px solid #00ff00; padding:5px 15px; cursor:pointer;">Import Data Disk</button>
            <input type="file" id="import-input" style="display:none" onchange="importData(event)">
        </div>
    </div>

    <header id="strategic-header">
        <div id="banner-container">
            <video id="banner-video" autoplay loop muted playsinline><source src="https://raw.githubusercontent.com/KJumpmaster/Home/main/USA Banner.mp4" type="video/mp4"></video>
        </div>
        <div id="main-title">USA AIR GROUP STRATEGIC COMMAND</div>
    </header>

    <div id="research-wrapper">
        <svg id="arrow-canvas"><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="yellow" /></marker></defs></svg>
        <div id="research-theater">
            <div class="col-header header-research">Researchable Airframes</div>
            <div class="col-header header-premium">Premium Vehicles</div>
        </div>
    </div>

    <script>
        const PIC_BASE = "https://raw.githubusercontent.com/KJumpmaster/Aircraft-Pics/main/";
        const JSON_URL = "https://raw.githubusercontent.com/KJumpmaster/Home/main/usa_tree_pass2_with_arrows.json";
        
        let ownedAircraft = JSON.parse(localStorage.getItem('skyPilotProgress')) || [];
        let totalCount = 0;

        // ID NORMALIZER: Fixes underscores vs hyphens
        function normalize(id) { return id.toLowerCase().replace(/[\s-]/g, '_'); }

        async function initiateSystem() {
            const theater = document.getElementById('research-theater');
            const canvas = document.getElementById('arrow-canvas');

            try {
                const treeRes = await fetch(JSON_URL);
                const treeData = await treeRes.json();
                
                // 1. RANK MARKERS (BIGGER FONT)
                const ranks = ["Rank I", "Rank II", "Rank III", "Rank IV", "Rank V", "Rank VI", "Rank VII", "Rank VIII", "Rank IX"];
                ranks.forEach((label, i) => {
                    const rowStart = (i * 8) + 2; 
                    const marker = document.createElement('div');
                    marker.className = 'rank-marker';
                    marker.style.gridRow = `${rowStart} / span 7`;
                    const parts = label.split(" ");
                    marker.innerHTML = parts[0].split("").join("<br>") + "<br><br>" + (parts[1] || "");
                    theater.appendChild(marker);
                });

                // 2. UNIT CARDS
                treeData.cells.forEach(cell => {
                    totalCount++;
                    const card = document.createElement('div');
                    const normID = normalize(cell.cell_key);
                    card.className = 'v-card';
                    card.id = `cell-${normID}`;
                    
                    if (ownedAircraft.includes(normID)) card.classList.add('obtained');

                    if (
