<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CAOC | USA AIR WING</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        
        #loading-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        #comms-vis { width: 350px; height: auto; margin-bottom: 25px; border: 1px solid #004400; opacity: 0; transition: opacity 1s ease; }
        .progress-bar { width: 350px; height: 3px; background: #111; border: 1px solid #004400; position: relative; }
        .progress-fill { width: 0%; height: 100%; background: #00ff00; transition: width 2s linear; }
        #status-update { margin-top: 15px; font-size: 0.8em; color: #00ff00; letter-spacing: 2px; text-transform: uppercase; }

        .usa-hero { width: 100%; height: 160px; overflow: hidden; border-bottom: 2px solid #00ff00; position: relative; }
        .usa-banner-video { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }

        .header-block { text-align: center; padding: 30px 0; }
        .main-title { font-size: 3.5em; letter-spacing: 15px; margin: 0; color: #fff; }
        .satcom-blink { color: #00ff00; animation: satcomFade 5s infinite; }
        @keyframes satcomFade { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        .tree-viewport { padding: 20px 60px 100px 60px; display: flex; flex-direction: column; gap: 80px; }
        .rank-wrapper { display: flex; align-items: stretch; }
        .rank-sidebar { font-size: 3em; font-weight: bold; writing-mode: vertical-rl; text-orientation: upright; padding: 15px; color: rgba(0, 255, 0, 0.45); text-shadow: 0 0 10px rgba(0, 255, 0, 0.2); }

        .rank-container { flex-grow: 1; display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 150px; gap: 20px; padding: 40px; background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(0, 255, 0, 0.1); position: relative; }
        .v-card { background: rgba(10, 10, 10, 0.98); border: 1px solid #222; padding: 10px; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .v-img { width: 100%; height: 80px; object-fit: contain; }
        .v-name { margin-top: 5px; font-size: 0.7em; font-weight: bold; color: #bbb; }
        .back-btn { position: fixed; bottom: 20px; left: 20px; background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 6px 12px; text-decoration: none; z-index: 2000; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <img src="Comms_Pic.png" id="comms-vis" onerror="this.style.display='none';">
        <div style="color:#00ff00; letter-spacing:5px; margin-bottom:20px;">USA TERMINAL: SECURE ACCESS</div>
        <div class="progress-bar"><div class="progress-fill" id="bar-fill"></div></div>
        <div id="status-update">INITIALIZING HANDSHAKE...</div>
    </div>

    <div class="usa-hero">
        <video autoplay muted loop playsinline class="usa-banner-video"><source src="USA Banner.mp4" type="video/mp4"></video>
    </div>
