<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sky Pilot Research Tree</title>
  <style>
    :root {
      --bg-0: #070b11;
      --bg-1: #0c121b;
      --text: #e8eef8;
      --muted: #9cafc7;
      --dim: #6d7f97;
      --line: rgba(255,255,255,0.08);
      --sidebar-w: 390px;
      --rank-header-h: 48px;
      --rank-gap: 34px;
      --rank-inner-top: 18px;
      --rank-inner-bottom: 18px;
      --cell-w: 170px;
      --cell-h: 122px;
      --cell-gap-x: 36px;
      --cell-gap-y: 22px;
      --tree-pad: 28px;
      --img-h: 66px;
      --radius: 16px;
      --font: Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(62, 88, 128, 0.18), transparent 34%),
        radial-gradient(circle at top right, rgba(255, 210, 80, 0.07), transparent 26%),
        linear-gradient(180deg, var(--bg-1), var(--bg-0));
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(0, 1fr) var(--sidebar-w);
      width: 100%;
      height: 100%;
    }

    .main {
      position: relative;
      min-width: 0;
      min-height: 0;
      border-right: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.02), transparent 15%),
        linear-gradient(180deg, rgba(22, 32, 48, 0.96), rgba(8, 12, 18, 0.98));
    }

    .toolbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px;
      background: linear-gradient(180deg, rgba(8, 12, 18, 0.98), rgba(8, 12, 18, 0.86));
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }

    .toolbar strong {
      font-size: 14px;
      letter-spacing: .10em;
      text-transform: uppercase;
    }

    .toolbar span {
      color: var(--muted);
      font-size: 12px;
    }

    .legend {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      white-space: nowrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      display: inline-block;
      flex: 0 0 auto;
    }

    .dot.standard { background: rgba(144,171,200, .95); }
    .dot.premium { background: rgba(255,215,95, .98); }
    .dot.squadron { background: rgba(84,230,255, .98); }
    .dot.event { background: rgba(201,134,255, .98); }
    .dot.pack { background: rgba(255,172,88, .98); }

    .tree-scroll {
      position: absolute;
      left: 0;
      right: 0;
      top: 56px;
      bottom: 0;
      overflow: auto;
      padding: 18px;
    }

    .tree-shell {
      position: relative;
      min-width: max-content;
      min-height: 100%;
      padding: var(--tree-pad);
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.005)),
        linear-gradient(180deg, rgba(20, 29, 43, 0.78), rgba(10, 15, 23, 0.92));
      border: 1px solid rgba(255,255,255,0.05);
      overflow: hidden;
      box-shadow:
        0 24px 60px rgba(0,0,0,0.34),
        inset 0 1px 0 rgba(255,255,255,0.035);
    }

    .tree-grid,
    .rank-layer,
    .edge-layer,
    .node-layer {
      position: absolute;
      inset: 0;
    }

    .tree-grid {
      background-image:
        linear-gradient(rgba(255,255,255,0.024) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.024) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      opacity: 0.7;
    }

    .rank-band {
      position: absolute;
      left: 0;
      right: 0;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(24, 34, 48, .55), rgba(13, 20, 29, .42));
      border: 1px solid rgba(255,255,255,0.04);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
    }

    .rank-band::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: var(--rank-header-h);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(146, 176, 215, .26), transparent);
    }

    .rank-label {
      position: absolute;
      left: 16px;
      top: 10px;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 14px;
      font-size: 12px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #d8e4f3;
      font-weight: 800;
      background: rgba(8, 12, 18, 0.72);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 24px rgba(0,0,0,0.22);
    }

    .edge-layer svg {
      position: absolute;
      inset: 0;
      overflow: visible;
      pointer-events: none;
    }

    .edge-path {
      fill: none;
      stroke: rgba(121, 168, 255, 0.26);
      stroke-width: 2;
      stroke-dasharray: 6 6;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
      filter: drop-shadow(0 0 1px rgba(121, 168, 255, 0.12));
    }

    .edge-path.active {
      stroke: rgba(255, 215, 95, 0.95);
      stroke-width: 2.5;
      stroke-dasharray: none;
      filter: drop-shadow(0 0 5px rgba(255, 215, 95, 0.35));
    }

    .edge-head-blue { fill: rgba(121, 168, 255, 0.58); }
    .edge-head-gold { fill: rgba(255, 215, 95, 0.96); }

    .cell-wrap {
      position: absolute;
      width: var(--cell-w);
      height: var(--cell-h);
      z-index: 4;
    }

    .cell-wrap.grouped .cell-shadow-2,
    .cell-wrap.grouped .cell-shadow-1 {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(41, 53, 70, 0.96), rgba(20, 28, 38, 0.96));
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 8px 18px rgba(0,0,0,0.22);
      pointer-events: none;
    }

    .cell-wrap.grouped .cell-shadow-2 { transform: translate(12px,-12px); opacity: .28; }
    .cell-wrap.grouped .cell-shadow-1 { transform: translate(6px,-6px); opacity: .50; }

    .tree-cell {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      overflow: hidden;
      background: linear-gradient(180deg, rgba(36, 44, 57, .98), rgba(19, 24, 32, .98));
      border: 1px solid rgba(130,145,170,.22);
      box-shadow:
        0 10px 24px rgba(0,0,0,0.28),
        inset 0 1px 0 rgba(255,255,255,0.04);
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease, filter 0.16s ease;
      user-select: none;
    }

    .tree-cell:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,0.16);
      box-shadow:
        0 16px 34px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.05);
      filter: brightness(1.02);
    }

    .tree-cell.active {
      border-color: rgba(255, 215, 95, 0.42);
      box-shadow:
        0 0 0 1px rgba(255, 215, 95, 0.25),
        0 18px 36px rgba(0,0,0,0.42),
        0 0 28px rgba(255, 215, 95, 0.14);
    }

    .tree-cell.tech .cell-accent { background: linear-gradient(90deg, rgba(144,171,200,0.9), rgba(144,171,200,0.55)); }
    .tree-cell.premium .cell-accent { background: linear-gradient(90deg, rgba(255,215,95,1), rgba(255,215,95,0.65)); }
    .tree-cell.squadron .cell-accent { background: linear-gradient(90deg, rgba(84,230,255,1), rgba(84,230,255,0.65)); }
    .tree-cell.event .cell-accent { background: linear-gradient(90deg, rgba(201,134,255,1), rgba(201,134,255,0.65)); }
    .tree-cell.pack .cell-accent { background: linear-gradient(90deg, rgba(255,172,88,1), rgba(255,172,88,0.65)); }

    .cell-accent {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 4px;
      z-index: 3;
    }

    .group-corner {
      position: absolute;
      right: 8px;
      top: 8px;
      z-index: 4;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 22px;
      padding: 0 7px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      color: #f3f7fd;
      background: rgba(8, 12, 18, 0.72);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 4px 16px rgba(0,0,0,0.24);
    }

    .cell-top {
      position: relative;
      height: calc(var(--img-h) + 10px);
      padding: 10px 10px 0 10px;
    }

    .cell-image-wrap {
      position: relative;
      height: var(--img-h);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, rgba(145,175,220,.10), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0));
      border: 1px solid rgba(255,255,255,0.04);
    }

    .cell-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.22));
    }

    .cell-fallback {
      font-size: 11px;
      color: #8ea1b8;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .cell-body {
      padding: 8px 10px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
    }

    .cell-title {
      font-size: 13px;
      line-height: 1.15;
      font-weight: 800;
      color: #eef5ff;
      text-shadow: 0 1px 0 rgba(0,0,0,.3);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 30px;
    }

    .cell-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      min-height: 14px;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: auto;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 3px 7px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.05);
      white-space: nowrap;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .tag.tech { color: #d7e4f3; background: rgba(144,171,200,0.14); border-color: rgba(144,171,200,0.22); }
    .tag.premium { color: #fff0b8; background: rgba(255,215,95,0.18); border-color: rgba(255,215,95,0.26); }
    .tag.squadron { color: #c9f8ff; background: rgba(84,230,255,0.18); border-color: rgba(84,230,255,0.28); }
    .tag.event { color: #efd3ff; background: rgba(201,134,255,0.18); border-color: rgba(201,134,255,0.28); }
    .tag.pack { color: #ffe1c5; background: rgba(255,172,88,0.18); border-color: rgba(255,172,88,0.28); }
    .tag.group { color: #dce8f7; background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12); }

    .sidebar {
      background: linear-gradient(180deg, rgba(16, 23, 34, 0.96), rgba(9, 13, 20, 0.98));
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .sidebar-head {
      padding: 18px 18px 12px 18px;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }

    .sidebar-head h2 {
      margin: 0 0 6px 0;
      font-size: 18px;
      font-weight: 800;
    }

    .sidebar-head p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .detail {
      padding: 18px;
      overflow: auto;
      min-height: 0;
      flex: 1;
    }

    .empty-state {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      padding: 6px 2px;
    }

    .hero-card {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(33, 43, 58, 0.95), rgba(17, 24, 34, 0.95));
      box-shadow: 0 14px 34px rgba(0,0,0,0.28);
      margin-bottom: 16px;
    }

    .hero-image {
      height: 180px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0));
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-image.placeholder {
      color: var(--dim);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero-content { padding: 16px; }

    .hero-kicker {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .hero-name {
      font-size: 24px;
      line-height: 1.1;
      font-weight: 900;
      margin: 0 0 8px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 14px 0 16px;
    }

    .meta-box {
      border-radius: 14px;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
    }

    .meta-label {
      font-size: 10px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 6px;
      font-weight: 800;
    }

    .meta-value {
      font-size: 13px;
      color: var(--text);
      font-weight: 700;
      line-height: 1.35;
      word-break: break-word;
    }

    .section { margin-top: 18px; }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      font-weight: 900;
      margin-bottom: 10px;
    }

    .member-list { display: grid; gap: 10px; }

    .member-item {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 10px;
      padding: 10px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      cursor: pointer;
      transition: transform 0.14s ease, border-color 0.14s ease, background 0.14s ease;
    }

    .member-item:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.05);
    }

    .member-thumb {
      width: 72px;
      height: 52px;
      border-radius: 10px;
      overflow: hidden;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .member-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .member-thumb.placeholder {
      color: var(--dim);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .member-name {
      font-size: 14px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .status {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 20;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 12px;
      color: #d8e6f6;
      background: rgba(12, 18, 27, .92);
      border: 1px solid rgba(255,255,255,.06);
      max-width: 940px;
      white-space: pre-wrap;
    }

    .status.error {
      border-color: rgba(255,114,114,.28);
      color: #ffd5d5;
    }

    @media (max-width: 1280px) {
      .app { grid-template-columns: minmax(0, 1fr) 340px; }
    }

    @media (max-width: 1100px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="main">
      <div class="toolbar">
        <div>
          <strong>Sky Pilot Research Tree</strong><br>
          <span>USA tree viewer</span>
        </div>
        <div class="legend">
          <div class="pill"><span class="dot standard"></span> Tech Tree</div>
          <div class="pill"><span class="dot premium"></span> Premium</div>
          <div class="pill"><span class="dot squadron"></span> Squadron</div>
          <div class="pill"><span class="dot event"></span> Event</div>
          <div class="pill"><span class="dot pack"></span> Pack</div>
        </div>
      </div>
      <div class="tree-scroll">
        <div class="tree-shell" id="treeShell">
          <div class="tree-grid"></div>
          <div class="rank-layer" id="rankLayer"></div>
          <div class="edge-layer" id="edgeLayer"></div>
          <div class="node-layer" id="nodeLayer"></div>
        </div>
      </div>
    </section>
    <aside class="sidebar">
      <div class="sidebar-head">
        <h2>Aircraft Details</h2>
        <p>Select an aircraft card to inspect placement, metadata, grouped members, and type tags.</p>
      </div>
      <div class="detail" id="detailPanel">
        <div class="empty-state">Pick a card in the tree.</div>
      </div>
    </aside>
  </div>

  <div class="status" id="statusBox">SCRIPT BOOTED</div>

  <script>
    const TREE_JSON_URL = 'usa_tree_pass2_with_arrows.json';
    const FLAGS_JSON_URL = 'usa_tree_v4.json';
    const REGISTRY_CSV_URL = 'SP_Registry_CANON_3_31.csv';
    const EDGES_CSV_URL = 'usa_tree_pass2_edges.csv';
    const PIC_BASE = 'https://kjumpmaster.github.io/Aircraft-Pics/';

    const EXEMPT_UNIT_IDS = new Set([
      // 'example_unit_1',
      // 'example_unit_2',
      // 'example_unit_3'
    ].map(normId));

    const treeShellEl = document.getElementById('treeShell');
    const rankLayerEl = document.getElementById('rankLayer');
    const edgeLayerEl = document.getElementById('edgeLayer');
    const nodeLayerEl = document.getElementById('nodeLayer');
    const detailPanelEl = document.getElementById('detailPanel');
    const statusBoxEl = document.getElementById('statusBox');

    const state = {
      registryByMasterKey: new Map(),
      flagMap: new Map(),
      selectedCellId: '',
      selectedUnitId: '',
      cells: [],
      edges: [],
      rectMap: new Map(),
      arrowSourceUsed: 'csv'
    };

    function setStatus(message, isError = false) {
      statusBoxEl.textContent = message;
      statusBoxEl.classList.toggle('error', !!isError);
    }

    window.addEventListener('error', (e) => {
      setStatus(`JS error: ${e.message} at ${e.filename || 'inline'}:${e.lineno || 0}`, true);
    });

    window.addEventListener('unhandledrejection', (e) => {
      setStatus(`Promise error: ${e.reason?.message || e.reason || 'Unknown promise failure'}`, true);
    });

    function normId(value) {
      return String(value || '')
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '_')
        .replace(/^_+|_+$/g, '')
        .replace(/_+/g, '_');
    }

    function normalizeKey(value) {
      return String(value || '').trim();
    }

    function normalizeType(value) {
      return String(value || '').trim().toLowerCase();
    }

    function firstNonBlank(values) {
      for (const v of values) {
        if (v == null) continue;
        const s = String(v).trim();
        if (s !== '') return s;
      }
      return '';
    }

    function toBool(v) {
      if (v === true || v === 1) return true;
      const s = String(v || '').trim().toLowerCase();
      return ['true', '1', 'yes', 'y', 't'].includes(s);
    }

    function safeInt(v, fallback = 0) {
      const n = parseInt(String(v ?? '').trim(), 10);
      return Number.isFinite(n) ? n : fallback;
    }

    function romanize(num) {
      const map = [[1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],[100,'C'],[90,'XC'],[50,'L'],[40,'XL'],[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];
      let out = '';
      let n = Number(num) || 0;
      for (const [v, s] of map) while (n >= v) { out += s; n -= v; }
      return out || String(num);
    }

    function varNum(name) {
      return parseFloat(getComputedStyle(document.documentElement).getPropertyValue(name)) || 0;
    }

    function escapeHTML(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function cssEscape(v) {
      if (window.CSS && typeof window.CSS.escape === 'function') return window.CSS.escape(v);
      return String(v).replace(/([ #;?%&,.+*~\\':"!^$\[\]()=>|\/])/g, '\\$1');
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cur = '';
      let inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const next = text[i + 1];
        if (ch === '"') {
          if (inQuotes && next === '"') { cur += '"'; i++; }
          else { inQuotes = !inQuotes; }
        } else if (ch === ',' && !inQuotes) {
          row.push(cur); cur = '';
        } else if ((ch === '\n' || ch === '\r') && !inQuotes) {
          if (ch === '\r' && next === '\n') i++;
          row.push(cur); cur = '';
          if (row.some(v => String(v).length > 0)) rows.push(row);
          row = [];
        } else {
          cur += ch;
        }
      }
      row.push(cur);
      if (row.some(v => String(v).length > 0)) rows.push(row);
      if (!rows.length) return [];
      const headers = rows[0].map(h => String(h || '').trim());
      return rows.slice(1).filter(r => r.some(v => String(v || '').trim() !== '')).map(r => {
        const obj = {};
        headers.forEach((h, idx) => obj[h] = r[idx] ?? '');
        return obj;
      });
    }

    async function fetchJSON(url) {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Could not load ${url} (${res.status})`);
      return await res.json();
    }

    async function fetchText(url) {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Could not load ${url} (${res.status})`);
      return await res.text();
    }

    function collectObjectsDeep(root) {
      const out = [];
      const seen = new Set();
      (function walk(node) {
        if (!node || typeof node !== 'object' || seen.has(node)) return;
        seen.add(node);
        if (Array.isArray(node)) {
          for (const item of node) walk(item);
          return;
        }
        const keys = Object.keys(node);
        const rowish = keys.some(k => /(^|_)(id|name|unit|plane|type|premium|event|pack|squadron)$/i.test(k));
        if (rowish) out.push(node);
        for (const value of Object.values(node)) walk(value);
      })(root);
      return out;
    }

    function buildRegistryMaps(rows) {
      state.registryByMasterKey = new Map();
      for (const row of rows) {
        const keys = [
          row.master_key,
          row.wt_name,
          row.wt_display_name_new,
          row.rw_name,
          row.wt_image
        ].map(v => String(v || '').trim()).filter(Boolean);

        for (const rawKey of keys) {
          const exact = String(rawKey).trim();
          const normalized = normId(rawKey);
          if (exact && !state.registryByMasterKey.has(exact)) state.registryByMasterKey.set(exact, row);
          if (normalized && !state.registryByMasterKey.has(normalized)) state.registryByMasterKey.set(normalized, row);
        }
      }
    }

    function buildFlagMap(flagJson) {
      const map = new Map();
      const rows = collectObjectsDeep(flagJson);

      function addAlias(alias, payload) {
        const raw = String(alias || '').trim();
        const nid = normId(raw);
        if (!raw && !nid) return;

        const existing = map.get(raw) || map.get(nid) || {
          premium: false,
          squadron: false,
          event: false,
          pack: false,
          rawAliases: new Set()
        };

        existing.premium = existing.premium || !!payload.premium;
        existing.squadron = existing.squadron || !!payload.squadron;
        existing.event = existing.event || !!payload.event;
        existing.pack = existing.pack || !!payload.pack;
        existing.rawAliases.add(raw || nid);

        if (raw) map.set(raw, existing);
        if (nid) map.set(nid, existing);
      }

      for (const row of rows) {
        const typeText = normalizeType(firstNonBlank([
          row.vehicle_type, row.type, row.unit_type, row.classification, row.flag_type,
          row.reward_type, row.kind, row.class
        ]));

        const payload = {
          premium: toBool(row.premium) || typeText.includes('premium'),
          squadron: toBool(row.squadron) || typeText.includes('squadron'),
          event: toBool(row.event) || typeText.includes('event'),
          pack: toBool(row.pack) || typeText.includes('pack')
        };

        [
          row.unit_id, row.aircraft_id, row.id, row.name, row.plane, row.vehicle,
          row.value, row.master_key, row.wt_name, row.display_name, row.title
        ].forEach(v => addAlias(v, payload));

        for (const v of Object.values(row)) {
          if (typeof v !== 'string') continue;
          const s = v.trim();
          if (!s || s.length > 120) continue;
          addAlias(s, payload);
        }

        for (const v of Object.values(row)) {
          if (!Array.isArray(v)) continue;
          for (const item of v) {
            if (typeof item === 'string') addAlias(item, payload);
            else if (item && typeof item === 'object') {
              [item.unit_id, item.aircraft_id, item.id, item.master_key, item.name, item.title, item.value].forEach(x => addAlias(x, payload));
            }
          }
        }
      }

      return map;
    }

    function getRegistryRowByUnitId(unitId) {
      const raw = String(unitId || '').trim();
      const normalized = normId(unitId);
      return state.registryByMasterKey.get(raw) || state.registryByMasterKey.get(normalized) || null;
    }

    function getCellMasterKey(cell) {
      return normalizeKey(firstNonBlank([
        cell.master_key,
        cell.cell_key,
        cell.unit_id,
        cell.id,
        cell.key,
        Array.isArray(cell.units) && cell.units.length ? (typeof cell.units[0] === 'string' ? cell.units[0] : firstNonBlank([cell.units[0].unit_id, cell.units[0].id, cell.units[0].master_key])) : ''
      ]));
    }

    function getCellUnitIds(cell) {
      const out = [];
      const pushMaybe = (v) => {
        const raw = String(v || '').trim();
        const n = normId(v);
        if (raw) out.push(raw);
        if (n) out.push(n);
      };

      pushMaybe(cell.master_key);
      pushMaybe(cell.cell_key);
      pushMaybe(cell.unit_id);
      pushMaybe(cell.id);
      pushMaybe(cell.key);
      pushMaybe(cell.name);
      pushMaybe(cell.display_name);
      pushMaybe(cell.title);

      if (Array.isArray(cell.units)) {
        for (const u of cell.units) {
          if (typeof u === 'string') pushMaybe(u);
          else if (u && typeof u === 'object') pushMaybe(firstNonBlank([u.unit_id, u.aircraft_id, u.id, u.master_key, u.name]));
        }
      }

      if (Array.isArray(cell.members)) {
        for (const u of cell.members) {
          if (typeof u === 'string') pushMaybe(u);
          else if (u && typeof u === 'object') pushMaybe(firstNonBlank([u.unit_id, u.aircraft_id, u.id, u.master_key, u.name]));
        }
      }

      return [...new Set(out.filter(Boolean))];
    }

    function getRenderableUnitIds(cell) {
      return getCellUnitIds(cell).filter(id => !EXEMPT_UNIT_IDS.has(normId(id)));
    }

    function classifyUnit(unitId, fallbackCell = null) {
      const candidates = new Set();
      const add = (v) => {
        const raw = String(v || '').trim();
        const nid = normId(raw);
        if (raw) candidates.add(raw);
        if (nid) candidates.add(nid);
      };

      add(unitId);

      if (fallbackCell) {
        add(fallbackCell.master_key);
        add(fallbackCell.cell_key);
        add(fallbackCell.unit_id);
        add(fallbackCell.id);
        add(fallbackCell.key);
        add(fallbackCell.name);
        add(fallbackCell.display_name);
        add(fallbackCell.title);
      }

      const reg = getRegistryRowByUnitId(unitId);
      if (reg) {
        add(reg.master_key);
        add(reg.wt_name);
        add(reg.wt_display_name_new);
        add(reg.rw_name);
        add(reg.wt_image);
      }

      for (const key of candidates) {
        const f = state.flagMap.get(key);
        if (!f) continue;
        if (f.squadron) return 'squadron';
        if (f.event) return 'event';
        if (f.pack) return 'pack';
        if (f.premium) return 'premium';
      }

      if (fallbackCell) {
        const cellTypeText = normalizeType(firstNonBlank([
          fallbackCell.type,
          fallbackCell.vehicle_type,
          fallbackCell.group_type,
          fallbackCell.kind,
          fallbackCell.class,
          fallbackCell.reward_type
        ]));

        const nameText = normalizeType(firstNonBlank([
          fallbackCell.display_name,
          fallbackCell.wiki_name,
          fallbackCell.name,
          fallbackCell.title,
          fallbackCell.master_key,
          fallbackCell.unit_id
        ]));

        if (cellTypeText.includes('squadron') || nameText.includes('squadron')) return 'squadron';
        if (cellTypeText.includes('event') || nameText.includes('event')) return 'event';
        if (cellTypeText.includes('pack') || nameText.includes('pack')) return 'pack';
        if (cellTypeText.includes('premium') || nameText.includes('premium')) return 'premium';
      }

      return 'tech';
    }

    function summarizeGroupTypes(unitIds, fallbackCell = null) {
      const counts = { tech: 0, premium: 0, squadron: 0, event: 0, pack: 0 };
      for (const id of unitIds) {
        const t = classifyUnit(id, fallbackCell);
        counts[t] = (counts[t] || 0) + 1;
      }
      return counts;
    }

    function buildImageCandidates(registryRow, unitId) {
      const out = [];
      const wtImage = normalizeKey(registryRow?.wt_image);
      const masterKey = normalizeKey(registryRow?.master_key || unitId);
      if (wtImage) {
        if (/^https?:\/\//i.test(wtImage)) out.push(wtImage);
        else if (/\.(png|jpg|jpeg|webp)$/i.test(wtImage)) out.push(`${PIC_BASE}${wtImage}`);
        else out.push(`${PIC_BASE}${wtImage}.png`);
      }
      if (masterKey) out.push(`${PIC_BASE}${masterKey}.png`);
      return [...new Set(out)];
    }

    function resolveImageURL(registryRow, unitId) {
      const candidates = buildImageCandidates(registryRow, unitId);
      return candidates[0] || null;
    }

    function getDisplayName(cell, registryRow) {
      return (
        cell.display_name ||
        cell.wiki_name ||
        cell.name ||
        cell.title ||
        registryRow?.wt_display_name_new ||
        registryRow?.wt_name ||
        registryRow?.rw_name ||
        getCellMasterKey(cell) ||
        'Unknown Aircraft'
      );
    }

    function normalizeCell(raw, idx) {
      const rank = Number(raw.rank);
      const column = Number(raw.column ?? raw.col);
      const row = Number(raw.row_in_rank ?? raw.row);
      const cellId = raw.cell_id || raw.cell_key || raw.id || raw.node_id || raw.key || `${getCellMasterKey(raw) || 'cell'}_${idx}`;
      return {
        ...raw,
        rank,
        column,
        row,
        cell_id: cellId,
        cell_key: raw.cell_key || cellId
      };
    }

    function validateCellPlacement(cell) {
      return Number.isFinite(cell.rank) && Number.isFinite(cell.column) && Number.isFinite(cell.row) && cell.rank >= 1 && cell.column >= 1 && cell.row >= 1;
    }

    function getRowCountsByRank(cells) {
      const result = new Map();
      for (const cell of cells) {
        const rank = Number(cell.rank);
        const existing = result.get(rank) || 0;
        result.set(rank, Math.max(existing, Number(cell.row) || 1));
      }
      return result;
    }

    function getMaxColumn(cells) {
      return Math.max(...cells.map(c => Number(c.column) || 0), 7);
    }

    function computeRankLayout(cells) {
      const rowCountsByRank = getRowCountsByRank(cells);
      const ranks = [...rowCountsByRank.keys()].sort((a,b) => a-b);
      const rankLayout = new Map();

      for (const rank of ranks) {
        const rows = rowCountsByRank.get(rank) || 1;
        const contentH = rows * varNum('--cell-h') + Math.max(0, rows - 1) * varNum('--cell-gap-y');
        const bandH = varNum('--rank-header-h') + varNum('--rank-inner-top') + contentH + varNum('--rank-inner-bottom');
        rankLayout.set(rank, { y, height: bandH, rows });
        y += bandH + varNum('--rank-gap');
      }
      const maxCol = getMaxColumn(cells);
      const width =
