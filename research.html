<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE CAOC | USA AIR WING - EMERGENCY OVERRIDE</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        #loading-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        .decode-header { font-size: 1.4em; letter-spacing: 8px; color: #00ff00; font-weight: bold; }
        .progress-bar { width: 450px; height: 3px; background: #111; border: 1px solid #004400; margin: 20px 0; position: relative; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #00ff00; transition: width 2s linear; }
        .tree-viewport { padding: 40px; display: flex; flex-direction: column; gap: 80px; }
        .rank-wrapper { display: flex; align-items: stretch; border-bottom: 1px solid rgba(0,255,0,0.1); padding-bottom: 40px; }
        .rank-sidebar { font-size: 3em; writing-mode: vertical-rl; color: rgba(0, 255, 0, 0.1); padding: 10px; }
        .rank-container {
            flex-grow: 1; display: grid; grid-template-columns: repeat(8, 1fr); 
            grid-auto-rows: 140px; gap: 15px; padding: 20px;
        }
        .v-card { background: #111; border: 1px solid #333; padding: 5px; text-align: center; display: flex; flex-direction: column; }
        .v-img { width: 100%; height: 75px; object-fit: contain; }
        .v-name { font-size: 0.7em; color: #888; text-transform: uppercase; margin-top: 5px; }
        .premium { border: 1px solid #d4af37; }
        .squadron { border: 1px solid #55efc4; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="decode-header">USA TERMINAL: BYPASSING HANG...</div>
        <div class="progress-bar"><div class="progress-fill" id="bar-fill"></div></div>
        <div id="status-update" style="color:#00ff00;">ATTEMPTING HANDSHAKE...</div>
    </div>

    <div id="research-theater" class="tree-viewport"></div>

    <script>
        const ROMAN = ["", "I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX"];
        const PIC_BASE = "https://raw.githubusercontent.com/KJumpmaster/WTAircraft_Profile_Pics/main/";

        async function initiateSystem() {
            const status = document.getElementById('status-update');
            const overlay = document.getElementById('loading-overlay');
            const fill = document.getElementById('bar-fill');

            // Start visual progress immediately
            setTimeout(() => { fill.style.width = "100%"; }, 100);

            // EMERGENCY FAIL-SAFE: If it hangs for 4 seconds, just show the screen!
            const failSafe = setTimeout(() => {
                console.warn("Handshake timed out. Forcing display.");
                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; }, 800);
            }, 4000);

            try {
                const [regRes, treeRes] = await Promise.all([
                    fetch('./SP_Registry_CANON_3_31.csv'),
                    fetch('./usa_tree_v4.json')
                ]);

                if (!regRes.ok || !treeRes.ok) throw new Error("Data files not found in folder.");

                const regText = await regRes.text();
                const treeData = await treeRes.json();
                const registry = {};

                regText.split('\n').slice(1).forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length > 2) {
                        const key = cols[0].replace(/"/g, '').trim().toLowerCase();
                        const img = cols[2].replace(/"/g, '').trim(); 
                        if (key) registry[key] = img;
                    }
                });

                const theater = document.getElementById('research-theater');
                [1,2,3,4,5,6,7,8,9].forEach(r => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'rank-wrapper';
                    wrapper.innerHTML = `<div class="rank-sidebar">RANK ${ROMAN[r]}</div>`;
                    
                    const container = document.createElement('div');
                    container.className = 'rank-container';

                    const cells = treeData.cells.filter(c => c.rank === r);
                    cells.forEach(cell => {
                        const id = String(cell.cell_id).toLowerCase();
                        const card = document.createElement('div');
                        
                        let type = (cell.flags?.is_premium) ? "premium" : (cell.flags?.is_squadron ? "squadron" : "");
                        card.className = `v-card ${type}`;
                        card.style.gridColumn = cell.column;
                        card.style.gridRow = cell.row;
                        
                        card.innerHTML = `
                            <img src="${PIC_BASE}${registry[id] || 'placeholder.png'}" class="v-img" onerror="this.src='https://placehold.co/200x100/000?text=SCAN';">
                            <div class="v-name">${(cell.display_name || cell.cell_id).replace(/_/g, ' ')}</div>
                        `;
                        container.appendChild(card);
                    });
                    wrapper.appendChild(container);
                    theater.appendChild(wrapper);
                });

                // Success! Cancel the failsafe and hide overlay
                clearTimeout(failSafe);
                status.innerText = "LINK SUCCESSFUL.";
                setTimeout(() => {
                    overlay.style.opacity = '0';
                    setTimeout(() => { overlay.style.display = 'none'; }, 800);
                }, 1000);

            } catch (err) {
                console.error(err);
                status.innerHTML = `<span style="color:red">ERROR: ${err.message}</span>`;
            }
        }
        window.onload = initiateSystem;
    </script>
</body>
</html>
